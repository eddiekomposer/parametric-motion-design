    function applyContoursToMotionState(contours, mode, closedFlags = [], filledFlags = []) {
      const valid = contours
        .map((path, index) => ({ path, closed: closedFlags[index] ?? true, filled: filledFlags[index] ?? true }))
        .filter((item) => item.path.length >= 3);
      const preserveSvgGeometry = mode === "svg";
      state.paths = valid.map((item) => item.path.map((point) => ({ x: point.x, y: point.y })));
      const pathClosed = valid.map((item) => item.closed);
      const pathFilled = valid.map((item) => item.filled);
      if (!preserveSvgGeometry) {
        state.paths = applyPointCloudDensity(state.paths, config.sampleRatio, config.simplifyPointCount, pathClosed);
      }
      state.path = state.paths[0] ?? [];
      state.rawData = state.paths.flat();
      config.smoothWindow = preserveSvgGeometry ? 1 : automaticSmoothWindow(state.rawData.length, mode);
      state.treeSamples = preserveSvgGeometry ? state.path.slice() : deterministicSample(state.path, config.sampleRatio);
      if (!preserveSvgGeometry && state.path.length < 8) {
        state.path = state.treeSamples.length >= 8 ? treePathFromSamples(state.treeSamples) : makeFallbackShape();
      }
      state.paths = preserveSvgGeometry
        ? state.paths.map((path) => path.slice())
        : (state.paths.length ? state.paths.map((path) => smoothPath(path, config.smoothWindow)) : [state.path]);
      state.path = state.paths[0];
      state.simplifiedContours = preserveSvgGeometry
        ? state.paths.map((path) => path.slice())
        : simplifyContoursToPointCount(state.paths, config.simplifyPointCount, pathClosed);
      state.simplified = state.simplifiedContours[0] ?? [];
      if (!preserveSvgGeometry && state.simplified.length < 8) state.simplified = state.path;
      state.contour = state.path;
      if (!state.simplifiedContours.length) state.simplifiedContours = [state.simplified];
      state.normalizedContours = normalizeContours(state.simplifiedContours);
      state.normalizedContourClosed = state.normalizedContours.map((_, index) => pathClosed[index] ?? true);
      state.normalizedContourFilled = state.normalizedContours.map((_, index) => pathFilled[index] ?? true);
      state.normalized = state.normalizedContours[0] ?? normalizePoints(state.simplified);

        const { scalar, width, height } = field;

        const segments = field.kind === "edges" ? contourSegmentsFromScalar(scalar, width, height, config.threshold) : [];
        const contours = field.kind === "edges" ? [contourPathFromSegments(segments, width, height)] : contourPathsFromMask(field, config.threshold);
        applyContoursToMotionState(contours, mode);
        finishImageProcessing();
      } catch (error) {
        console.error(error);
        state.path = makeFallbackShape();
        state.simplified = simplifyToPointCount(state.path, config.simplifyPointCount);
        state.simplifiedContours = [state.simplified];
        state.contour = state.path;
        state.normalizedContours = normalizeContours(state.simplifiedContours);
        state.normalizedContourClosed = state.normalizedContours.map(() => true);
        state.normalizedContourFilled = state.normalizedContours.map(() => true);
        state.normalized = state.normalizedContours[0] ?? normalizePoints(state.simplified);

    function readImageIntoCanvas(image) {
      const maxSide = config.maxImageSize;
      const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
      const width = Math.max(8, Math.round(image.naturalWidth * scale));
      const height = Math.max(8, Math.round(image.naturalHeight * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(image, 0, 0, width, height);
      state.imageData = ctx.getImageData(0, 0, width, height);
    }

    function extractSvgContours(svgText) {
      const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
      if (doc.querySelector("parsererror")) return [];
      const svg = doc.documentElement;
      if (!svg || svg.nodeName.toLowerCase() !== "svg") return [];
      svg.querySelectorAll("script, foreignObject").forEach((node) => node.remove());
      const scratch = document.createElement("div");
      scratch.style.position = "absolute";
      scratch.style.left = "-10000px";
      scratch.style.top = "-10000px";
      scratch.style.width = "512px";
      scratch.style.height = "512px";
      scratch.style.overflow = "hidden";
      scratch.style.opacity = "0";
      scratch.style.pointerEvents = "none";
      const imported = document.importNode(svg, true);
      imported.style.width = "512px";
      imported.style.height = "512px";
      scratch.appendChild(imported);
      document.body.appendChild(scratch);
      try {
        return Array.from(imported.querySelectorAll("path, polygon, polyline, line, rect, circle, ellipse"))
          .flatMap(sampleSvgGeometryElement)
          .filter((entry) => entry.points.length >= 3);
      } finally {
        scratch.remove();
      }
    }

    function sampleSvgGeometryElement(node) {
      if (typeof node.getTotalLength !== "function" || typeof node.getPointAtLength !== "function") return [];
      const style = window.getComputedStyle(node);
      if (style.display === "none" || style.visibility === "hidden" || Number(style.opacity) === 0) return [];
      let length = 0;
      try {
        length = node.getTotalLength();
      } catch {
        return [];
      }
      if (!Number.isFinite(length) || length <= 0) return [];
      const tag = node.tagName.toLowerCase();
      const canBeClosed = tag !== "line" && tag !== "polyline" && (tag !== "path" || /[zZ]/.test(node.getAttribute("d") || ""));
      const fillOpacity = Number(style.fillOpacity || node.getAttribute("fill-opacity") || 1);
      const matrix = node.getCTM();
      const matrixScale = matrix
        ? Math.max(Math.hypot(matrix.a, matrix.b), Math.hypot(matrix.c, matrix.d), 1)
        : 1;
      const count = Math.max(12, Math.min(720, Math.ceil((length * matrixScale) / 1.5)));
      const transformPoint = (raw) => {
        const point = matrix ? new DOMPoint(raw.x, raw.y).matrixTransform(matrix) : raw;
        return { x: point.x, y: point.y };
      };
      const sampled = [];
      for (let index = 0; index < count; index += 1) {
        const position = length * (index / Math.max(1, count - 1));
        sampled.push({ position, point: transformPoint(node.getPointAtLength(position)) });
      }
      const stepDistances = sampled.slice(1)
        .map((sample, index) => distance(sampled[index].point, sample.point))
        .sort((a, b) => a - b);
      const typicalStep = stepDistances[Math.floor(stepDistances.length / 2)] || 1;
      const groups = [[]];
      sampled.forEach((sample, index) => {
        if (index > 0 && distance(sampled[index - 1].point, sample.point) > typicalStep * 4 + 1) {
          let low = sampled[index - 1].position;
          let high = sample.position;
          const leftAnchor = sampled[index - 1].point;
          const rightAnchor = sample.point;
          for (let iteration = 0; iteration < 18; iteration += 1) {
            const middle = (low + high) / 2;
            const middlePoint = transformPoint(node.getPointAtLength(middle));
            if (distance(middlePoint, leftAnchor) <= distance(middlePoint, rightAnchor)) low = middle;
            else high = middle;
          }
          groups[groups.length - 1].push(transformPoint(node.getPointAtLength(low)));
          groups.push([transformPoint(node.getPointAtLength(high))]);
        }
        groups[groups.length - 1].push(sample.point);
      });
      return groups
        .filter((points) => points.length >= 3)
        .map((points) => {
          const closed = canBeClosed && distance(points[0], points[points.length - 1]) <= typicalStep * 1.5 + 0.001;
          if (closed && points.length > 1) points.pop();
          const filled = closed && tag !== "polyline" && tag !== "line" && style.fill !== "none" && fillOpacity > 0;
          return { points, closed, filled };
        });
    }

    async function loadImageFile(file) {
      if (!file || (!file.type.startsWith("image/") && !isSvgFile(file))) return;
      setStatus("Loading");
      state.fileName = file.name;
      state.usingSampleReference = false;
      state.sourceKind = isSvgFile(file) ? "svg" : "raster";
      renderMotionControls();
      state.svgContours = [];
      state.svgContourClosed = [];
      state.svgContourFilled = [];
      const dataURL = await fileToDataURL(file);
      state.referenceDataURL = dataURL;
      state.referenceSvgText = "";
      if (state.sourceKind === "svg") {
        try {
          state.referenceSvgText = await fileToText(file);
          const svgEntries = extractSvgContours(state.referenceSvgText);
          state.svgContours = svgEntries.map((entry) => entry.points);
          state.svgContourClosed = svgEntries.map((entry) => entry.closed);
          state.svgContourFilled = svgEntries.map((entry) => entry.filled);
        } catch (error) {
          console.warn("Unable to read SVG vectors; falling back to rasterized image.", error);
        }
      }
      try {
        const image = await loadImage(dataURL);
        readImageIntoCanvas(image);
      } catch (error) {
        if (!hasSvgVectorContours()) throw error;
        state.imageData = null;
      }
      await new Promise((resolve) => requestAnimationFrame(resolve));
      processCurrentImage();
    }

    function loadSample() {
      const size = 520;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#faf7ef";
      ctx.fillRect(0, 0, size, size);
      ctx.translate(size / 2, size / 2);
      ctx.beginPath();
      for (let i = 0; i <= 420; i += 1) {
        const t = (i / 420) * Math.PI * 2;
        const r = 122 + 46 * Math.sin(3 * t + 0.4) + 24 * Math.cos(7 * t);
        const x = Math.cos(t) * r;
        const y = Math.sin(t) * (r * 0.82) + 18 * Math.sin(2 * t);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = "#111216";
      ctx.fill();
      ctx.lineWidth = 18;
      ctx.strokeStyle = "#67d6c3";
      ctx.stroke();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      state.fileName = "sample-shape.png";
      state.usingSampleReference = true;
      state.sourceKind = "raster";
      state.referenceDataURL = canvas.toDataURL("image/png");
      state.referenceSvgText = "";
      state.svgContours = [];
      state.svgContourClosed = [];
      state.svgContourFilled = [];
      state.imageData = ctx.getImageData(0, 0, size, size);
      processCurrentImage();
    }

    function handleImageControlInput(event) {

    function handleMotionControlInput(event) {
      const keyedTarget = event.target.closest?.("[data-key]");
      const key = event.target.dataset.key || keyedTarget?.dataset.key;
      if (!key && !event.target.closest?.(".rgba-control, .rgba-popover")) return;
      const wasPulseGapVisible = config.pulseCycleMs > 0;
      const effectBefore = config.effectType;
      const finalizeColorChange = (colorKey, alphaKey) => {
        syncControlValue(colorKey);
        if (alphaKey) syncControlValue(alphaKey);
        if (colorKey === "contourColor") motionPath.setAttribute("stroke", config.contourColor);
        if (alphaKey === "contourOpacity") motionPath.setAttribute("opacity", config.contourOpacity.toFixed(3));
        if (effectBefore === "particle") {
          if (colorKey === "particleSquareOnColor" || colorKey === "particleSquareOffColor" || alphaKey === "particleSquareOnOpacity" || alphaKey === "particleSquareOffOpacity") {
            state.particleSystem.lastFrameAt = null;
          } else {
            refreshParticleColors();
          }
          updateMeta();
          updateFormulaAndCode();
          refreshPreviewNow();
          return;
        }
        if (effectBefore === "morph") {
          state.morphSystem.lastFrameAt = null;
          updateMeta();
          updateFormulaAndCode();
          refreshPreviewNow();
          return;
        }
        activeEffect().prepare();
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
      };
      if (handleRgbaInput(event.target, finalizeColorChange)) return;
      if (key === "cellRandomize") {
        config.cellSeed = Math.round(Number(config.cellSeed) || 0) + 1;
        activeEffect().prepare();
        state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
        return;
      }
      if (event.target.type === "checkbox") config[key] = event.target.checked;
      else if (event.target.type === "color") config[key] = event.target.value;
      else if (event.target.tagName === "SELECT") config[key] = event.target.value;
      else if (event.target.dataset.optionValue != null) config[key] = event.target.dataset.optionValue;
      else if (key === "cellCount") config[key] = clamp(Math.round(Number(event.target.value)), 3, 10);
      else if (key === "cellDiversity") config[key] = clamp(Math.round(Number(event.target.value)), 0, 5);
      else if (key === "cellOverallSize") config[key] = clamp(Number(event.target.value), 0.55, 1.45);
      else if (key === "cellGrowStrength") config[key] = clamp(Number(event.target.value), 0.2, 1.2);
      else config[key] = key === "particleCount" || key === "sineLineCount" || key === "constellationPointCount" ? Math.round(Number(event.target.value)) : Number(event.target.value);
      if (key === "particleStructure" || key === "particleRenderMode") {
        syncParticleTypeFromStyle();

        syncParticleStyleFromType();

      normalizeParticleSizeForMode();
      if (key === "particleStructure") {
        state.particleSystem.squareCache = { key: "", states: [] };

      syncControlValue(key);
      if (event.target.dataset.colorKey) syncControlValue(event.target.dataset.colorKey);
      if (key === "contourColor") motionPath.setAttribute("stroke", config.contourColor);
      if (key === "contourOpacity") motionPath.setAttribute("opacity", config.contourOpacity.toFixed(3));
      if (key === "pulseCycleMs" && wasPulseGapVisible !== config.pulseCycleMs > 0) renderMotionControls();
      if (key === "flowMode") renderMotionControls();
      if (key === "brushOverlapMode") renderMotionControls();
      if (key === "oscMode" || key === "oscRefreshMode") renderMotionControls();
      if (key === "morphMotionMode" || key === "morphRenderMode" || key === "morphStrokeMotionMode") renderMotionControls();
      if (key === "lineStyle") {
        finishLineCurveEdit();
        renderMotionControls();
      }
      if (key === "constellationPointCount") {
        if (applyConstellationPointCountChange()) return;

      if (key === "constellationStaggerMs" || key === "constellationFlickerMs") {
        previewConstellationTransitionPhase();
      }
      if (key === "strokeWidth") motionPath.setAttribute("stroke-width", String(config.strokeWidth));
      if (effectBefore === "particle") {
        if (key === "particleType" || key === "particleStructure" || key === "particleRenderMode" || key === "particleSquareMotion") renderMotionControls();
        if (key === "particleType" || key === "particleStructure" || key === "particleRenderMode") {
          prepareParticleEffect();

        } else if (key === "particleSize" || key === "particleStability" || key === "particleMouseForce" || key === "particleSquareOnColor" || key === "particleSquareOnOpacity" || key === "particleSquareOffColor" || key === "particleSquareOffOpacity" || key === "particleSquareMotion" || key === "particleFrameIntervalMs" || key === "particleTransitionMs" || key === "particleType") {
          state.particleSystem.lastFrameAt = null;
        } else {
          refreshParticleColors();
        }
        if (key === "particleFrameIntervalMs" || key === "particleTransitionMs") state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
        return;
      }
      if (effectBefore === "morph") {

          state.morphSystem.lastFrameAt = null;

        if (key === "morphFrameIntervalMs" || key === "morphTransitionMs" || key === "morphMotionMode" || key === "morphStrokeMotionMode") state.startedAt = performance.now();
        updateMeta();

      }
      if (effectBefore === "perspective") {
        if (key === "perspectiveHoverMode" || key === "perspectiveUseCustomStyle") renderMotionControls();
        if (key === "perspectiveDurationMs" || key === "perspectiveIntervalMs" || key === "perspectiveHoverMode") {
          state.startedAt = performance.now();
          state.perspectiveSystem.progress = 0;
          state.perspectiveSystem.animation = null;
        }
        activeEffect().prepare();
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
        return;
      }
      if (effectBefore === "neural") {
        if (key === "neuralSource" || key === "neuralNodeShape" || key === "neuralMouseFollow" || key === "neuralSnapCursor") renderMotionControls();
        if (key === "neuralDensity") config[key] = clamp(Math.round(Number(config[key]) || 13), 4, 40);
        if (key === "neuralGravityRange") config[key] = clamp(Math.round(Number(config[key]) || 5), 3, 30);
        if (key === "neuralNodeSize") config[key] = clamp(Number(config[key]) || 0, 0, 5);
        if (key === "neuralCursorSpeed") config[key] = clamp(Number(config[key]) || 0, 0, 2);
        if (key === "neuralSnapIntervalMs") config[key] = clamp(Number(config[key]) || 900, 300, 3000);
        if (key === "neuralSource" || key === "neuralDensity") {
          processCurrentImage();
          return;
        }
        state.neuralSystem.lastFrameAt = null;
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
        return;
      }
      activeEffect().prepare();
      if (shouldRestartMotionForKey(key) && !previewConstellationTransitionPhase()) state.startedAt = performance.now();
      updateMeta();
      updateFormulaAndCode();
      refreshPreviewNow();
    }

    function renderMotionControls() {
      const effect = activeEffect();
      effectSelect.value = config.effectType;
      const hasReferenceFrames = Boolean(effect.hasParticleKeyframes);
      const hasCellReferences = config.effectType === "cell";
      imageCard.classList.toggle("is-hidden", Boolean(effect.hideImageOptions) && !hasReferenceFrames && !hasCellReferences);
      dropzone.classList.toggle("is-hidden", Boolean(effect.hideImageOptions) || hasReferenceFrames || hasCellReferences);
      const preservesSvgGeometry = state.sourceKind === "svg" && !effect.hideImageOptions && !hasReferenceFrames && !hasCellReferences;
      modeTabs.hidden = hasReferenceFrames || hasCellReferences || preservesSvgGeometry;
      referenceCardTitle.textContent = hasCellReferences ? "细胞参考图" : "参考图";
      imageControls.innerHTML = "";
      if (hasCellReferences) {
        renderCellReferenceEditor(imageControls);
      } else if (hasReferenceFrames) {
        renderParticleKeyframeEditor(imageControls);
      } else if (preservesSvgGeometry) {
        const note = document.createElement("p");
        note.className = "svg-fidelity-note";
        note.textContent = "SVG 原始路径已保留，不进行轮廓简化、点云抽稀或傅立叶重构。";
        imageControls.appendChild(note);
      } else if (!effect.hideImageOptions) {
        renderControls(imageControls, imageControlDefs, handleImageControlInput);
      }
      motionControls.innerHTML = "";
      if (effect.hasKeyframes) renderLineKeyframeEditor(motionControls);
      if (effect.hasOscilloscopeFigures) renderOscilloscopeFigureEditor(motionControls);
      if (config.effectType === "particle") {
        renderControls(motionControls, effect.controls.slice(0, 1), handleMotionControlInput, false);
        if (!isParticleMatrixMode()) renderParticleColorEditor(motionControls);
        renderControls(motionControls, effect.controls.slice(1), handleMotionControlInput, false);
      } else {
        if (effect.hasParticleColors && !isParticleMatrixMode()) renderParticleColorEditor(motionControls);
        renderControls(motionControls, effect.controls, handleMotionControlInput, false);
      }
    }

    window.PMDExports = {
      generateStandaloneHTML,
      generateLottieJSON,
    };

    renderMotionControls();

    window.addEventListener("resize", drawMiniCanvases);
    if (config.effectType === "cell") {
      state.fileName = "cell-motion";
      processCurrentImage();
    } else {
      loadSample();
    }
    cancelAnimationFrame(state.animationFrame);
    state.animationFrame = requestAnimationFrame(render);
  </script>
</body>
</html>
