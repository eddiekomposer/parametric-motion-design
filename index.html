<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parametric Motion Design</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --panel: #0d0f12;
      --panel-2: #15171c;
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(255, 255, 255, 0.2);
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.62);
      --accent: #67d6c3;
      --accent-2: #f0c96a;
      --danger: #f07a7a;
      --range-track: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(380px, 440px) minmax(0, 1fr) minmax(330px, 460px);
      background: var(--bg);
    }

    .rail,
    .stage,
    .inspector {
      min-height: 0;
    }

    .rail {
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      padding: 18px;
      border-right: 1px solid var(--line);
      background: rgba(5, 5, 7, 0.72);
      backdrop-filter: blur(20px);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 680;
      letter-spacing: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      font-size: 12px;
      white-space: nowrap;
    }

    .theme-toggle {
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(103, 214, 195, 0.7);
    }

    .dropzone {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 184px;
      margin: 2px 12px 14px;
      padding: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.015)),
        rgba(255, 255, 255, 0.025);
      overflow: hidden;
    }

    .dropzone.is-dragging {
      border-color: rgba(103, 214, 195, 0.9);
      background: rgba(103, 214, 195, 0.09);
    }

    .dropzone.is-hidden {
      display: none;
    }

    .drop-content {
      display: grid;
      justify-items: center;
      gap: 12px;
      text-align: center;
    }

    .upload-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent);
    }

    .upload-mark svg {
      width: 24px;
      height: 24px;
    }

    .drop-title {
      margin: 0;
      font-size: 14px;
      font-weight: 620;
    }

    .drop-subtitle {
      margin: -4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .primary-btn,
    .ghost-btn {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 8px;
      color: #09100f;
      background: var(--accent);
      font-size: 13px;
      font-weight: 650;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
    }

    .ghost-btn:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.075);
    }

    .file-input {
      display: none;
    }

    .control-stack {
      min-height: 0;
      min-width: 0;
      overflow-x: hidden;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 0;
      padding-right: 2px;
      scrollbar-width: none;
    }

    .control-stack::-webkit-scrollbar {
      display: none;
    }

    .control-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(13, 15, 18, 0.76);
    }

    .control-card.is-hidden {
      display: none;
    }

    #effect-card,
    #image-card,
    #motion-card {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    #effect-card,
    #image-card {
      border-bottom: 1px solid var(--line);
    }

    #effect-card .control-card-head {
      border-bottom: 0;
    }

    .effect-description {
      margin: -2px 0 0;
      padding: 0 12px 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .control-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 6px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .control-card-head .segmented-control {
      width: auto;
      flex: 1;
      min-width: 0;
    }

    .control-card-title {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .mode-select {
      height: 26px;
      max-width: 132px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel-2);
      font-size: 12px;
    }

    .effect-select {
      flex: 1;
      max-width: none;
      min-width: 0;
    }

    .segmented-control {
      width: 100%;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(0, 1fr);
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.035);
    }

    .segmented-control[hidden] {
      display: none;
    }

    .segment-btn {
      min-width: 0;
      min-height: 26px;
      border-radius: 5px;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
    }

    .segment-btn.is-active {
      color: #ffffff;
      background: var(--accent);
    }

    .controls {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 0;
      padding: 0 12px 10px;
    }

    .control {
      position: relative;
      z-index: 0;
      min-width: 0;
      display: grid;
      gap: 7px;
      padding: 14px 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }

    .control {
      grid-column: 1 / -1;
    }

    .controls > .control:last-child,
    .controls > .keyframe-editor:last-child {
      border-bottom: 0;
    }

    .controls > .keyframe-editor {
      grid-column: 1 / -1;
    }

    .control::after {
      content: attr(data-tip);
      position: absolute;
      left: 10px;
      right: 10px;
      top: calc(100% + 6px);
      z-index: 10;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(8, 9, 12, 0.96);
      color: rgba(245, 247, 251, 0.88);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.38);
      font-size: 12px;
      line-height: 1.45;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .control:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .control:hover {
      z-index: 20;
    }

    .control-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .control-label {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control-value {
      color: var(--text);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
    }

    .control--color .control-value,
    .control--color-alpha .control-value,
    .control--choice .control-value,
    .control--button .control-value {
      display: none;
    }

    input[type="range"]:not(.rgba-opacity-slider) {
      width: 100%;
      height: 14px;
      appearance: none;
      border: 0;
      border-radius: 999px;
      background:
        linear-gradient(90deg, var(--accent) var(--range-progress, 0%), var(--range-track) 0);
      cursor: pointer;
    }

    input[type="range"]:not(.rgba-opacity-slider)::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: transparent;
    }

    input[type="range"]:not(.rgba-opacity-slider)::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      margin-top: -4px;
      border: 2px solid var(--panel);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.18);
    }

    input[type="range"]:not(.rgba-opacity-slider)::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: transparent;
    }

    input[type="range"]:not(.rgba-opacity-slider)::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border: 2px solid var(--panel);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.18);
    }

    .keyframe-editor {
      min-width: 0;
      display: grid;
      gap: 9px;
      padding: 14px 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }

    .keyframe-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .keyframe-head--actions-only {
      justify-content: flex-end;
    }

    .keyframe-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .keyframe-list {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .keyframe-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
    }

    .oscilloscope-row {
      display: grid;
      grid-template-columns: 18px repeat(4, minmax(46px, 1fr)) minmax(126px, 1.4fr) 30px;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .oscilloscope-row-head {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
    }

    .oscilloscope-note {
      margin: -2px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .particle-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .particle-thumb {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      object-fit: cover;
      background: #050507;
    }

    .particle-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 12px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .particle-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font: 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .particle-color-row {
      display: grid;
      grid-template-columns: minmax(126px, 1fr) 72px 56px 30px;
      align-items: center;
      gap: 8px;
    }

    .keyframe-index {
      width: 18px;
      color: var(--muted);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      text-align: right;
    }

    .keyframe-input {
      min-width: 0;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 7px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font-size: 13px;
    }

    .icon-btn {
      width: 30px;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 16px;
      line-height: 1;
    }

    .icon-btn:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.07);
    }

    .icon-btn.is-active {
      color: #0b1412;
      border-color: rgba(126, 225, 207, 0.75);
      background: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
      background: transparent;
    }

    .control-input-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    input[type="color"] {
      width: 44px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
    }

    .rgba-control {
      position: relative;
      min-width: 0;
      width: 100%;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) 58px;
      align-items: center;
      gap: 6px;
    }

    .rgba-swatch {
      position: relative;
      width: 34px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, 0.12) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.12) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.12) 75%),
        #15171c;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
      background-size: 12px 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .rgba-swatch::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--rgba-preview, #ffffff);
    }

    .rgba-field {
      min-width: 0;
      width: 100%;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .rgba-opacity-wrap {
      position: relative;
      min-width: 0;
    }

    .rgba-opacity {
      padding-right: 20px;
      text-align: right;
    }

    .rgba-percent {
      position: absolute;
      right: 7px;
      top: 50%;
      color: var(--muted);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .rgba-field.is-invalid {
      border-color: rgba(240, 122, 122, 0.8);
      color: #ffd1d1;
    }

    .rgba-popover {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      z-index: 80;
      width: min(320px, calc(100vw - 36px));
      display: none;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(38, 39, 43, 0.98);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
    }

    .rgba-control.is-open {
      z-index: 90;
    }

    .rgba-control.is-open .rgba-popover {
      display: grid;
    }

    .rgba-popover-row {
      min-width: 0;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
    }

    .rgba-picker {
      width: 44px;
      height: 32px;
    }

    .rgba-opacity-row {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 58px;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 36px;
      height: 20px;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      padding: 0;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 0;
      background:
        linear-gradient(45deg, rgba(255, 255, 255, 0.028) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 255, 255, 0.028) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.028) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.028) 75%),
        #090a0d;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      background-size: 24px 24px;
      overflow: hidden;
    }

    .motion-svg {
      width: min(72vmin, 620px);
      height: min(72vmin, 620px);
      overflow: visible;
      color: #f6f7f1;
      filter: drop-shadow(0 18px 44px rgba(0, 0, 0, 0.42));
    }

    .particle-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      touch-action: none;
    }

    .line-edit-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding-top: 12px;
    }

    .line-edit-bar[hidden] {
      display: none;
    }

    .line-edit-hint {
      color: var(--muted);
      font-size: 12px;
    }

    .line-edit-popover {
      position: absolute;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(8, 9, 12, 0.92);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .line-edit-popover[hidden] {
      display: none;
    }

    .line-edit-tabs {
      display: inline-flex;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    .line-edit-tabs .icon-btn {
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .line-edit-tabs .icon-btn.is-active {
      color: #0b1412;
      background: var(--accent);
    }

    .line-edit-tabs .icon-btn + .icon-btn {
      border-left: 1px solid var(--line);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .line-edit-point {
      fill: rgba(126, 225, 207, 0.78);
      stroke: rgba(7, 10, 13, 0.92);
      stroke-width: 0.45;
      cursor: crosshair;
      pointer-events: all;
      vector-effect: non-scaling-stroke;
    }

    .line-edit-point.is-selected {
      fill: #f0c96a;
    }

    .line-path {
      pointer-events: stroke;
    }

    .line-path.is-selected {
      filter: drop-shadow(0 0 4px rgba(126, 225, 207, 0.75));
    }

    .line-edit-handle-line {
      stroke: rgba(126, 225, 207, 0.42);
      stroke-width: 0.35;
      stroke-dasharray: 1.1 1.1;
      vector-effect: non-scaling-stroke;
    }

    .line-edit-handle {
      fill: #7ee1cf;
      stroke: rgba(7, 10, 13, 0.92);
      stroke-width: 0.5;
      cursor: grab;
      pointer-events: all;
      vector-effect: non-scaling-stroke;
    }

    .line-edit-handle:active {
      cursor: grabbing;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .statusbar[hidden] {
      display: none;
    }

    .status-items {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      white-space: nowrap;
    }

    .inspector {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      gap: 0;
      padding: 0;

      background: rgba(13, 15, 18, 0.76);
      overflow: hidden;

      display: grid;
      grid-template-rows: 28px 136px;

      height: 136px;
      display: block;
      background: #090a0d;
    }

    .formula-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .formula {
      margin: 0;
      padding: 12px;

    .code-panel {
      display: grid;

      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;

    .code {

      padding: 12px;

      background: #07080a;
      font: 11px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre;
    }

    body[data-theme="light"] {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-2: #eef2f6;
      --line: rgba(18, 25, 38, 0.12);

    @media (max-width: 1040px) {

      }
    }

    @media (max-width: 520px) {

      if (key === "pulseCycleMs" && Number(value) === 0) return "关闭";
      if (key.endsWith("Ms")) return `${(value / 1000).toFixed(1)}s`;
      if (key === "pulseGapRatio") return `${Math.round(value * 100)}%`;
      if (key === "oscMode") return value === "parallel" ? "并列" : "转换";
      if (key === "particleType") {
        if (value === "square") return "方块";
        if (value === "ascii") return "ASCII";
        return "圆形";
      }
      if (key === "particleStructure") return value === "matrix" ? "点阵" : "粒子";
      if (key === "particleRenderMode") return value === "ascii" ? "ASCII" : "填充";
      if (key === "particleStrengthenEdges") return value ? "开" : "关";
      if (key === "particleDensity" || key === "particleStability") return `${Math.round(Number(value) * 100)}%`;
      if (key === "particleMouseForce") return `${Number(value).toFixed(2)}x`;
      if (key === "particleSquareMotion") return value === "scan" ? "扫描" : "故障";
      if (key === "particleSquareOnColor") return colorToRgbaText(value, config.particleSquareOnOpacity);
      if (key === "particleSquareOffColor") return colorToRgbaText(value, config.particleSquareOffOpacity);
      if (key === "particleSquareOnOpacity" || key === "particleSquareOffOpacity") return `${Math.round(Number(value) * 100)}%`;
      if (key === "particleSize") return Number(value).toFixed(2);
      if (key.startsWith("morph")) {
        if (key === "morphColor") return colorToRgbaText(value, config.morphOpacity);
        if (key === "morphMotionMode") return value === "fusion" ? "融合" : "变形";
        if (key === "morphBreath") return `${Math.round(Number(value) * 100)}%`;
        if (key === "morphShapeDetail") return `${Math.round(Number(value))}`;
        if (key === "morphFusionRotationDeg") return `${Math.round(Number(value))}deg`;
        return key.endsWith("Ms") ? `${(value / 1000).toFixed(1)}s` : Number(value).toFixed(2);
      }
      if (key === "cellMotionType") {
        if (value === "blink") return "闪烁";
        if (value === "grow") return "生长";
        if (value === "rotate") return "旋转";
        return "换位";
      }

      if (key === "trailSpan" || key === "strokeWidth" || key === "sampleRatio" || key === "lineStrokeWidth" || key === "lineCharSize" || key.startsWith("sine")) {
        if (key === "sineLineCount") return `${Math.round(value)}`;
        if (key === "sineColor") return colorToRgbaText(value);
        return Number(value).toFixed(2);
      }
      if (key.startsWith("osc")) {
        if (key === "oscRefreshMode") return value === "draw" ? "一笔画" : "旋转";
        if (key === "oscGlow") return `${Math.round(value * 100)}%`;
        return Number(value).toFixed(Number.isInteger(Number(value)) ? 0 : 2);
      }
      if (key === "contourColor") return colorToRgbaText(value, config.contourOpacity);
      if (key === "motionColor") return colorToRgbaText(value, config.motionOpacity);
      if (key === "lineColor") return colorToRgbaText(value, config.lineOpacity);
      if (key === "lineCharColor") return colorToRgbaText(value, config.lineCharOpacity);
      if (typeof value === "string" && parseColorValue(value)) return colorToRgbaText(value);
      if (typeof value === "boolean") return value ? "开" : "关";
      return `${Math.round(value)}`;
    }

    function parseColorValue(value) {
      const text = String(value || "").trim();
      const hex = text.match(/^#?([0-9a-f]{3,4}|[0-9a-f]{6}|[0-9a-f]{8})$/i);
      if (hex) {
        let raw = hex[1];
        if (raw.length === 3 || raw.length === 4) raw = raw.split("").map((char) => char + char).join("");
        const hasAlpha = raw.length === 8;
        const r = parseInt(raw.slice(0, 2), 16);
        const g = parseInt(raw.slice(2, 4), 16);
        const b = parseInt(raw.slice(4, 6), 16);
        const a = hasAlpha ? parseInt(raw.slice(6, 8), 16) / 255 : 1;
        return { r, g, b, a };
      }
      const rgba = text.match(/^rgba?\(\s*([+-]?\d*\.?\d+)\s*,\s*([+-]?\d*\.?\d+)\s*,\s*([+-]?\d*\.?\d+)(?:\s*,\s*([+-]?\d*\.?\d+%?))?\s*\)$/i);
      if (!rgba) return null;
      const alphaRaw = rgba[4] ?? "1";
      const alpha = alphaRaw.endsWith("%") ? Number(alphaRaw.slice(0, -1)) / 100 : Number(alphaRaw);
      return {
        r: clamp(Math.round(Number(rgba[1])), 0, 255),
        g: clamp(Math.round(Number(rgba[2])), 0, 255),
        b: clamp(Math.round(Number(rgba[3])), 0, 255),
        a: clamp(Number.isFinite(alpha) ? alpha : 1, 0, 1),
      };
    }

    function colorPartsToHex({ r, g, b }) {
      return `#${[r, g, b].map((part) => clamp(Math.round(part), 0, 255).toString(16).padStart(2, "0")).join("")}`;
    }

    function colorPartsToCss(parts) {
      const alpha = clamp(Number(parts.a ?? 1), 0, 1);
      if (alpha >= 1) return colorPartsToHex(parts);
      return `rgba(${parts.r}, ${parts.g}, ${parts.b}, ${Number(alpha.toFixed(3))})`;
    }

    function isValidColorString(value) {
      return Boolean(parseColorValue(value));
    }

    function colorToRgbaText(color, opacity) {
      const parts = parseColorValue(color) ?? { r: 255, g: 255, b: 255, a: 1 };
      const alpha = clamp(Number(opacity == null ? (parts.a ?? 1) : opacity), 0, 1);
      return `rgba(${parts.r}, ${parts.g}, ${parts.b}, ${Number(alpha.toFixed(3))})`;
    }

    function applyColorValue(colorKey, text, alphaKey = "") {
      const parts = parseColorValue(text);
      if (!parts) return false;
      if (alphaKey) {
        config[colorKey] = colorPartsToHex(parts);
        config[alphaKey] = parts.a;
      } else {
        config[colorKey] = colorPartsToCss(parts);
      }
      return true;
    }

    function currentColorPartsForControl(control) {
      const colorKey = control.dataset.colorKey;
      const alphaKey = control.dataset.alphaKey;
      const color = config[colorKey] ?? control.dataset.colorValue ?? "#ffffff";
      const parts = parseColorValue(color) ?? { r: 255, g: 255, b: 255, a: 1 };
      const alpha = alphaKey ? (config[alphaKey] ?? parts.a ?? 1) : (parts.a ?? Number(control.dataset.opacityValue ?? 1));
      return { ...parts, a: clamp(Number(alpha), 0, 1) };
    }

    function updateRgbaControl(control) {
      const colorKey = control.dataset.colorKey;
      if (!colorKey) return;
      const parts = currentColorPartsForControl(control);
      const text = colorToRgbaText(colorPartsToCss(parts));
      control.style.setProperty("--rgba-preview", text);
      const hexInput = control.querySelector(".rgba-hex");
      const opacityInput = control.querySelector(".rgba-opacity");
      const picker = control.querySelector(".rgba-picker");
      const freeInput = control.querySelector(".rgba-input");
      const popupOpacity = control.querySelector(".rgba-opacity-popup");
      const slider = control.querySelector(".rgba-opacity-slider");
      const hex = colorPartsToHex(parts).slice(1).toUpperCase();
      const opacity = String(Math.round(parts.a * 100));
      if (hexInput && document.activeElement !== hexInput) hexInput.value = hex;
      if (opacityInput && document.activeElement !== opacityInput) opacityInput.value = opacity;
      if (picker) picker.value = `#${hex}`;
      if (freeInput && document.activeElement !== freeInput) freeInput.value = text;
      if (popupOpacity && document.activeElement !== popupOpacity) popupOpacity.value = opacity;
      if (slider) slider.value = opacity;
    }

    function syncRgbaControls(colorKey) {
      document.querySelectorAll(`.rgba-control[data-color-key="${colorKey}"]`).forEach(updateRgbaControl);
    }

    function renderRgbaControl({ colorKey, alphaKey = "", label, tip, value, opacity = 1, onInput, extraDataset = {} }) {
      const control = document.createElement("div");
      control.className = "rgba-control";
      control.dataset.colorKey = colorKey;
      control.dataset.colorValue = value;
      if (opacity != null) control.dataset.opacityValue = opacity;
      if (alphaKey) control.dataset.alphaKey = alphaKey;
      Object.entries(extraDataset).forEach(([key, entryValue]) => {
        control.dataset[key] = entryValue;
      });
      control.innerHTML = `
        <button class="rgba-swatch" type="button" data-rgba-open="1" aria-label="打开 ${label} 颜色设置"></button>
        <input class="rgba-field rgba-hex" data-rgba-hex="1" aria-label="${label} HEX" title="${tip}">
        <span class="rgba-opacity-wrap">
          <input class="rgba-field rgba-opacity" data-rgba-opacity="1" inputmode="numeric" aria-label="${label} 透明度百分比">
          <span class="rgba-percent">%</span>
        </span>
        <div class="rgba-popover">
          <div class="rgba-popover-row">
            <input class="rgba-picker" type="color" data-rgba-picker="1" aria-label="${label} 色相">
            <input class="rgba-field rgba-input" data-rgba-input="1" aria-label="${label} RGBA 或 HEX" title="支持 HEX、HEXA、RGB 和 RGBA">
          </div>
          <div class="rgba-opacity-row">
            <input class="rgba-opacity-slider" type="range" min="0" max="100" step="1" data-rgba-opacity-slider="1" aria-label="${label} 透明度滑杆">
            <span class="rgba-opacity-wrap">
              <input class="rgba-field rgba-opacity-popup" data-rgba-opacity-popup="1" inputmode="numeric" aria-label="${label} 透明度百分比">
              <span class="rgba-percent">%</span>
            </span>
          </div>
        </div>
      `;
      control.querySelectorAll("input").forEach((input) => input.addEventListener("input", onInput));
      control.addEventListener("click", (event) => {
        if (event.target.closest("[data-rgba-open], .rgba-hex, .rgba-opacity")) {
          document.querySelectorAll(".rgba-control.is-open").forEach((item) => {
            if (item !== control) item.classList.remove("is-open");
          });
          control.classList.add("is-open");
        }
      });
      control.addEventListener("focusin", () => control.classList.add("is-open"));
      updateRgbaControl(control);
      return control;
    }

    document.addEventListener("pointerdown", (event) => {
      if (event.target.closest(".rgba-control")) return;
      document.querySelectorAll(".rgba-control.is-open").forEach((control) => control.classList.remove("is-open"));
    });

    function colorPartsFromRgbaControlTarget(target, control) {
      const current = currentColorPartsForControl(control);
      if (target.dataset.rgbaPicker) return parseColorValue(colorToRgbaText(target.value, current.a));
      if (target.dataset.rgbaHex) return parseColorValue(colorToRgbaText(target.value, current.a));
      if (target.dataset.rgbaInput) return parseColorValue(target.value);
      if (target.dataset.rgbaOpacity || target.dataset.rgbaOpacityPopup || target.dataset.rgbaOpacitySlider) {
        const alpha = clamp(Number(target.value) / 100, 0, 1);
        return parseColorValue(colorToRgbaText(colorPartsToHex(current), alpha));
      }
      return null;
    }

    function markRgbaControlValidity(control, valid) {
      control.querySelectorAll(".rgba-field").forEach((field) => field.classList.toggle("is-invalid", !valid));
    }

    function handleRgbaInput(target, onApply) {
      const control = target.closest(".rgba-control");
      if (!control) return false;
      const colorKey = control.dataset.colorKey;
      const alphaKey = control.dataset.alphaKey || "";
      const parts = colorPartsFromRgbaControlTarget(target, control);
      const valid = Boolean(parts);
      markRgbaControlValidity(control, valid);
      if (!valid) return true;
      applyColorValue(colorKey, colorToRgbaText(colorPartsToHex(parts), parts.a), alphaKey);
      updateRgbaControl(control);
      onApply?.(colorKey, alphaKey, control);
      return true;
    }

    function renderOptionTabs(control, onInput) {
      const segmented = document.createElement("div");
      segmented.className = "segmented-control";
      segmented.setAttribute("role", "tablist");
      segmented.setAttribute("aria-label", control.label);
      control.options.forEach((option) => {
        const button = document.createElement("button");
        button.className = `segment-btn${config[control.key] === option.value ? " is-active" : ""}`;
        button.type = "button";
        button.textContent = option.label;
        button.dataset.key = control.key;
        button.dataset.optionValue = option.value;
        button.title = control.tip;
        button.addEventListener("click", onInput);
        segmented.appendChild(button);
      });
      return segmented;
    }

    function updateRangeProgress(input) {
      if (!input || input.type !== "range") return;
      const min = Number(input.min || 0);
      const max = Number(input.max || 100);
      const value = Number(input.value || 0);
      const progress = max === min ? 0 : ((value - min) / (max - min)) * 100;
      input.style.setProperty("--range-progress", `${clamp(progress, 0, 100)}%`);
    }

    function renderControls(container, defs, onInput, clear = true) {
      if (clear) container.innerHTML = "";
      defs.forEach((control) => {
        if (control.showWhen && !control.showWhen()) return;
        const label = document.createElement("label");
        label.className = "control";
        label.title = control.tip;
        label.dataset.tip = control.tip;
        label.innerHTML = `
          <div class="control-head">
            <span class="control-label" title="${control.tip}">${control.label}</span>
            <span class="control-value" data-value-key="${control.key}">${formatControlValue(control.key, config[control.key])}</span>
          </div>
          <div class="control-input-row"></div>
        `;
        const row = label.querySelector(".control-input-row");
        const input = document.createElement("input");
        input.dataset.key = control.key;
        input.title = control.tip;
        if (control.type === "button") {
          label.classList.add("control--button");
          const button = document.createElement("button");
          button.className = "small-btn";
          button.type = "button";
          button.textContent = control.buttonLabel ?? control.label;
          button.dataset.key = control.key;
          button.title = control.tip;
          button.addEventListener("click", onInput);
          const value = label.querySelector(".control-value");
          if (value) value.textContent = "";
          row.appendChild(button);
          container.appendChild(label);
          return;
        } else if (control.type === "colorAlpha") {
          label.classList.add("control--color-alpha");
          row.appendChild(renderRgbaControl({
            colorKey: control.key,
            alphaKey: control.alphaKey,
            label: control.label,
            tip: control.tip,
            value: config[control.key],
            opacity: config[control.alphaKey],
            onInput,
          }));
          container.appendChild(label);
          return;
        } else if (control.type === "color") {
          label.classList.add("control--color");
          row.appendChild(renderRgbaControl({
            colorKey: control.key,
            label: control.label,
            tip: control.tip,
            value: config[control.key],
            onInput,
          }));
          container.appendChild(label);
          return;
        } else if (control.type === "select") {
          label.classList.add("control--choice");
          if (control.key === "cellMotionType") {
            const select = document.createElement("select");
            select.className = "mode-select effect-select";
            select.dataset.key = control.key;
            select.title = control.tip;
            control.options.forEach((option) => {
              const item = document.createElement("option");
              item.value = option.value;
              item.textContent = option.label;
              select.appendChild(item);
            });
            select.value = config[control.key];
            select.addEventListener("input", onInput);
            row.appendChild(select);
          } else {
            row.appendChild(renderOptionTabs(control, onInput));
          }
          container.appendChild(label);
          return;
        } else if (control.type === "segmented") {
          label.classList.add("control--choice");
          row.appendChild(renderOptionTabs(control, onInput));
          container.appendChild(label);
          return;
        } else if (control.type === "toggle") {
          input.type = "checkbox";
          input.checked = Boolean(config[control.key]);
        } else {
          input.type = "range";
          input.min = typeof control.min === "function" ? control.min() : control.min;
          input.max = typeof control.max === "function" ? control.max() : control.max;
          input.step = control.step;
          input.value = config[control.key];
          updateRangeProgress(input);
        }
        input.addEventListener("input", (event) => {
          updateRangeProgress(input);
          onInput(event);
        });
        row.appendChild(input);
        container.appendChild(label);
      });
    }

    function renderLineKeyframeEditor(container) {
      const editor = document.createElement("div");
      editor.className = "keyframe-editor";
      editor.innerHTML = `
        <div class="keyframe-head">
          <p class="keyframe-title">关键帧</p>
          <div class="panel-actions">
            <button class="small-btn" type="button" data-keyframe-action="add">添加</button>
          </div>
        </div>
        <div class="keyframe-list"></div>
      `;
      const list = editor.querySelector(".keyframe-list");
      config.lineKeyframes.forEach((frame, index) => {
        const row = document.createElement("div");
        row.className = "keyframe-row";
        row.innerHTML = `
          <span class="keyframe-index">${index + 1}</span>
          <input class="keyframe-input" data-keyframe-id="${frame.id}" value="${escapeHtml(frame.text)}" aria-label="关键帧 ${index + 1}">
          <button class="icon-btn${state.lineEdit?.frameId === frame.id ? " is-active" : ""}" type="button" data-keyframe-action="edit" data-keyframe-id="${frame.id}" aria-label="编辑关键帧 ${index + 1} 曲线">✎</button>
          <button class="icon-btn" type="button" data-keyframe-action="delete" data-keyframe-id="${frame.id}" aria-label="删除关键帧 ${index + 1}">×</button>
        `;
        list.appendChild(row);
      });
      editor.addEventListener("input", (event) => {
        const input = event.target.closest(".keyframe-input");
        if (!input) return;
        const frame = config.lineKeyframes.find((item) => String(item.id) === String(input.dataset.keyframeId));
        if (!frame) return;
        frame.text = input.value;
        resetLineFrameGeometry(frame);
        activeEffect().prepare();
        state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
      });
      editor.addEventListener("click", (event) => {
        const button = event.target.closest("[data-keyframe-action]");
        if (!button) return;
        const action = button.dataset.keyframeAction;
        if (action === "add") {
          const nextId = Math.max(0, ...config.lineKeyframes.map((frame) => frame.id)) + 1;
          config.lineKeyframes.push({ id: nextId, text: "line" });
        } else if (action === "edit") {
          const frameId = Number(button.dataset.keyframeId);
          if (state.lineEdit?.frameId === frameId) finishLineCurveEdit();
          else startLineCurveEdit(frameId);
          return;
        } else if (action === "delete" && config.lineKeyframes.length > 1) {
          config.lineKeyframes = config.lineKeyframes.filter((frame) => String(frame.id) !== String(button.dataset.keyframeId));
          if (state.lineEdit?.frameId === Number(button.dataset.keyframeId)) finishLineCurveEdit();
        }
        renderMotionControls();
        activeEffect().prepare();
        state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
      });
      container.appendChild(editor);
    }

    function renderOscilloscopeFigureEditor(container) {
      const editor = document.createElement("div");
      editor.className = "keyframe-editor";
      editor.innerHTML = `
        <div class="keyframe-head">
          <p class="keyframe-title">李萨如图形</p>
          <div class="panel-actions">
            <button class="small-btn" type="button" data-osc-action="add">添加</button>
          </div>
        </div>
        <p class="oscilloscope-note">X &gt; Y 时看起来像上下旋转，X &lt; Y 时看起来像左右旋转。</p>
        <div class="oscilloscope-row oscilloscope-row-head" aria-hidden="true">
          <span></span><span>X</span><span>Y</span><span>相位</span><span>旋转</span><span>颜色</span><span></span>
        </div>
        <div class="keyframe-list"></div>
      `;
      const list = editor.querySelector(".keyframe-list");
      config.oscFigures.forEach((figure, index) => {
        const row = document.createElement("div");
        row.className = "oscilloscope-row";
        row.innerHTML = `
          <span class="keyframe-index">${index + 1}</span>
          <input class="keyframe-input" type="number" min="1" max="12" step="1" value="${figure.xFreq}" data-osc-id="${figure.id}" data-osc-field="xFreq" aria-label="图形 ${index + 1} X 频率">
          <input class="keyframe-input" type="number" min="1" max="12" step="1" value="${figure.yFreq}" data-osc-id="${figure.id}" data-osc-field="yFreq" aria-label="图形 ${index + 1} Y 频率">
          <input class="keyframe-input" type="number" min="0" max="360" step="1" value="${figure.phaseDeg}" data-osc-id="${figure.id}" data-osc-field="phaseDeg" aria-label="图形 ${index + 1} 相位">
          <input class="keyframe-input" type="number" min="-180" max="180" step="1" value="${figure.rotationDeg}" data-osc-id="${figure.id}" data-osc-field="rotationDeg" aria-label="图形 ${index + 1} 旋转">
          <button class="icon-btn" type="button" data-osc-action="delete" data-osc-id="${figure.id}" aria-label="删除图形 ${index + 1}">×</button>

          colorKey: `osc-${figure.id}`,

          value: figure.color,
          onInput: (event) => {
            const control = event.target.closest(".rgba-control");
            const parts = colorPartsFromRgbaControlTarget(event.target, control);
            markRgbaControlValidity(control, Boolean(parts));
            if (!parts) return;
            figure.color = colorPartsToCss(parts);
            control.dataset.colorValue = figure.color;
            control.dataset.opacityValue = parts.a;
            updateRgbaControl(control);
            activeEffect().prepare();
            state.startedAt = performance.now();
            updateMeta();
            updateFormulaAndCode();
          },
        }), row.lastElementChild);
        list.appendChild(row);
      });
      editor.addEventListener("input", (event) => {
        const input = event.target.closest("[data-osc-field]");
        if (!input) return;
        const figure = config.oscFigures.find((item) => String(item.id) === String(input.dataset.oscId));
        if (!figure) return;
        const field = input.dataset.oscField;
        if (field === "xFreq" || field === "yFreq") figure[field] = clamp(Math.round(Number(input.value)), 1, 12);
        else if (field === "phaseDeg") figure[field] = ((Number(input.value) % 360) + 360) % 360;
        else figure[field] = clamp(Number(input.value), -180, 180);
        activeEffect().prepare();
        state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
      });
      editor.addEventListener("click", (event) => {
        const button = event.target.closest("[data-osc-action]");
        if (!button) return;
        const action = button.dataset.oscAction;
        if (action === "add") {
          const nextId = Math.max(0, ...config.oscFigures.map((figure) => figure.id)) + 1;
          const palette = ["#67d6c3", "#f0c96a", "#f07a7a", "#9ca7ff", "#f58bc7"];
          const index = config.oscFigures.length;
          config.oscFigures.push({
            id: nextId,
            xFreq: 2 + (index % 4),
            yFreq: 4 + (index % 5),
            phaseDeg: (45 + index * 37) % 180,
            rotationDeg: 0,
            color: palette[index % palette.length],
          });
        } else if (action === "delete" && config.oscFigures.length > 1) {
          config.oscFigures = config.oscFigures.filter((figure) => String(figure.id) !== String(button.dataset.oscId));
        }
        renderMotionControls();
        activeEffect().prepare();
        state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
      });
      container.appendChild(editor);
    }

    function renderParticleColorEditorValue(input) {

    function escapeHtml(value) {

        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")

    function setStatus(text) {
      stateLabel.textContent = text;
    }

    function normalizeProgress(progress) {
      return ((progress % 1) + 1) % 1;
    }

    function pointKey(point) {
      return `${Math.round(point.x * 2)},${Math.round(point.y * 2)}`;
    }

    function edgeKey(a, b) {
      const ka = pointKey(a);
      const kb = pointKey(b);
      return ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.hypot(dx, dy);
    }

    function triangleArea(a, b, c) {
      return Math.abs((a.x * (b.y - c.y) + b.x * (c.y - a.y) + c.x * (a.y - b.y)) / 2);
    }

    function simplifyToPointCount(points, pointCount) {
      const target = Math.max(8, Math.round(pointCount));
      const maxInput = Math.max(target * 24, 256);
      const source = points.length > maxInput ? resampleClosed(points, maxInput) : points;
      let simplified = source.filter((point, index) => index === 0 || distance(point, source[index - 1]) > 0.01);
      if (simplified.length <= target) return simplified;
      while (simplified.length > target) {
        let removeIndex = 0;
        let smallestArea = Infinity;
        for (let i = 0; i < simplified.length; i += 1) {
          const prev = simplified[(i - 1 + simplified.length) % simplified.length];
          const curr = simplified[i];
          const next = simplified[(i + 1) % simplified.length];
          const area = triangleArea(prev, curr, next);
          if (area < smallestArea) {
            smallestArea = area;
            removeIndex = i;
          }
        }
        simplified.splice(removeIndex, 1);
      }
      return simplified;
    }

    function makeScalarField(imageData, mode) {
      const { width, height, data } = imageData;
      const total = width * height;
      const scalar = new Float32Array(total);
      const corners = [
        [0, 0],
        [width - 1, 0],
        [0, height - 1],
        [width - 1, height - 1],
      ];
      const bg = corners.reduce((acc, [x, y]) => {
        const i = (y * width + x) * 4;
        acc.r += data[i];
        acc.g += data[i + 1];
        acc.b += data[i + 2];
        acc.a += data[i + 3];
        return acc;
      }, { r: 0, g: 0, b: 0, a: 0 });
      bg.r /= corners.length;
      bg.g /= corners.length;
      bg.b /= corners.length;
      bg.a /= corners.length;

      let transparentPixels = 0;
      const gray = new Float32Array(total);
      for (let i = 0; i < total; i += 1) {
        const j = i * 4;
        const alpha = data[j + 3];
        if (alpha < 245) transparentPixels += 1;
        gray[i] = data[j] * 0.299 + data[j + 1] * 0.587 + data[j + 2] * 0.114;
      }
      const hasAlpha = transparentPixels / total > 0.02;

      if (mode === "edges") {
        return { ...sobelScalar(gray, width, height), kind: "edges" };
      }

      let kind = "luma";
      for (let i = 0; i < total; i += 1) {
        const j = i * 4;
        if (hasAlpha && mode !== "silhouette") {
          scalar[i] = data[j + 3];
          kind = "alpha";
        } else if (mode === "silhouette") {
          const dr = data[j] - bg.r;
          const dg = data[j + 1] - bg.g;
          const db = data[j + 2] - bg.b;
          scalar[i] = Math.hypot(dr, dg, db);
          kind = "silhouette";
        } else {
          scalar[i] = gray[i];
        }
      }
      return { scalar, width, height, kind };
    }

    function sobelScalar(gray, width, height) {
      const scalar = new Float32Array(width * height);
      for (let y = 1; y < height - 1; y += 1) {
        for (let x = 1; x < width - 1; x += 1) {
          const i = y * width + x;
          const gx =
            -gray[i - width - 1] + gray[i - width + 1] -
            2 * gray[i - 1] + 2 * gray[i + 1] -
            gray[i + width - 1] + gray[i + width + 1];
          const gy =
            -gray[i - width - 1] - 2 * gray[i - width] - gray[i - width + 1] +
            gray[i + width - 1] + 2 * gray[i + width] + gray[i + width + 1];
          scalar[i] = Math.min(255, Math.hypot(gx, gy) / 4);
        }
      }
      return { scalar, width, height };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function percentileSorted(sorted, ratio) {
      if (!sorted.length) return 0;
      const index = clamp(Math.round((sorted.length - 1) * ratio), 0, sorted.length - 1);
      return sorted[index];
    }

    function otsuLevel(scalar) {
      const hist = new Float64Array(256);
      let total = 0;
      let sum = 0;
      for (let i = 0; i < scalar.length; i += 1) {
        const value = clamp(Math.round(scalar[i]), 0, 255);
        hist[value] += 1;
        total += 1;
        sum += value;
      }

      let backgroundWeight = 0;
      let backgroundSum = 0;
      let bestVariance = -1;
      let bestLevel = 0;
      for (let level = 0; level < hist.length; level += 1) {
        backgroundWeight += hist[level];
        if (backgroundWeight === 0) continue;
        const foregroundWeight = total - backgroundWeight;
        if (foregroundWeight === 0) break;
        backgroundSum += level * hist[level];
        const backgroundMean = backgroundSum / backgroundWeight;
        const foregroundMean = (sum - backgroundSum) / foregroundWeight;
        const variance = backgroundWeight * foregroundWeight * (backgroundMean - foregroundMean) ** 2;
        if (variance > bestVariance) {
          bestVariance = variance;
          bestLevel = level;
        }
      }
      return bestLevel;
    }

    function automaticContourLevel(field) {
      if (field.kind === "alpha") return 24;

      const values = [];
      for (let i = 0; i < field.scalar.length; i += 1) {
        if (field.scalar[i] > 2) values.push(field.scalar[i]);
      }
      values.sort((a, b) => a - b);
      if (!values.length) return 12;

      if (field.kind === "edges") {
        return clamp(percentileSorted(values, 0.74), 10, 150);
      }

      const low = percentileSorted(values, 0.12);
      const high = percentileSorted(values, 0.88);
      const otsu = otsuLevel(field.scalar);
      if (otsu <= low + 2 || otsu >= high - 2) {
        return clamp((low + high) / 2, 8, 220);
      }
      return clamp(otsu, 8, 220);
    }

    function contourSegmentsFromScalar(scalar, width, height, level) {
      const lookup = {
        1: [["left", "bottom"]],
        2: [["bottom", "right"]],
        3: [["left", "right"]],
        4: [["top", "right"]],
        5: [["top", "left"], ["bottom", "right"]],
        6: [["top", "bottom"]],
        7: [["top", "left"]],
        8: [["left", "top"]],
        9: [["top", "bottom"]],
        10: [["left", "bottom"], ["top", "right"]],
        11: [["top", "right"]],
        12: [["left", "right"]],
        13: [["bottom", "right"]],
        14: [["left", "bottom"]],
      };
      const mix = (a, b) => {
        const denom = b.value - a.value;
        const t = Math.abs(denom) < 0.000001 ? 0.5 : Math.max(0, Math.min(1, (level - a.value) / denom));
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
      };
      const pointFor = (x, y, edge, values) => {
        const tl = { x, y, value: values.tl };
        const tr = { x: x + 1, y, value: values.tr };
        const br = { x: x + 1, y: y + 1, value: values.br };
        const bl = { x, y: y + 1, value: values.bl };
        if (edge === "top") return mix(tl, tr);
        if (edge === "right") return mix(tr, br);
        if (edge === "bottom") return mix(bl, br);
        return mix(tl, bl);
      };
      const segments = [];
      for (let y = 0; y < height - 1; y += 1) {
        for (let x = 0; x < width - 1; x += 1) {
          const values = {
            tl: scalar[y * width + x],
            tr: scalar[y * width + x + 1],
            br: scalar[(y + 1) * width + x + 1],
            bl: scalar[(y + 1) * width + x],
          };
          const cell = (values.tl >= level ? 8 : 0) |
            (values.tr >= level ? 4 : 0) |
            (values.br >= level ? 2 : 0) |
            (values.bl >= level ? 1 : 0);
          (lookup[cell] ?? []).forEach(([a, b]) => {
            segments.push([pointFor(x, y, a, values), pointFor(x, y, b, values)]);
          });
        }
      }
      return segments;
    }

    function contourPointCloud(segments, width, height) {
      const scale = 100 / Math.max(width, height);
      const seen = new Set();
      const points = [];
      segments.forEach(([a, b]) => {
        [a, b].forEach((point) => {
          const normalized = {
            x: Math.round(point.x * scale * 10) / 10,
            y: Math.round(point.y * scale * 10) / 10,
          };
          const key = `${normalized.x},${normalized.y}`;
          if (!seen.has(key)) {
            seen.add(key);
            points.push(normalized);
          }
        });
      });
      return points;
    }

    function foregroundMaskFromField(field, level) {
      const { scalar, width, height, kind } = field;
      const mask = new Uint8Array(width * height);
      let foregroundIsHigh = true;
      if (kind === "luma") {
        const corners = [0, width - 1, (height - 1) * width, height * width - 1];
        const cornerMean = corners.reduce((sum, index) => sum + scalar[index], 0) / corners.length;
        foregroundIsHigh = cornerMean < level;
      }
      for (let i = 0; i < scalar.length; i += 1) {
        mask[i] = foregroundIsHigh ? Number(scalar[i] >= level) : Number(scalar[i] <= level);
      }
      return { mask, width, height };
    }

    function largestConnectedMask(binary, width, height) {
      const components = connectedComponents(binary, width, height);
      const componentMask = new Uint8Array(binary.length);
      (components[0] ?? []).forEach((index) => { componentMask[index] = 1; });
      return componentMask;
    }

    function connectedComponents(binary, width, height) {
      const visited = new Uint8Array(binary.length);
      const components = [];
      const queue = [];
      const neighbors = [[1, 0], [-1, 0], [0, 1], [0, -1]];
      for (let start = 0; start < binary.length; start += 1) {
        if (!binary[start] || visited[start]) continue;
        const component = [];
        visited[start] = 1;
        queue.length = 0;
        queue.push(start);
        for (let head = 0; head < queue.length; head += 1) {
          const index = queue[head];
          component.push(index);
          const x = index % width;
          const y = Math.floor(index / width);
          neighbors.forEach(([dx, dy]) => {
            const nx = x + dx;
            const ny = y + dy;
            if (nx < 0 || nx >= width || ny < 0 || ny >= height) return;
            const next = ny * width + nx;
            if (!binary[next] || visited[next]) return;
            visited[next] = 1;
            queue.push(next);
          });
        }
        components.push(component);
      }
      return components.sort((a, b) => b.length - a.length);
    }

    function maskFromComponent(component, total) {
      const componentMask = new Uint8Array(total);
      component.forEach((index) => { componentMask[index] = 1; });
      return componentMask;
    }

    function contourPathFromMask(field, level) {
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const component = largestConnectedMask(mask, width, height);
      return contourPathFromComponentMask(component, width, height);
    }

    function contourPathsFromMask(field, level) {
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const components = connectedComponents(mask, width, height);
      const largest = components[0]?.length ?? 0;
      const minArea = Math.max(12, largest * 0.012);
      return components
        .filter((component) => component.length >= minArea)
        .slice(0, 6)
        .map((component) => contourPathFromComponentMask(maskFromComponent(component, mask.length), width, height))
        .filter((path) => path.length >= 4)
        .sort((a, b) => pathLength(b) - pathLength(a));
    }

    function contourPathFromComponentMask(component, width, height) {
      const scale = 100 / Math.max(width, height);
      const inside = (x, y) => x >= 0 && x < width && y >= 0 && y < height && component[y * width + x];
      const vertexKey = (point) => `${point.x},${point.y}`;
      const edgeKey = (a, b) => `${vertexKey(a)}>${vertexKey(b)}`;
      const edges = [];
      const addEdge = (a, b) => {
        edges.push({ a, b, key: edgeKey(a, b) });
      };
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (!inside(x, y)) continue;
          const tl = { x, y };
          const tr = { x: x + 1, y };
          const br = { x: x + 1, y: y + 1 };
          const bl = { x, y: y + 1 };
          if (!inside(x, y - 1)) addEdge(tl, tr);
          if (!inside(x + 1, y)) addEdge(tr, br);
          if (!inside(x, y + 1)) addEdge(br, bl);
          if (!inside(x - 1, y)) addEdge(bl, tl);
        }
      }
      const starts = new Map();
      edges.forEach((edge, index) => {
        const key = vertexKey(edge.a);
        if (!starts.has(key)) starts.set(key, []);
        starts.get(key).push(index);
      });
      const used = new Uint8Array(edges.length);
      const loops = [];
      edges.forEach((edge, index) => {
        if (used[index]) return;
        const loop = [edge.a, edge.b];
        used[index] = 1;
        let current = edge.b;
        const startKey = vertexKey(edge.a);
        for (let guard = 0; guard < edges.length; guard += 1) {
          if (vertexKey(current) === startKey) break;
          const candidates = starts.get(vertexKey(current)) ?? [];
          const nextIndex = candidates.find((candidate) => !used[candidate]);
          if (nextIndex === undefined) break;
          used[nextIndex] = 1;
          current = edges[nextIndex].b;
          loop.push(current);
        }
        if (loop.length > 3 && vertexKey(loop[0]) === vertexKey(loop[loop.length - 1])) loop.pop();
        if (loop.length >= 4) {
          loops.push(loop.map((point) => ({
            x: Math.round(point.x * scale * 10) / 10,
            y: Math.round(point.y * scale * 10) / 10,
          })));
        }
      });
      if (!loops.length) return [];
      return loops.sort((a, b) => pathLength(b) - pathLength(a))[0];
    }

    function contourPathFromSegments(segments, width, height) {
      if (!segments.length) return [];
      const scale = 100 / Math.max(width, height);
      const normalize = (point) => ({
        x: Math.round(point.x * scale * 10) / 10,
        y: Math.round(point.y * scale * 10) / 10,
      });
      const keyFor = (point) => `${point.x},${point.y}`;
      const normalizedSegments = segments.map(([a, b]) => {
        const p0 = normalize(a);
        const p1 = normalize(b);
        return { points: [p0, p1], keys: [keyFor(p0), keyFor(p1)] };
      }).filter((segment) => segment.keys[0] !== segment.keys[1]);
      const byEndpoint = new Map();
      normalizedSegments.forEach((segment, index) => {
        segment.keys.forEach((key) => {
          if (!byEndpoint.has(key)) byEndpoint.set(key, []);
          byEndpoint.get(key).push(index);
        });
      });
      const used = new Uint8Array(normalizedSegments.length);
      const nextUnusedAt = (key) => (byEndpoint.get(key) ?? []).find((index) => !used[index]);
      const grow = (chain, atStart) => {
        while (chain.length) {
          const key = keyFor(atStart ? chain[0] : chain[chain.length - 1]);
          const index = nextUnusedAt(key);
          if (index === undefined) break;
          used[index] = 1;
          const segment = normalizedSegments[index];
          const other = segment.keys[0] === key ? segment.points[1] : segment.points[0];
          if (atStart) chain.unshift(other);
          else chain.push(other);
        }
      };
      const chains = [];
      normalizedSegments.forEach((segment, index) => {
        if (used[index]) return;
        used[index] = 1;
        const chain = [segment.points[0], segment.points[1]];
        grow(chain, false);
        grow(chain, true);
        const deduped = chain.filter((point, pointIndex) => pointIndex === 0 || keyFor(point) !== keyFor(chain[pointIndex - 1]));
        if (deduped.length > 1 && keyFor(deduped[0]) === keyFor(deduped[deduped.length - 1])) deduped.pop();
        if (deduped.length >= 3) chains.push(deduped);
      });
      if (!chains.length) return [];
      return chains.sort((a, b) => pathLength(b) - pathLength(a))[0];
    }

    function deterministicSample(points, ratio, maxPoints = 900) {
      if (!points.length) return [];
      const desired = Math.max(8, Math.min(points.length, maxPoints, Math.round(points.length * ratio)));
      return points
        .map((point, index) => {
          const seed = Math.sin(point.x * 12.9898 + point.y * 78.233 + index * 0.173) * 43758.5453;
          return { point, key: seed - Math.floor(seed) };
        })
        .sort((a, b) => a.key - b.key)
        .slice(0, desired)
        .map((item) => item.point);
    }

    function buildCompleteMST(points) {
      const n = points.length;
      const graph = Array.from({ length: n }, () => []);
      if (n <= 1) return graph;
      const used = new Uint8Array(n);
      const minDistance = new Float64Array(n);
      const parent = new Int32Array(n);
      minDistance.fill(Infinity);
      parent.fill(-1);
      minDistance[0] = 0;
      for (let step = 0; step < n; step += 1) {
        let current = -1;
        let best = Infinity;
        for (let i = 0; i < n; i += 1) {
          if (!used[i] && minDistance[i] < best) {
            best = minDistance[i];
            current = i;
          }
        }
        if (current < 0) break;
        used[current] = 1;
        if (parent[current] >= 0) {
          const p = parent[current];
          const d = Math.sqrt(best);
          graph[current].push({ node: p, distance: d });
          graph[p].push({ node: current, distance: d });
        }
        const a = points[current];
        for (let j = 0; j < n; j += 1) {
          if (used[j]) continue;
          const b = points[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < minDistance[j]) {
            minDistance[j] = d2;
            parent[j] = current;
          }
        }
      }
      return graph;
    }

    function farthestNode(graph, start) {
      const stack = [{ node: start, parent: -1, distance: 0 }];
      let farthest = { node: start, distance: 0 };
      while (stack.length) {
        const item = stack.pop();
        const isLeaf = graph[item.node].length <= 1 && item.node !== start;
        if ((isLeaf || graph[item.node].length === 0) && item.distance > farthest.distance) {
          farthest = { node: item.node, distance: item.distance };
        }
        graph[item.node].forEach((edge) => {
          if (edge.node !== item.parent) {
            stack.push({ node: edge.node, parent: item.node, distance: item.distance + edge.distance });
          }
        });
      }
      return farthest.node;
    }

    function treePathFromSamples(points) {
      if (points.length <= 2) return points.slice();
      const graph = buildCompleteMST(points);
      const firstLeaf = graph.findIndex((edges) => edges.length === 1);
      const st = farthestNode(graph, Math.max(0, firstLeaf));
      const ed = farthestNode(graph, st);
      const parent = new Int32Array(points.length);
      const order = [st];
      parent.fill(-1);
      for (let i = 0; i < order.length; i += 1) {
        const node = order[i];
        graph[node].forEach((edge) => {
          if (edge.node !== parent[node]) {
            parent[edge.node] = node;
            order.push(edge.node);
          }
        });
      }
      const endPath = new Set();
      for (let node = ed; node >= 0; node = parent[node]) {
        endPath.add(node);
        if (node === st) break;
      }
      const children = Array.from({ length: points.length }, () => []);
      for (let i = 0; i < points.length; i += 1) {
        if (parent[i] >= 0) children[parent[i]].push(i);
      }
      children.forEach((list) => {
        list.sort((a, b) => Number(endPath.has(a)) - Number(endPath.has(b)));
      });
      const path = [];
      function dfs(node) {
        path.push(points[node]);
        if (node === ed) return true;
        let hasChild = false;
        for (const child of children[node]) {
          hasChild = true;
          if (dfs(child)) return true;
        }
        if (hasChild) path.push(points[node]);
        return false;
      }
      dfs(st);
      const maxStep = Math.max(0, ...path.slice(1).map((point, index) => distance(point, path[index])));
      if (distance(points[st], points[ed]) < 2 * maxStep) {
        path.push(points[st]);
      }
      return path;
    }

    function pathLength(points) {
      let length = 0;
      for (let i = 0; i < points.length; i += 1) {
        length += distance(points[i], points[(i + 1) % points.length]);
      }
      return length;
    }

    function normalizePoints(points) {
      if (!points.length) return [];
      const bounds = points.reduce((acc, p) => ({
        minX: Math.min(acc.minX, p.x),
        minY: Math.min(acc.minY, p.y),
        maxX: Math.max(acc.maxX, p.x),
        maxY: Math.max(acc.maxY, p.y),
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const scale = 82 / Math.max(width, height);
      const offsetX = 50 - ((bounds.minX + bounds.maxX) / 2) * scale;
      const offsetY = 50 - ((bounds.minY + bounds.maxY) / 2) * scale;
      return points.map((p) => ({ x: p.x * scale + offsetX, y: p.y * scale + offsetY }));
    }

    function normalizeContours(contours) {
      const points = contours.flat();
      if (!points.length) return [];
      const bounds = points.reduce((acc, p) => ({
        minX: Math.min(acc.minX, p.x),
        minY: Math.min(acc.minY, p.y),
        maxX: Math.max(acc.maxX, p.x),
        maxY: Math.max(acc.maxY, p.y),
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const scale = 82 / Math.max(width, height);
      const offsetX = 50 - ((bounds.minX + bounds.maxX) / 2) * scale;
      const offsetY = 50 - ((bounds.minY + bounds.maxY) / 2) * scale;
      return contours.map((contour) => contour.map((p) => ({ x: p.x * scale + offsetX, y: p.y * scale + offsetY })));
    }

    function simplifyContoursToPointCount(contours, pointCount) {
      const valid = contours.filter((contour) => contour.length >= 3);
      if (!valid.length) return [];
      const total = Math.max(8, Math.round(pointCount));
      if (valid.length === 1) return [simplifyToPointCount(valid[0], total)];
      const lengths = valid.map(pathLength);
      const totalLength = lengths.reduce((sum, length) => sum + length, 0) || 1;
      const minPoints = 6;
      let remaining = Math.max(0, total - minPoints * valid.length);
      return valid.map((contour, index) => {
        const allocated = minPoints + Math.round(remaining * (lengths[index] / totalLength));
        return simplifyToPointCount(contour, Math.max(minPoints, allocated));
      });
    }

    function smoothPath(points, windowSize) {
      const size = Math.max(1, Math.round(windowSize));
      if (size <= 1 || points.length < size) return points.slice();
      const radius = Math.floor(size / 2);
      return points.map((point, index) => {
        if (index < radius || index >= points.length - radius) return point;
        let x = 0;
        let y = 0;
        let count = 0;
        for (let offset = -radius; offset <= radius; offset += 1) {
          const p = points[index + offset];
          x += p.x;
          y += p.y;
          count += 1;
        }
        return { x: x / count, y: y / count };
      });
    }

    function automaticSmoothWindow(pointCount, mode) {
      if (mode === "edges") return 1;
      if (pointCount > 420) return 5;
      if (pointCount > 180) return 3;
      return 1;
    }

    function derivedSampleCount(harmonicCount) {
      return Math.max(192, Math.min(672, Math.round(harmonicCount) * 12));
    }

    function resampleClosed(points, count) {
      if (points.length < 2) return points;
      const lengths = [];
      let total = 0;
      for (let i = 0; i < points.length; i += 1) {
        const length = distance(points[i], points[(i + 1) % points.length]);
        lengths.push(length);
        total += length;
      }
      const samples = [];
      let segment = 0;
      let walked = 0;
      for (let s = 0; s < count; s += 1) {
        const target = (s / count) * total;
        while (walked + lengths[segment] < target && segment < lengths.length - 1) {
          walked += lengths[segment];
          segment += 1;
        }
        const a = points[segment];
        const b = points[(segment + 1) % points.length];
        const local = lengths[segment] === 0 ? 0 : (target - walked) / lengths[segment];
        samples.push({
          x: a.x + (b.x - a.x) * local,
          y: a.y + (b.y - a.y) * local,
        });
      }
      return samples;
    }

    function resampleOpen(points, count) {
      if (points.length < 2) return points.slice();
      const lengths = [];
      let total = 0;
      for (let i = 0; i < points.length - 1; i += 1) {
        const length = distance(points[i], points[i + 1]);
        lengths.push(length);
        total += length;
      }
      if (total === 0) return points.slice(0, 1);
      const samples = [];
      let segment = 0;
      let walked = 0;
      for (let s = 0; s < count; s += 1) {
        const target = (s / Math.max(1, count - 1)) * total;
        while (segment < lengths.length - 1 && walked + lengths[segment] < target) {
          walked += lengths[segment];
          segment += 1;
        }
        const a = points[segment];
        const b = points[segment + 1];
        const local = lengths[segment] === 0 ? 0 : (target - walked) / lengths[segment];
        samples.push({
          x: a.x + (b.x - a.x) * local,
          y: a.y + (b.y - a.y) * local,
        });
      }
      return samples;
    }

    function closedPoint(points, index) {
      return points[(index + points.length) % points.length];
    }

    function bezierControls(points, index, smoothing = 0.82) {
      const p0 = closedPoint(points, index - 1);
      const p1 = closedPoint(points, index);
      const p2 = closedPoint(points, index + 1);
      const p3 = closedPoint(points, index + 2);
      const scale = smoothing / 6;
      return {
        c1: { x: p1.x + (p2.x - p0.x) * scale, y: p1.y + (p2.y - p0.y) * scale },
        c2: { x: p2.x - (p3.x - p1.x) * scale, y: p2.y - (p3.y - p1.y) * scale },
      };
    }

    function cubicPoint(p0, c1, c2, p1, t) {
      const inv = 1 - t;
      const inv2 = inv * inv;
      const t2 = t * t;
      return {
        x: inv2 * inv * p0.x + 3 * inv2 * t * c1.x + 3 * inv * t2 * c2.x + t2 * t * p1.x,
        y: inv2 * inv * p0.y + 3 * inv2 * t * c1.y + 3 * inv * t2 * c2.y + t2 * t * p1.y,
      };
    }

    function smoothClosedPolyline(points, samplesPerSegment = 12) {
      if (points.length < 3) return points.slice();
      const samples = [];
      const steps = Math.max(4, Math.round(samplesPerSegment));
      for (let i = 0; i < points.length; i += 1) {
        const start = closedPoint(points, i);
        const end = closedPoint(points, i + 1);
        const { c1, c2 } = bezierControls(points, i);
        for (let step = 0; step < steps; step += 1) {
          samples.push(cubicPoint(start, c1, c2, end, step / steps));
        }
      }
      return samples;
    }

    function resampleSmoothClosed(points, count) {
      return resampleClosed(smoothClosedPolyline(points), count);
    }

    function resampleSmoothContoursAsOneStroke(contours, totalCount) {
      const valid = contours.filter((contour) => contour.length >= 3);
      if (!valid.length) return [];
      if (valid.length === 1) return resampleSmoothClosed(valid[0], totalCount);
      const smoothContours = valid.map((contour) => smoothClosedPolyline(contour));
      const ordered = buildAttachedContourRoute(smoothContours);
      return resampleOpen(ordered, totalCount);
    }

    function rotateClosedContour(contour, startIndex, reverse = false) {
      const source = reverse ? contour.slice().reverse() : contour.slice();
      const index = reverse ? (source.length - 1 - startIndex + source.length) % source.length : startIndex;
      const rotated = source.slice(index).concat(source.slice(0, index));
      rotated.push(rotated[0]);
      return rotated;
    }

    function nearestContourBridge(main, contour) {
      let best = { distance: Infinity, mainIndex: 0, contourIndex: 0 };
      main.forEach((mainPoint, mainIndex) => {
        contour.forEach((contourPoint, contourIndex) => {
          const d = distance(mainPoint, contourPoint);
          if (d < best.distance) best = { distance: d, mainIndex, contourIndex };
        });
      });
      return best;
    }

    function buildAttachedContourRoute(contours) {
      if (contours.length <= 1) return contours[0]?.slice() ?? [];
      const main = contours[0];
      const attachments = new Map();
      contours.slice(1).forEach((contour) => {
        const bridge = nearestContourBridge(main, contour);
        const list = attachments.get(bridge.mainIndex) ?? [];
        list.push({ contour, contourIndex: bridge.contourIndex, distance: bridge.distance });
        attachments.set(bridge.mainIndex, list);
      });
      attachments.forEach((list) => list.sort((a, b) => a.distance - b.distance));

      const route = [];
      for (let i = 0; i < main.length; i += 1) {
        const mainPoint = main[i];
        route.push(mainPoint);
        const list = attachments.get(i);
        if (!list) continue;
        list.forEach(({ contour, contourIndex }) => {
          const excursion = rotateClosedContour(contour, contourIndex);
          route.push(excursion[0]);
          route.push(...excursion.slice(1));
          route.push(mainPoint);
        });
      }
      route.push(main[0]);
      return route;
    }

    function drawSmoothClosedPath(ctx, points, sx = 1, sy = 1) {
      if (!points.length) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x * sx, points[0].y * sy);
      if (points.length < 3) {
        points.slice(1).forEach((point) => ctx.lineTo(point.x * sx, point.y * sy));
        ctx.closePath();
        return;
      }
      for (let i = 0; i < points.length; i += 1) {
        const end = closedPoint(points, i + 1);
        const { c1, c2 } = bezierControls(points, i);
        ctx.bezierCurveTo(c1.x * sx, c1.y * sy, c2.x * sx, c2.y * sy, end.x * sx, end.y * sy);
      }
      ctx.closePath();
    }

    function buildSmoothSvgPath(points) {
      if (!points.length) return "";
      const parts = [`M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`];
      if (points.length < 3) {
        points.slice(1).forEach((point) => {
          parts.push(`L ${point.x.toFixed(2)} ${point.y.toFixed(2)}`);
        });
        return `${parts.join(" ")} Z`;
      }
      for (let i = 0; i < points.length; i += 1) {
        const end = closedPoint(points, i + 1);
        const { c1, c2 } = bezierControls(points, i);
        parts.push(`C ${c1.x.toFixed(2)} ${c1.y.toFixed(2)} ${c2.x.toFixed(2)} ${c2.y.toFixed(2)} ${end.x.toFixed(2)} ${end.y.toFixed(2)}`);
      }
      return `${parts.join(" ")} Z`;
    }

    function buildSmoothSvgMultiPath(contours) {
      return contours.map(buildSmoothSvgPath).filter(Boolean).join(" ");
    }

    function computeCoefficients(samples, harmonics) {
      const n = samples.length;
      const coefficients = [];
      const frequencies = [0];
      for (let k = 1; k <= harmonics; k += 1) {
        frequencies.push(k, -k);
      }
      frequencies.forEach((k) => {
        let re = 0;
        let im = 0;
        for (let j = 0; j < n; j += 1) {
          const angle = (-2 * Math.PI * k * j) / n;
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          const x = samples[j].x;
          const y = samples[j].y;
          re += x * cos - y * sin;
          im += x * sin + y * cos;
        }
        const normalizedRe = re / n;
        const normalizedIm = im / n;
        coefficients.push({
          k,
          fftIndex: k >= 0 ? k : n + k,
          re: normalizedRe,
          im: normalizedIm,
          rawRe: re,
          rawIm: im,
          amp: Math.hypot(normalizedRe, normalizedIm),
        });
      });
      return coefficients;
    }

    function curvePoint(progress, detailScale) {
      return curvePointFromCoefficients(state.coefficients, progress, detailScale);
    }

    function curvePointFromCoefficients(coefficients, progress, detailScale) {
      const angleBase = 2 * Math.PI * progress;
      let x = 0;
