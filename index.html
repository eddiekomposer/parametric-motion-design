        const c2 = rotatedMorphCanvasPoint(controls.c2, shape.center, rotation);
        const end = rotatedMorphCanvasPoint(closedPoint(shape.points, index + 1), shape.center, rotation);
        ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, end.x, end.y);
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawMorphFusionField(fieldCtx, width, height, scale, shapes, rotation, blurPx) {
      fieldCtx.setTransform(1, 0, 0, 1, 0, 0);
      fieldCtx.clearRect(0, 0, width, height);
      fieldCtx.save();
      fieldCtx.setTransform(scale, 0, 0, scale, 0, 0);
      fieldCtx.filter = `blur(${Math.max(0, blurPx * scale).toFixed(2)}px)`;
      fieldCtx.fillStyle = "#ffffff";
      fieldCtx.globalAlpha = 1;
      shapes.forEach((shape) => drawMorphFusionPath(fieldCtx, shape, rotation));
      fieldCtx.restore();
      fieldCtx.filter = "none";
    }

    function renderMorphFusionEffect(ctx, mix) {
      const width = particleCanvas.width;
      const height = particleCanvas.height;
      if (!width || !height) return;
      const buffers = ensureMorphFusionCanvases(width, height);
      const breath = clamp(config.morphBreath, 0, 1);
      const eased = mix.progress;
      const active = mix.raw > 0 && mix.raw < 1;
      const spin = (Number(config.morphFusionRotationDeg) || 0) * Math.PI / 180;
      const fromRotation = active ? -spin * eased : 0;
      const toRotation = active ? spin * (1 - eased) : 0;
      const blurPx = state.particleSystem.viewport.size * (0.018 + breath * 0.022);
      const holdKey = !active && eased <= 0.001
        ? `hold|${mix.index}|${width}x${height}|${buffers.fieldWidth}x${buffers.fieldHeight}|${config.morphColor}|${config.morphOpacity}|${config.morphBreath}|${mix.current.length}`
        : "";
      if (holdKey && buffers.cacheKey === holdKey) {
        ctx.save();
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(buffers.output, 0, 0, width, height);
        ctx.restore();
        return;
      }
      drawMorphFusionField(buffers.fromCtx, buffers.fieldWidth, buffers.fieldHeight, buffers.scale, mix.current, fromRotation, blurPx);
      const fromData = buffers.fromCtx.getImageData(0, 0, buffers.fieldWidth, buffers.fieldHeight).data;
      const shouldDrawNext = active || eased >= 0.999;
      let toData = null;
      if (shouldDrawNext) {
        drawMorphFusionField(buffers.toCtx, buffers.fieldWidth, buffers.fieldHeight, buffers.scale, mix.next, toRotation, blurPx);
        toData = buffers.toCtx.getImageData(0, 0, buffers.fieldWidth, buffers.fieldHeight).data;
      }
      const output = buffers.outputCtx.createImageData(buffers.fieldWidth, buffers.fieldHeight);
      const out = output.data;
      const color = parseColorValue(config.morphColor) ?? { r: 246, g: 247, b: 241, a: 1 };
      const mergeBoost = active ? Math.sin(Math.PI * eased) * (0.12 + breath * 0.2) : 0;
      const fromWeight = eased >= 0.999 ? 0 : clamp(1 - eased + mergeBoost, 0, 1);
      const toWeight = eased >= 0.999 ? 1 : (active ? clamp(eased + mergeBoost, 0, 1) : 0);
      const threshold = 127;
      const alpha = Math.round(255 * clamp(config.morphOpacity * color.a, 0, 1));
      const edgeFeather = 5;
      for (let index = 0; index < out.length; index += 4) {
        const field = fromData[index + 3] * fromWeight + (toData ? toData[index + 3] * toWeight : 0);
        const coverage = clamp((field - (threshold - edgeFeather)) / (edgeFeather * 2), 0, 1);
        if (coverage > 0) {
          const smoothCoverage = coverage * coverage * (3 - 2 * coverage);
          out[index] = color.r;
          out[index + 1] = color.g;
          out[index + 2] = color.b;
          out[index + 3] = Math.round(alpha * smoothCoverage);
        }
      }
      buffers.outputCtx.putImageData(output, 0, 0);
      buffers.cacheKey = holdKey;
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(buffers.output, 0, 0, width, height);
      ctx.restore();
    }

    function renderMorphEffect(now) {
      hideParticles();
      hideLineGroup();
      hideSineGroup();
      hideOscilloscopeGroup();
      hideLineEditHandles();
      motionPath.setAttribute("opacity", "0");
      showParticleCanvas();
      resizeParticleCanvas();
      const ctx = particleCanvas.getContext("2d");
      const system = state.morphSystem;
      system.lastFrameAt = now;
      const mix = morphFrameMix(now);
      ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      if (config.morphMotionMode === "fusion") {
        renderMorphFusionEffect(ctx, mix);
        if (now - (system.lastDebugAt || 0) > 250) {
          system.lastDebugAt = now;
          window.__motionDebug.morphFrameCount = config.particleKeyframes.length;
          window.__motionDebug.morphShapeCount = morphFrameShapeCount(state.morphSystem.targets);
          window.__motionDebug.morphPairSeed = config.morphPairSeed;
          window.__motionDebug.morphProgress = mix.progress;
        }
        return;
      }
      const pairs = morphTransitionPairs(mix.current, mix.next, mix.index);
      ctx.fillStyle = config.morphColor;
      pairs.forEach((pair, index) => {
        const currentShape = pair.currentIndex == null ? null : mix.current[pair.currentIndex] ?? null;
        const nextShape = pair.nextIndex == null ? null : mix.next[pair.nextIndex] ?? null;
        const a = currentShape ?? morphShapeAt(mix.current, index, nextShape);
        const b = nextShape ?? morphShapeAt(mix.next, pair.nextIndex ?? index, a);
        drawMorphShape(ctx, morphInterpolatedShape(a, b, index, mix, now));
      });
      if (now - (system.lastDebugAt || 0) > 250) {
        system.lastDebugAt = now;
        window.__motionDebug.morphFrameCount = config.particleKeyframes.length;
        window.__motionDebug.morphShapeCount = pairs.length;
        window.__motionDebug.morphPairSeed = config.morphPairSeed;
        window.__motionDebug.morphProgress = mix.progress;
      }
    }

    function drawMorphShape(ctx, shape) {
      if (!shape.points.length) return;
      const first = particleToCanvas(shape.points[0]);
      ctx.save();
      ctx.globalAlpha = clamp((shape.alpha ?? 1) * config.morphOpacity, 0, 1);
      ctx.fillStyle = config.morphColor;
      ctx.shadowColor = config.morphColor;
      ctx.shadowBlur = state.particleSystem.viewport.size * 0.012 * clamp(config.morphBreath, 0, 1);
      ctx.beginPath();
      ctx.moveTo(first.x, first.y);
      for (let index = 0; index < shape.points.length; index += 1) {
        const controls = bezierControls(shape.points, index, 0.92);
        const c1 = particleToCanvas(controls.c1);
        const c2 = particleToCanvas(controls.c2);
        const end = particleToCanvas(closedPoint(shape.points, index + 1));
        ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, end.x, end.y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function prepareCellEffect() {
      hideLineEditHandles();
      state.samples = [];
      state.coefficients = [];
      state.cellSystem.cells = buildCellCells();
      state.cellSystem.rings = buildCellRings(state.cellSystem.cells);
      state.cellSystem.lastSignature = `cell|${config.cellCount}|${config.cellSeed}|${config.cellOverallSize}|${config.cellDiversity}|${state.cellSystem.cells.length}`;
      state.cellSystem.growCache = null;
    }

    function buildCellCells() {
      const desiredCount = clamp(Math.round(Number(config.cellCount) || 10), 3, 10);
      const scale = clamp(Number(config.cellOverallSize) || 1, 0.55, 1.45);
      const diversity = clamp(Math.round(Number(config.cellDiversity) || 0), 0, 5);
      const rng = seededRandom(`cell-generated|${desiredCount}|${config.cellSeed}|${Math.round(scale * 100)}|${diversity}`);
      const unit = clamp(7.3 - desiredCount * 0.28, 4.6, 6.8) * scale;
      const palette = cellSizePalette(diversity);
      const levels = Array.from({ length: desiredCount }, (_, index) => index % palette.length)
        .sort((a, b) => (rng() - 0.5) || a - b);
      const radii = levels.map((level) => unit * palette[level]).sort((a, b) => b - a);
      const clusterRadius = unit * (Math.sqrt(desiredCount) * 1.35 + 1.05);
      const cells = [];
      radii.forEach((radius, index) => {
        let best = null;
        for (let attempt = 0; attempt < 240; attempt += 1) {
          const angle = rng() * Math.PI * 2;
          const dist = Math.pow(rng(), 0.78) * clusterRadius;
          const wobble = 1 + Math.sin(angle * 2.7 + rng() * 2.4) * 0.13;
          const candidate = {
            x: 50 + Math.cos(angle) * dist * wobble,
            y: 50 + Math.sin(angle) * dist * (0.86 + rng() * 0.22),
            r: radius,
            baseR: radius,
            seed: rng(),
          };
          const overlap = cells.reduce((sum, placed) => Math.max(sum, placed.r + candidate.r + unit * 0.045 - distance(placed, candidate)), 0);
          const centerPenalty = Math.hypot(candidate.x - 50, candidate.y - 50) / Math.max(1, clusterRadius);
          const score = overlap * 12 + centerPenalty + rng() * 0.08;
          if (!best || score < best.score) best = { ...candidate, score };
          if (overlap <= 0) break;
        }
        cells.push(best ?? { x: 50, y: 50, r: radius, baseR: radius, seed: rng() });
      });
      relaxCellLayout(cells, unit);
      state.cellSystem.bounds = { minX: 50 - clusterRadius, minY: 50 - clusterRadius, maxX: 50 + clusterRadius, maxY: 50 + clusterRadius, centerX: 50, centerY: 50 };
      return assignCellGeometry(cells.map((cell) => {
        const radial = Math.hypot(cell.x - 50, cell.y - 50);
        return {
          ...cell,
          centerRatio: 1 - clamp(radial / Math.max(1, clusterRadius), 0, 1),
          edgeRatio: clamp((clusterRadius - radial) / Math.max(1, clusterRadius), 0, 1),
        };
      }));
    }

    function cellSizePalette(diversity) {
      const count = diversity <= 1 ? 1 : clamp(Math.round(diversity), 2, 5);
      if (count === 1) return [1];
      const max = 1.46;
      const min = 0.58;
      const palette = Array.from({ length: count }, (_, index) => max + ((min - max) * index) / Math.max(1, count - 1));
      const average = palette.reduce((sum, value) => sum + value, 0) / palette.length;
      return palette.map((value) => value / average);
    }

    function relaxCellLayout(cells, unit) {
      const padding = Math.max(0.012, unit * 0.014);
      for (let pass = 0; pass < 90; pass += 1) {
        cells.forEach((cell) => {
          cell.x += (50 - cell.x) * 0.004;
          cell.y += (50 - cell.y) * 0.004;
        });
        for (let i = 0; i < cells.length; i += 1) {
          for (let j = i + 1; j < cells.length; j += 1) {
            const a = cells[i];
            const b = cells[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.max(0.001, Math.hypot(dx, dy));
            const minDist = a.r + b.r + padding;
            if (dist >= minDist) continue;
            const push = (minDist - dist) * 0.52;
            const nx = dx / dist;
            const ny = dy / dist;
            a.x -= nx * push;
            a.y -= ny * push;
            b.x += nx * push;
            b.y += ny * push;
          }
        }
      }
    }

    function limitCellCount(cells, desiredCount) {
      const target = clamp(Math.round(desiredCount), 3, 10);
      if (cells.length <= target) return cells;
      return cells
        .map((cell, index) => ({
          cell,
          score: cell.centerRatio * 1.35 + cell.edgeRatio * 0.42 + seededRandom(`cell-limit|${state.fileName}|${target}|${index}`)() * 0.16,
        }))
        .sort((a, b) => b.score - a.score)
        .slice(0, target)
        .map((item) => item.cell)
        .sort((a, b) => a.y - b.y || a.x - b.x);
    }

    function packCellCandidates(candidates, base) {
      const padding = Math.max(0.08, base * 0.08);
      const minRadius = Math.max(0.36, base * 0.26);
      const ordered = candidates
        .map((cell, index) => ({
          ...cell,
          order: seededRandom(`cell-pack|${state.fileName}|${index}|${Math.round(base * 100)}`)(),
        }))
        .sort((a, b) => (b.centerRatio + b.edgeRatio * 0.38 + b.order * 0.08) - (a.centerRatio + a.edgeRatio * 0.38 + a.order * 0.08));
      const packed = [];
      ordered.forEach((candidate) => {
        let available = candidate.r;
        for (const placed of packed) {
          available = Math.min(available, distance(candidate, placed) - placed.r - padding);
          if (available < minRadius) break;
        }
        if (available >= minRadius) {
          packed.push({
            ...candidate,
            r: available,
            baseR: available,
          });
        }
      });
      return packed.sort((a, b) => a.y - b.y || a.x - b.x);
    }

    function assignCellGeometry(cells) {
      const bounds = state.cellSystem.bounds;
      return cells.map((cell, index) => {
        const dx = cell.x - bounds.centerX;
        const dy = cell.y - bounds.centerY;
        return {
          ...cell,
          index,
          angle: Math.atan2(dy, dx),
          radial: Math.hypot(dx, dy),
        };
      });
    }

    function buildCellRings(cells) {
      const bounds = state.cellSystem.bounds;
      if (!cells.length) return [];
      if (cells.length <= 5) {
        return [[...cells].sort((a, b) => Math.atan2(a.y - bounds.centerY, a.x - bounds.centerX) - Math.atan2(b.y - bounds.centerY, b.x - bounds.centerX))];
      }
      const maxRadial = Math.max(1, ...cells.map((cell) => Math.hypot(cell.x - bounds.centerX, cell.y - bounds.centerY)));
      const ringCount = clamp(Math.round(Math.sqrt(cells.length) * 0.55), 1, 4);
      const rings = Array.from({ length: ringCount }, () => []);
      cells.forEach((cell, index) => {
        const radial = Math.hypot(cell.x - bounds.centerX, cell.y - bounds.centerY);
        const ringIndex = clamp(Math.floor((radial / maxRadial) * ringCount), 0, ringCount - 1);
        rings[ringIndex].push({ ...cell, index, radial });
      });
      return rings
        .filter((ring) => ring.length >= 3)
        .map((ring) => ring.sort((a, b) => Math.atan2(a.y - bounds.centerY, a.x - bounds.centerX) - Math.atan2(b.y - bounds.centerY, b.x - bounds.centerX)));
    }

    function maskBounds(mask, width, height) {
      const bounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (!mask[y * width + x]) continue;
          bounds.minX = Math.min(bounds.minX, x);
          bounds.minY = Math.min(bounds.minY, y);
          bounds.maxX = Math.max(bounds.maxX, x);
          bounds.maxY = Math.max(bounds.maxY, y);
        }
      }
      return bounds;
    }

    function nearestOutsideMaskDistance(inside, x, y, maxRadius) {
      if (!inside(x, y)) return 0;
      for (let radius = 1; radius <= maxRadius; radius += 1) {
        for (let dy = -radius; dy <= radius; dy += 1) {
          if (!inside(x - radius, y + dy) || !inside(x + radius, y + dy)) return radius;
        }
        for (let dx = -radius + 1; dx <= radius - 1; dx += 1) {
          if (!inside(x + dx, y - radius) || !inside(x + dx, y + radius)) return radius;
        }
      }
      return maxRadius;
    }

    function fallbackCellCells() {
      const cells = [];
      const desiredCount = clamp(Math.round(Number(config.cellCount) || 10), 3, 10);
      const center = { x: 50, y: 50 };
      const maxR = 33;
      const base = clamp(Math.sqrt((Math.PI * maxR * maxR) / (desiredCount * 3.1)), 1.05, 6.2);
      const rng = seededRandom(`cell-fallback-organic|${desiredCount}`);
      for (let attempt = 0; attempt < desiredCount * 90; attempt += 1) {
        const angle = rng() * Math.PI * 2;
        const dist = Math.sqrt(rng()) * maxR;
        const wobble = 1 + Math.sin(angle * 3.1 + rng() * 2) * 0.08;
        const x = center.x + Math.cos(angle) * dist * wobble;
        const y = center.y + Math.sin(angle) * dist * (0.86 + rng() * 0.2);
        const actualDist = Math.hypot(x - center.x, y - center.y);
        if (actualDist > maxR) continue;
        const centerRatio = 1 - actualDist / maxR;
        const edgeRatio = clamp((maxR - actualDist) / 16, 0, 1);
        const r = base * (0.38 + edgeRatio * 0.5 + centerRatio * 0.55 + (rng() - 0.5) * 0.12);
        cells.push({ x, y, r, baseR: r, centerRatio, edgeRatio, seed: rng() });
      }
      state.cellSystem.bounds = { minX: 17, minY: 17, maxX: 83, maxY: 83, centerX: 50, centerY: 50 };
      return assignCellGeometry(limitCellCount(packCellCandidates(cells, base), desiredCount));
    }

    function renderCellEffect(now) {
      hideParticles();
      hideLineGroup();
      hideSineGroup();
      hideOscilloscopeGroup();
      hideLineEditHandles();
      motionPath.setAttribute("opacity", "0");
      showParticleCanvas();
      resizeParticleCanvas();
      const ctx = particleCanvas.getContext("2d");
      ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      const cells = state.cellSystem.cells.length ? state.cellSystem.cells : buildCellCells();
      const elapsed = now - state.startedAt;
      const interval = Math.max(350, config.cellMotionIntervalMs);
      const duration = Math.min(Math.max(120, config.cellMotionDurationMs), interval);
      const cycle = Math.floor(elapsed / interval);
      const local = ((elapsed % interval) + interval) % interval;
      const raw = clamp(local / duration, 0, 1);
      const active = local <= duration;
      const progress = active ? (config.cellMotionType === "rotate" ? naturalBezierEase(raw) : organicEase(raw)) : 1;
      const pulse = active ? organicPulse(progress) : 0;
      ctx.fillStyle = config.cellColor;
      const renderedCells = preventCellOverlaps(cells.map((cell, index) => (
        cellAnimatedState(cell, index, cells, cycle, progress, pulse, elapsed, local, duration, interval)
      )), false);
      renderedCells.forEach((cell) => drawCellCircle(ctx, cell));
      window.__motionDebug.cellCount = cells.length;
      window.__motionDebug.cellMotionType = config.cellMotionType;
      window.__motionDebug.cellOverlapCount = countCellOverlaps(renderedCells);
    }

    function cellAnimatedState(cell, index, cells, cycle, progress, pulse, elapsed, local, duration, interval) {
      if (config.cellMotionType === "swap") return cellSwapState(cell, index, cells, cycle, progress);
      if (config.cellMotionType === "blink") return cellBlinkState(cell, index, cells.length, cycle, local, duration, interval);
      if (config.cellMotionType === "grow") return cellGrowState(cell, index, cells, cycle, local, duration);
      if (config.cellMotionType === "rotate") return cellRotateState(cell, index, cycle, progress, pulse);
      return { ...cell, opacity: config.cellOpacity, scale: 1 };
    }

    function cellSwapState(cell, index, cells, cycle, progress) {
      const previousTarget = cells[cellSwapTarget(index, cells, cycle - 1)] ?? cell;
      const nextTarget = cells[cellSwapTarget(index, cells, cycle)] ?? cell;
      const point = pairedCellSwapMove(previousTarget, nextTarget, index, progress);
      return {
        ...cell,
        x: point.x,
        y: point.y,
        r: mixCellValue(previousTarget.r, nextTarget.r, progress),
        opacity: config.cellOpacity,
      };
    }

    function cellSwapTarget(index, cells, cycle) {
      return cellSwapPairs(cells, cycle).get(index) ?? index;
    }

    function cellSwapPairs(cells, cycle) {
      const pairs = new Map();
      const available = new Set(cells.map((_, index) => index));
      const order = cells
        .map((cell, index) => ({ index, key: seededRandom(`cell-swap-order|${state.fileName}|${cycle}|${index}`)() }))
        .sort((a, b) => a.key - b.key);
      const unit = cellAverageRadius(cells);
      const maxDistance = Math.max(unit * 5.2, 9);
      order.forEach(({ index }) => {
        if (!available.has(index)) return;
        available.delete(index);
        const cell = cells[index];
        let best = null;
        available.forEach((candidateIndex) => {
          const candidate = cells[candidateIndex];
          const d = distance(cell, candidate);
          const radialPenalty = Math.abs((cell.radial ?? 0) - (candidate.radial ?? 0)) * 0.28;
          const score = d + radialPenalty;
          if (d <= maxDistance && (!best || score < best.score)) best = { index: candidateIndex, score };
        });
        if (!best) {
          pairs.set(index, index);
          return;
        }
        available.delete(best.index);
        pairs.set(index, best.index);
        pairs.set(best.index, index);
      });
      available.forEach((index) => pairs.set(index, index));
      return pairs;
    }

    function cellBlinkState(cell, index, count, cycle, local, duration, interval) {
      const motion = cellBlinkMotion(index, count, cycle, local, duration, interval);
      if (!motion) return { ...cell, opacity: config.cellOpacity };
      const raw = clamp(motion.local / motion.duration, 0, 1);
      if (raw <= 0 || raw >= 1) return { ...cell, opacity: config.cellOpacity };
      const shrinkProgress = raw < 0.5 ? organicEase(raw * 2) : 1 - organicEase((raw - 0.5) * 2);
      const scale = mixCellValue(1, 0.035, shrinkProgress);
      return {
        ...cell,
        r: cell.r * scale,
        opacity: config.cellOpacity,
      };
    }

    function cellBlinkMotion(index, count, cycle, local, duration, interval) {
      const safeCount = Math.max(1, count);
      const slotDuration = clamp(Math.min(180, interval / Math.min(safeCount, 12)), 70, 180);
      const activeDuration = Math.min(Math.max(260, slotDuration * 3.2), Math.max(slotDuration, duration));
      const absolute = cycle * interval + local;
      const currentTrigger = Math.floor(absolute / slotDuration);
      const activeSlots = Math.ceil(activeDuration / slotDuration) + 1;
      for (let offset = 0; offset < activeSlots; offset += 1) {
        const trigger = currentTrigger - offset;
        const startedAt = trigger * slotDuration;
        const age = absolute - startedAt;
        if (age < 0 || age > activeDuration) continue;
        if (cellBlinkTriggeredIndex(safeCount, trigger) !== index) continue;
        return { local: age, duration: activeDuration };
      }
      return null;
    }

    function cellBlinkTriggeredIndex(count, trigger) {
      const group = Math.floor(trigger / Math.max(1, count));
      const offset = Math.floor(seededRandom(`cell-blink-order|${state.fileName}|${group}`)() * count);
      return ((trigger + offset) % count + count) % count;
    }

    function cellGrowState(cell, index, cells, cycle, local, duration) {
      const raw = clamp(local / Math.max(1, duration), 0, 1);
      return cellGrowProximityLayout(cells, cycle, raw)[index] ?? { ...cell, opacity: config.cellOpacity };
    }

    function cellGrowProximityLayout(cells, cycle, raw) {
      if (!cells.length) return [];
      const unit = cellAverageRadius(cells);
      const order = cellGrowRoundOrder(cells.length);
      const slot = ((Math.floor(cycle) % cells.length) + cells.length) % cells.length;
      const fromIndex = order[slot] ?? 0;
      const toIndex = order[(slot + 1) % order.length] ?? fromIndex;
      const travel = organicEase(raw);
      const growStrength = clamp(Number(config.cellGrowStrength) || 0.6, 0.2, 1.2);
      const fromCell = cells[fromIndex] ?? cells[0];
      const toCell = cells[toIndex] ?? fromCell;
      const nullPoint = {
        x: mixCellValue(fromCell.x, toCell.x, travel),
        y: mixCellValue(fromCell.y, toCell.y, travel),
      };
      const sourceArea = cells.reduce((sum, cell) => sum + (cell.baseR ?? cell.r) ** 2, 0);
      const layout = cells.map((cell) => {
        const base = cell.baseR ?? cell.r;
        const dist = Math.max(0.001, distance(cell, nullPoint));
        const field = Math.pow(clamp(1 - dist / Math.max(unit * 4.8, 7.5), 0, 1), 1.55);
        const smallBoost = clamp((unit * 1.1 - base) / Math.max(0.001, unit * 0.72), 0, 1);
        const grow = field * growStrength * (0.72 + smallBoost * 0.42);
        return {
          ...cell,
          r: clamp(base * (1 + grow), base * 0.36, base * (1.18 + growStrength * 1.18)),
          _growField: field,
          opacity: config.cellOpacity,
        };
      });
      cellBalanceProximityArea(layout, sourceArea);
      cellApplyGrowSway(layout, raw, cycle);
      cellRelaxGrowLayout(layout, Math.max(0.012, unit * 0.014), state.cellSystem.bounds);
      return cellAssignGrowGeometry(layout).map(({ _growField, ...cell }) => cell);
    }

    function cellBalanceProximityArea(cells, sourceArea) {
      const area = cells.reduce((sum, cell) => sum + cell.r * cell.r, 0);
      if (area <= sourceArea * 1.02) return;
      let excess = area - sourceArea;
      const shrinkers = cells
        .map((cell, index) => {
          const base = cell.baseR ?? cell.r;
          const minR = base * 0.18;
          const capacity = Math.max(0, cell.r * cell.r - minR * minR);
          const field = clamp(cell._growField ?? 0, 0, 1);
          return { cell, index, minR, capacity, weight: Math.pow(1 - field, 1.7) + 0.08 };
        })
        .filter((item) => item.capacity > 0);
      for (let pass = 0; pass < 3 && excess > sourceArea * 0.005; pass += 1) {
        const totalWeight = shrinkers.reduce((sum, item) => sum + item.weight * item.capacity, 0);
        if (totalWeight <= 0) break;
        shrinkers.forEach((item) => {
          if (excess <= 0 || item.capacity <= 0) return;
          const areaDrop = Math.min(item.capacity, excess * (item.weight * item.capacity) / totalWeight);
          item.cell.r = Math.sqrt(Math.max(item.minR * item.minR, item.cell.r * item.cell.r - areaDrop));
          item.capacity -= areaDrop;
        });
        excess = cells.reduce((sum, cell) => sum + cell.r * cell.r, 0) - sourceArea;
      }
      cells.forEach((cell) => {
        const base = cell.baseR ?? cell.r;
        const field = clamp(cell._growField ?? 0, 0, 1);
        const edgeShrink = Math.pow(1 - field, 2.2) * 0.08;
        cell.r = Math.max(base * 0.18, cell.r * (1 - edgeShrink));
      });
    }

    function cellApplyGrowSway(cells, raw, cycle) {
      const bounds = state.cellSystem.bounds;
      const angle = Math.sin((cycle + raw) * Math.PI * 2) * 0.035;
      const anchor = { x: bounds.centerX, y: bounds.minY };
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      cells.forEach((cell) => {
        const dx = cell.x - anchor.x;
        const dy = cell.y - anchor.y;
        cell.x = anchor.x + dx * cos - dy * sin;
        cell.y = anchor.y + dx * sin + dy * cos;
      });
    }

    function cellGrowAmount(raw) {
      if (raw >= 1) return 1;
      if (raw < 0.72) return organicEase(raw / 0.72);
      const phase = (raw - 0.72) / 0.28;
      return 1 + Math.pow(Math.sin(phase * Math.PI), 2) * 0.075;
    }

    function cellGrowStepScale(cell, unit, step) {
      const sizeRatio = cell.r / Math.max(0.001, unit);
      const smallBoost = clamp((1.15 - sizeRatio) / 0.65, 0, 1);
      const largeBrake = clamp((sizeRatio - 1) / 0.8, 0, 1);
      const jitter = seededRandom(`cell-grow-scale|${state.fileName}|${step}|${cell.index ?? 0}`)() * 0.055;
      return clamp(1.28 + smallBoost * 0.34 - largeBrake * 0.16 + jitter, 1.16, 1.68);
    }

    function cellGrowRadiusCap(cell, unit) {
      const base = cell.baseR || cell.r;
      const sizeRatio = base / Math.max(0.001, unit);
      const smallBoost = clamp((1.15 - sizeRatio) / 0.65, 0, 1);
      const largeBrake = clamp((sizeRatio - 1) / 0.8, 0, 1);
      return base * clamp(1.62 + smallBoost * 0.62 - largeBrake * 0.28, 1.32, 2.35);
    }

    function cellGrowLayoutForCycle(cells, cycle) {
      const safeCycle = Math.floor(cycle);
      const signature = state.cellSystem.lastSignature;
      if (!state.cellSystem.growCache || state.cellSystem.growCache.signature !== signature) {
        state.cellSystem.growCache = {
          signature,
          layouts: [cellAssignGrowGeometry(cells.map((cell) => ({ ...cell })))],
          focuses: [],
        };
      }
      const cache = state.cellSystem.growCache;
      const targetIndex = Math.max(0, safeCycle + 1);
      while (cache.layouts.length <= targetIndex) {
        const step = cache.layouts.length - 1;
        const previous = cache.layouts[cache.layouts.length - 1];
        const previousFocus = cache.focuses[cache.focuses.length - 1] ?? -1;
        const focusIndex = cellGrowFocusIndex(previous, step, previousFocus);
        cache.layouts.push(cellApplyGrowMutation(previous, focusIndex, step));
        cache.focuses.push(focusIndex);
      }
      return cache.layouts[targetIndex];
    }

    function cellApplyGrowMutation(source, focusIndex, step) {
      if (!source.length) return [];
      const unit = cellAverageRadius(source);
      const bounds = state.cellSystem.bounds;
      const padding = Math.max(0.012, unit * 0.014);
      const focusCell = source[focusIndex] ?? source[0];
      const focusCap = cellGrowRadiusCap(focusCell, unit);
      const nextFocusR = Math.min(focusCap, Math.max(focusCell.r * cellGrowStepScale(focusCell, unit, step), focusCell.r + unit * 0.36));
      const growthDelta = Math.max(0, nextFocusR - focusCell.r);
      const influenceDistance = Math.max(unit * 8.6, 15);
      const influenceGap = Math.max(unit * 4.4, 5.4);
      const mutated = source.map((cell, index) => {
        if (index === focusIndex) {
          return { ...cell, r: nextFocusR, opacity: config.cellOpacity };
        }
        const dist = Math.max(0.001, distance(cell, focusCell));
        const edgeGap = Math.max(0, dist - cell.r - focusCell.r);
        const gapInfluence = clamp(1 - edgeGap / influenceGap, 0, 1);
        const distanceInfluence = clamp(1 - dist / influenceDistance, 0, 1);
        const influence = Math.pow(gapInfluence, 0.52) * Math.pow(distanceInfluence, 0.28);
        const nx = (cell.x - focusCell.x) / dist;
        const ny = (cell.y - focusCell.y) / dist;
        const tangent = (seededRandom(`cell-grow-tangent|${state.fileName}|${step}|${index}`)() - 0.5) * unit * 0.2 * influence;
        const push = influence * Math.max(unit * 0.22, growthDelta * 1.22);
        const base = cell.baseR || cell.r;
        const minR = base * 0.34;
        const maxR = base * 1.62;
        const shrinkInfluence = Math.max(0.16, influence);
        return {
          ...cell,
          x: cell.x + nx * push - ny * tangent,
          y: cell.y + ny * push + nx * tangent,
          r: clamp(cell.r * (1 - shrinkInfluence * 0.2), minR, maxR),
          opacity: config.cellOpacity,
        };
      });
      cellConserveGrowArea(mutated, focusIndex, source.reduce((sum, cell) => sum + cell.r * cell.r, 0));
      cellRelaxGrowLayout(mutated, padding, bounds);
      return cellAssignGrowGeometry(mutated);
    }

    function cellConserveGrowArea(cells, focusIndex, sourceArea) {
      const otherArea = cells.reduce((sum, cell, index) => index === focusIndex ? sum : sum + cell.r * cell.r, 0);
      if (otherArea <= 0) return;
      const focusArea = (cells[focusIndex]?.r ?? 0) ** 2;
      const targetOtherArea = Math.max(sourceArea - focusArea, sourceArea * 0.1);
      if (otherArea <= targetOtherArea) return;
      const scale = Math.sqrt(targetOtherArea / otherArea);
      cells.forEach((cell, index) => {
        if (index === focusIndex) return;
        const base = cell.baseR || cell.r;
        cell.r = Math.max(base * 0.28, cell.r * scale);
      });
      const totalArea = cells.reduce((sum, cell) => sum + cell.r * cell.r, 0);
      if (totalArea <= sourceArea * 1.03) return;
      const remainingArea = cells.reduce((sum, cell, index) => index === focusIndex ? sum : sum + cell.r * cell.r, 0);
      const hardTarget = Math.max(sourceArea - focusArea, sourceArea * 0.06);
      const hardScale = Math.sqrt(Math.max(0.001, hardTarget) / Math.max(0.001, remainingArea));
      cells.forEach((cell, index) => {
        if (index === focusIndex) return;
        const base = cell.baseR || cell.r;
        cell.r = Math.max(base * 0.12, cell.r * hardScale);
      });
    }

    function cellRelaxGrowLayout(cells, padding, bounds) {
      const center = { x: bounds.centerX, y: bounds.centerY };
      const maxRadius = Math.max(18, Math.min(bounds.maxX - bounds.minX, bounds.maxY - bounds.minY) * 0.58);
      const unit = cellAverageRadius(cells);
      for (let pass = 0; pass < 110; pass += 1) {
        const centerPull = pass < 76 ? 0.024 : 0.008;
        cells.forEach((cell) => {
          const dx = cell.x - center.x;
          const dy = cell.y - center.y;
          const radial = Math.max(0.001, Math.hypot(dx, dy));
          const limit = maxRadius - cell.r;
          if (radial > limit) {
            const pull = (radial - limit) * 0.18;
            cell.x -= (dx / radial) * pull;
            cell.y -= (dy / radial) * pull;
          }
          cell.x += (center.x - cell.x) * centerPull;
          cell.y += (center.y - cell.y) * centerPull;
        });
        cellPullNearestGrowNeighbors(cells, padding, unit);
        for (let i = 0; i < cells.length; i += 1) {
          for (let j = i + 1; j < cells.length; j += 1) {
            const a = cells[i];
            const b = cells[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.max(0.001, Math.hypot(dx, dy));
            const minDistance = a.r + b.r + padding;
            if (dist >= minDistance) continue;
            const overlap = minDistance - dist;
            const nx = dx / dist;
            const ny = dy / dist;
            const aWeight = b.r / Math.max(0.001, a.r + b.r);
            const bWeight = a.r / Math.max(0.001, a.r + b.r);
            a.x -= nx * overlap * aWeight;
            a.y -= ny * overlap * aWeight;
            b.x += nx * overlap * bWeight;
            b.y += ny * overlap * bWeight;
          }
        }
      }
    }

    function cellPullNearestGrowNeighbors(cells, padding, unit) {
      const moves = cells.map(() => ({ x: 0, y: 0 }));
      cells.forEach((cell, index) => {
        let nearest = null;
        for (let otherIndex = 0; otherIndex < cells.length; otherIndex += 1) {
          if (otherIndex === index) continue;
          const other = cells[otherIndex];
          const dx = other.x - cell.x;
          const dy = other.y - cell.y;
          const dist = Math.max(0.001, Math.hypot(dx, dy));
          const surfaceGap = dist - cell.r - other.r - padding;
          const score = surfaceGap + Math.abs((cell.radial ?? 0) - (other.radial ?? 0)) * 0.018;
          if (!nearest || score < nearest.score) nearest = { otherIndex, dx, dy, dist, surfaceGap, score };
        }
        if (!nearest || nearest.surfaceGap <= padding * 0.8) return;
        const pull = Math.min(nearest.surfaceGap * 0.34, unit * 0.11);
        const nx = nearest.dx / nearest.dist;
        const ny = nearest.dy / nearest.dist;
        moves[index].x += nx * pull;
        moves[index].y += ny * pull;
        moves[nearest.otherIndex].x -= nx * pull * 0.45;
        moves[nearest.otherIndex].y -= ny * pull * 0.45;
      });
      cells.forEach((cell, index) => {
        cell.x += moves[index].x;
        cell.y += moves[index].y;
      });
    }

    function cellAssignGrowGeometry(cells) {
      const bounds = state.cellSystem.bounds;
      return cells.map((cell, index) => {
        const dx = cell.x - bounds.centerX;
        const dy = cell.y - bounds.centerY;
        return {
          ...cell,
          index,
          angle: Math.atan2(dy, dx),
          radial: Math.hypot(dx, dy),
          centerRatio: 1 - clamp(Math.hypot(dx, dy) / Math.max(1, Math.min(bounds.maxX - bounds.minX, bounds.maxY - bounds.minY) * 0.5), 0, 1),
        };
      });
    }

    function cellGrowFocusIndex(cells, cycle) {
      const count = cells.length;
      if (!count) return 0;
      const safeCycle = Math.max(0, Math.floor(cycle));
      const slot = safeCycle % count;
      return cellGrowRoundOrder(count)[slot] ?? 0;
    }

    function cellGrowRoundOrder(count) {
      return Array.from({ length: count }, (_, index) => ({
        index,
        key: seededRandom(`cell-grow-order|${state.fileName}|${count}|${index}`)(),
      })).sort((a, b) => a.key - b.key).map((item) => item.index);
    }

    function cellRotateState(cell, index, cycle, progress, pulse) {
      const ringInfo = cellRingInfo(index);
      if (!ringInfo || ringInfo.ring.length < 3) return { ...cell, opacity: config.cellOpacity };
      const { ring, position } = ringInfo;
      const from = cellRingItem(ring, position + cycle);
      const to = cellRingItem(ring, position + cycle + 1);
      if (!from || !to) return { ...cell, opacity: config.cellOpacity };
      const point = arcCellMove(from, to, progress);
      return {
        ...cell,
        x: point.x,
        y: point.y,
        r: mixCellValue(from.r, to.r, progress) * (0.98 + pulse * 0.03),
        opacity: config.cellOpacity,
      };
    }

    function cellRingInfo(index) {
      for (const ring of state.cellSystem.rings) {
        const position = ring.findIndex((item) => item.index === index);
        if (position >= 0) return { ring, position };
      }
      return null;
    }

    function cellRingItem(ring, index) {
      if (!ring?.length) return null;
      return ring[((Math.round(index) % ring.length) + ring.length) % ring.length] ?? null;
    }

    function curvedCellMove(from, to, index, progress, bendRatio) {
      const t = organicEase(progress);
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const length = Math.max(0.001, Math.hypot(dx, dy));
      const sign = seededRandom(`cell-curve|${state.fileName}|${index}`)() > 0.5 ? 1 : -1;
      const bend = Math.min(length * bendRatio, cellAverageRadius(state.cellSystem.cells) * 2.2) * sign;
      const wave = Math.sin(Math.PI * t);
      return {
        x: mixCellValue(from.x, to.x, t) + (-dy / length) * bend * wave,
        y: mixCellValue(from.y, to.y, t) + (dx / length) * bend * wave,
      };
    }

    function pairedCellSwapMove(from, to, index, progress) {
      const t = organicEase(progress);
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const length = Math.max(0.001, Math.hypot(dx, dy));
      if (length < 0.05) return { x: from.x, y: from.y };
      const direction = seededRandom(`cell-swap-arc|${state.fileName}|${index}`)() > 0.5 ? 1 : -1;
      const arcHeight = Math.min(cellAverageRadius(state.cellSystem.cells) * 1.85, length * 0.42) * direction;
      const wave = Math.sin(Math.PI * t);
      return {
        x: mixCellValue(from.x, to.x, t) + (-dy / length) * arcHeight * wave,
        y: mixCellValue(from.y, to.y, t) + (dx / length) * arcHeight * wave,
      };
    }

    function arcCellMove(from, to, progress) {
      const bounds = state.cellSystem.bounds;
      const t = organicEase(progress);
      const fromAngle = Math.atan2(from.y - bounds.centerY, from.x - bounds.centerX);
      const toAngle = Math.atan2(to.y - bounds.centerY, to.x - bounds.centerX);
      let delta = toAngle - fromAngle;
      if (delta <= 0) delta += Math.PI * 2;
      const angle = fromAngle + delta * t;
      const radial = mixCellValue(from.radial ?? Math.hypot(from.x - bounds.centerX, from.y - bounds.centerY), to.radial ?? Math.hypot(to.x - bounds.centerX, to.y - bounds.centerY), t);
      return {
        x: bounds.centerX + Math.cos(angle) * radial,
        y: bounds.centerY + Math.sin(angle) * radial,
      };
    }

    function organicEase(value) {
      const t = clamp(value, 0, 1);
      return t * t * t * (t * (t * 6 - 15) + 10);
    }

    function naturalBezierEase(value) {
      const target = clamp(value, 0, 1);
      let low = 0;
      let high = 1;
      let t = target;
      for (let i = 0; i < 16; i += 1) {
        t = (low + high) / 2;
        const x = cubicBezierAxis(t, 0.5, 0);
        if (x < target) low = t;
        else high = t;
      }
      return cubicBezierAxis(t, 0, 1);
    }

    function cellAverageRadius(cells) {
      if (!cells?.length) return 2.75;
      return cells.reduce((sum, cell) => sum + (cell.baseR ?? cell.r ?? 2.75), 0) / cells.length;
    }

    function organicPulse(value) {
      return Math.sin(clamp(value, 0, 1) * Math.PI);
    }

    function mixCellValue(from, to, progress) {
      return from + (to - from) * progress;
    }

    function preventCellOverlaps(cells, allowMove = true) {
      const padding = Math.max(0.03, cellAverageRadius(cells) * 0.035);
      const resolved = cells.map((cell) => ({ ...cell }));
      for (let pass = 0; pass < 5; pass += 1) {
        for (let i = 0; i < resolved.length; i += 1) {
          for (let j = i + 1; j < resolved.length; j += 1) {
            const a = resolved[i];
            const b = resolved[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const distanceValue = Math.max(0.001, Math.hypot(dx, dy));
            const minDistance = a.r + b.r + padding;
            if (distanceValue >= minDistance) continue;
            if (!allowMove) continue;
            const overlap = minDistance - distanceValue;
            const nx = dx / distanceValue;
            const ny = dy / distanceValue;
            const movableA = a.r / Math.max(0.001, a.r + b.r);
            const movableB = 1 - movableA;
            a.x -= nx * overlap * movableA;
            a.y -= ny * overlap * movableA;
            b.x += nx * overlap * movableB;
            b.y += ny * overlap * movableB;
            if (pass > 2) {
              const shrink = Math.max(0.88, distanceValue / minDistance);
              a.r *= shrink;
              b.r *= shrink;
            }
          }
        }
      }
      for (let i = 0; i < resolved.length; i += 1) {
        for (let j = i + 1; j < resolved.length; j += 1) {
          const a = resolved[i];
          const b = resolved[j];
          const distanceValue = Math.max(0.001, distance(a, b));
          const maxRadiusSum = Math.max(0.001, distanceValue - padding);
          const radiusSum = a.r + b.r;
          if (radiusSum <= maxRadiusSum) continue;
          const shrink = Math.max(0.04, maxRadiusSum / radiusSum);
          a.r *= shrink;
          b.r *= shrink;
        }
      }
      return resolved;
    }

    function countCellOverlaps(cells) {
      let count = 0;
      for (let i = 0; i < cells.length; i += 1) {
        for (let j = i + 1; j < cells.length; j += 1) {
          if (distance(cells[i], cells[j]) + 0.02 < cells[i].r + cells[j].r) count += 1;
        }
      }
      return count;
    }

    function drawCellCircle(ctx, cell) {
      const point = particleToCanvas(cell);
      const radius = Math.max(0.4, cell.r) * state.particleSystem.viewport.size / 100;
      ctx.globalAlpha = clamp(cell.opacity ?? config.cellOpacity, 0, 1);
      ctx.beginPath();
      ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function requestParticleFrameUpload(frameId) {
      pendingParticleUploadFrameId = frameId;
      particleFrameInput.multiple = frameId == null;
      particleFrameInput.value = "";
      particleFrameInput.click();
    }

    async function loadParticleKeyframeFiles(files, frameId) {
      const list = Array.from(files || []).filter((file) => file?.type?.startsWith("image/"));
      if (!list.length) return;
      if (frameId != null) {
        await loadParticleKeyframeFile(list[0], frameId);
        return;
      }
      for (const file of list) {
        await loadParticleKeyframeFile(file, null);
      }
    }

    async function loadParticleKeyframeFile(file, frameId) {
      if (!file || !file.type.startsWith("image/")) return;
      setStatus("Loading");
      const image = await loadImage(await fileToDataURL(file));
      const imageData = readImageToImageData(image, 360);
      const nextId = frameId ?? (Math.max(0, ...config.particleKeyframes.map((frame) => frame.id)) + 1);
      const frame = makeParticleFrameFromImageData(imageData, file.name, nextId);
      if (frameId == null) {
        config.particleKeyframes.push(frame);
      } else {
        const index = config.particleKeyframes.findIndex((item) => item.id === frameId);
        if (index >= 0) config.particleKeyframes.splice(index, 1, frame);
      }
      renderMotionControls();
      activeEffect().prepare();
      state.startedAt = performance.now();
      updateMeta();
      updateFormulaAndCode();
      setStatus("Ready");
    }

    function readImageToImageData(image, maxSide) {
      const scale = Math.min(1, maxSide / Math.max(image.naturalWidth, image.naturalHeight));
      const width = Math.max(8, Math.round(image.naturalWidth * scale));
      const height = Math.max(8, Math.round(image.naturalHeight * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(image, 0, 0, width, height);
      return ctx.getImageData(0, 0, width, height);
    }

    function ensureLineFramePoints(frame, chars, frameIndex, previousFrames) {
      const saved = Array.isArray(frame.points) ? frame.points : [];
      const valid = saved.length === chars.length && saved.every((point, index) => point?.char === chars[index] && Number.isFinite(point.x) && Number.isFinite(point.y));
      if (valid) {
        return saved.map((point) => ({
          char: point.char,
          progress: Number.isFinite(point.progress) ? point.progress : 0,
          point: { x: Number(point.x), y: Number(point.y) },
        }));
      }
      delete frame.connections;
      delete frame.connectionsEdited;
      const points = chooseLineFramePoints(chars, frame.id, frameIndex, previousFrames);
      frame.points = serializeLineFramePoints(points);
      return points;
    }

    function serializeLineFramePoints(points) {
      return points.map((item) => ({
        char: item.char,
        progress: Number.isFinite(item.progress) ? Number(item.progress.toFixed(6)) : 0,
        x: Number(item.point.x.toFixed(3)),
        y: Number(item.point.y.toFixed(3)),
      }));
    }

    function ensureLineFrameConnections(frame, points) {
      const count = Array.isArray(points) ? points.length : Number(points);
      if (count < 2) {
        frame.connections = [];
        return [];
      }
      const seen = new Set();
      const hasSavedConnections = Array.isArray(frame.connections) && (frame.connections.length > 0 || frame.connectionsEdited);
      const valid = hasSavedConnections
        && frame.connections.every((connection) => {
          const a = Number(connection.a);
          const b = Number(connection.b);
          if (!Number.isInteger(a) || !Number.isInteger(b) || a < 0 || b < 0 || a >= count || b >= count || a === b) return false;
          const key = a < b ? `${a}-${b}` : `${b}-${a}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      if (!valid) frame.connections = buildLineConnections(points, frame.id);
      return cloneLineConnections(frame.connections);
    }

    function cloneLineConnections(connections) {
      return connections.map((connection) => ({
        a: connection.a,
        b: connection.b,
        curved: Boolean(connection.curved),
        bendA: Number(connection.bendA),
        bendB: Number(connection.bendB),
        tensionA: Number(connection.tensionA),
        tensionB: Number(connection.tensionB),
      }));
    }

    function chooseLineFramePoints(chars, frameId, frameIndex, previousFrames) {
      if (!chars.length || !state.coefficients.length) return [];
      let best = null;
      for (let variant = 0; variant < 24; variant += 1) {
        const rng = seededRandom(`${frameId}|${frameIndex}|${chars.join("")}|${variant}`);
        const offset = normalizeProgress(frameIndex * 0.38196601125 + variant * 0.071 + rng() * 0.13);
        const points = chars.map((char, index) => {
          const spread = 1 / chars.length;
          const jitter = (rng() - 0.5) * Math.min(0.72 * spread, 0.13);
          const progress = normalizeProgress(offset + (index + 0.5) * spread + jitter);
          return {
            char,
            progress,
            point: curvePointFromCoefficients(state.coefficients, progress, 1),
          };
        });
        const score = lineFrameDifference(points, previousFrames);
        if (!best || score > best.score) best = { score, points };
      }
      return best?.points ?? [];
    }

    function lineFrameDifference(points, previousFrames) {
      const previousPoints = previousFrames.flatMap((frame) => frame.points);
      if (!previousPoints.length) return 1;
      const total = points.reduce((sum, point) => {
        const nearest = previousPoints.reduce((best, previous) => Math.min(best, circularDistance(point.progress, previous.progress)), 1);
        return sum + nearest;
      }, 0);
      return total / Math.max(1, points.length);
    }

    function circularDistance(a, b) {
      const delta = Math.abs(a - b);
      return Math.min(delta, 1 - delta);
    }

    function seededRandom(seed) {
      let hash = 2166136261;
      const text = String(seed);
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return () => {
        hash += 0x6D2B79F5;
        let value = hash;
        value = Math.imul(value ^ (value >>> 15), value | 1);
        value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
        return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
      };
    }

    function buildLineConnections(pointsOrCount, seedKey = "") {
      const maxPoints = Array.isArray(pointsOrCount) ? pointsOrCount.length : Number(pointsOrCount);
      if (maxPoints < 2) return [];
      const points = Array.isArray(pointsOrCount) ? pointsOrCount : [];
      const rng = seededRandom(`line-connections|${maxPoints}|${config.lineCurveSeed}|${seedKey}`);
      const closed = maxPoints > 3 && rng() > 0.48;
      const desired = closed ? maxPoints : maxPoints - 1;
      const pointOrder = chooseLinePointOrder(points, maxPoints, desired, closed, seedKey);
      const curveIndex = Math.floor(rng() * desired);
      return Array.from({ length: desired }, (_, index) => {
        const connection = { a: pointOrder[index], b: pointOrder[(index + 1) % maxPoints] };
        const curveRng = seededRandom(`line-curve-shape|${maxPoints}|${index}|${config.lineCurveSeed}|${seedKey}`);
        const sign = curveRng() > 0.5 ? 1 : -1;
        const sCurve = curveRng() > 0.42;
        return {
          ...connection,
          curved: index === curveIndex,
          bendA: sign * (0.18 + curveRng() * 0.38),
          bendB: (sCurve ? -sign : sign) * (0.18 + curveRng() * 0.42),
          tensionA: 0.22 + curveRng() * 0.2,
          tensionB: 0.66 + curveRng() * 0.22,
        };
      });
    }

    function chooseLinePointOrder(points, count, connectionCount, closed, seedKey) {
      let best = null;
      const attempts = points.length ? 72 : 1;
      for (let attempt = 0; attempt < attempts; attempt += 1) {
        const order = shuffledLinePointOrder(count, `line-order|${count}|${connectionCount}|${closed}|${config.lineCurveSeed}|${seedKey}|${attempt}`);
        const crossingCount = points.length ? countLineOrderCrossings(points, order, connectionCount, closed) : 1;
        const target = targetLineCrossings(connectionCount);
        const tooMany = Math.max(0, crossingCount - Math.max(target + 2, Math.ceil(connectionCount * 0.55)));
        const ringPenalty = crossingCount === 0 && connectionCount > 2 ? 6 : 0;
        const score = Math.abs(crossingCount - target) + ringPenalty + tooMany * 4;
        if (!best || score < best.score) best = { order, score, crossingCount };
        if (best.score === 0) break;
      }
      return best?.order ?? shuffledLinePointOrder(count, `line-order|${count}|fallback|${seedKey}`);
    }

    function targetLineCrossings(connectionCount) {
      if (connectionCount < 3) return 0;
      if (connectionCount < 5) return 1;
      return Math.min(3, Math.max(1, Math.round(connectionCount * 0.32)));
    }

    function countLineOrderCrossings(points, order, connectionCount, closed) {
      const segments = Array.from({ length: connectionCount }, (_, index) => ({
        from: order[index],
        to: order[(index + 1) % order.length],
      }));
      let crossings = 0;
      for (let aIndex = 0; aIndex < segments.length; aIndex += 1) {
        for (let bIndex = aIndex + 1; bIndex < segments.length; bIndex += 1) {
          const first = segments[aIndex];
          const second = segments[bIndex];
          if (first.from === second.from || first.from === second.to || first.to === second.from || first.to === second.to) continue;
          if (closed && aIndex === 0 && bIndex === segments.length - 1) continue;
          if (lineSegmentsIntersect(linePointForIndex(points, first.from), linePointForIndex(points, first.to), linePointForIndex(points, second.from), linePointForIndex(points, second.to))) crossings += 1;
        }
      }
      return crossings;
    }

    function linePointForIndex(points, index) {
      return points[index]?.point ?? points[index] ?? { x: 0, y: 0 };
    }

    function lineSegmentsIntersect(a, b, c, d) {
      const abx = b.x - a.x;
      const aby = b.y - a.y;
      const cdx = d.x - c.x;
      const cdy = d.y - c.y;
      const acx = c.x - a.x;
      const acy = c.y - a.y;
      const denominator = abx * cdy - aby * cdx;
      if (Math.abs(denominator) < 0.0001) return false;
      const t = (acx * cdy - acy * cdx) / denominator;
      const u = (acx * aby - acy * abx) / denominator;
      return t > 0.03 && t < 0.97 && u > 0.03 && u < 0.97;
    }

    function shuffledLinePointOrder(count, seed) {
      const rng = seededRandom(seed);
      const order = Array.from({ length: count }, (_, index) => index);
      for (let index = order.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(rng() * (index + 1));
        [order[index], order[swapIndex]] = [order[swapIndex], order[index]];
      }
      return order;
    }

    function ensureLineGroup() {
      if (!state.lineGroup) {
        state.lineGroup = document.createElementNS(SVG_NS, "g");
        state.lineGroup.setAttribute("id", "line-group");
        motionGroup.appendChild(state.lineGroup);
      }
      state.lineGroup.style.display = "";
      return state.lineGroup;
    }

    function hideLineGroup() {
      if (state.lineGroup) state.lineGroup.style.display = "none";
    }

    function hideParticles() {
      state.particles.forEach((circle) => { circle.style.display = "none"; });
    }

    function ensureLineElements(lineCount, textCount) {
      const group = ensureLineGroup();
      while (state.linePaths.length < lineCount) {
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("class", "line-path");
        path.setAttribute("fill", "none");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        group.appendChild(path);
        state.linePaths.push(path);
      }
      while (state.lineTexts.length < textCount) {
        const text = document.createElementNS(SVG_NS, "text");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "central");
        text.setAttribute("font-family", "Inter, SF Pro Display, Arial, sans-serif");
        text.setAttribute("font-weight", "700");
        group.appendChild(text);
        state.lineTexts.push(text);
      }
      state.linePaths.forEach((path, index) => { path.style.display = index < lineCount ? "" : "none"; });
      state.lineTexts.forEach((text, index) => { text.style.display = index < textCount ? "" : "none"; });
      state.constellationDots.forEach((dot) => { dot.style.display = "none"; });
    }

    function ensureConstellationElements(dotCount, lineCount, textCount) {
      const group = ensureLineGroup();
      while (state.constellationDots.length < dotCount) {
        const circle = document.createElementNS(SVG_NS, "circle");
        circle.setAttribute("vector-effect", "non-scaling-stroke");
        group.appendChild(circle);
        state.constellationDots.push(circle);
      }
      while (state.linePaths.length < lineCount) {
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("class", "line-path");
        path.setAttribute("fill", "none");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        group.appendChild(path);
        state.linePaths.push(path);
      }
      while (state.lineTexts.length < textCount) {
        const text = document.createElementNS(SVG_NS, "text");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "central");
        text.setAttribute("font-family", "Inter, SF Pro Display, Arial, sans-serif");
        text.setAttribute("font-weight", "700");
        group.appendChild(text);
        state.lineTexts.push(text);
      }
      state.constellationDots.forEach((dot) => group.appendChild(dot));
      state.linePaths.forEach((path) => group.appendChild(path));
      state.lineTexts.forEach((text) => group.appendChild(text));
      state.constellationDots.forEach((dot, index) => { dot.style.display = index < dotCount ? "" : "none"; });
      state.linePaths.forEach((path, index) => { path.style.display = index < lineCount ? "" : "none"; });
      state.lineTexts.forEach((text, index) => { text.style.display = index < textCount ? "" : "none"; });
    }

    function buildConstellationPoints() {
      const contours = state.normalizedContours.length ? state.normalizedContours : [state.normalized].filter((contour) => contour.length);
      const maxChars = Math.max(0, ...config.lineKeyframes.map((frame) => Array.from(frame.text ?? "").filter((char) => !/\s/.test(char)).length));
      const target = Math.max(5, maxChars, Math.round(config.constellationPointCount));
      if (!contours.length) return [];
      const boundaryTarget = Math.max(3, Math.min(target, Math.round(target * 0.58)));
      const contourLengths = contours.map(contourLength);
      const totalLength = contourLengths.reduce((sum, value) => sum + value, 0) || contours.length;
      const points = [];
      contours.forEach((contour, contourIndex) => {
        const count = Math.max(3, Math.round(boundaryTarget * (contourLengths[contourIndex] || 1) / totalLength));
        const sampled = resampleSmoothClosed(contour, count);
        sampled.forEach((point, pointIndex) => {
          points.push({
            x: point.x,
            y: point.y,
            onContour: true,
            contourIndex,
            contourPointIndex: pointIndex,
            contourPointCount: sampled.length,
            contourProgress: pointIndex / sampled.length,
          });
        });
      });
      const bounds = contourBounds(contours);
      const rng = seededRandom(`constellation-points|${state.fileName}|${target}|${config.simplifyPointCount}|${config.harmonicCount}`);
      const idealGap = constellationPointDistributionGap(target, bounds);
      let guard = 0;
      while (points.length < target && guard < target * 180) {
        guard += 1;
        const point = {
          x: bounds.minX + rng() * Math.max(1, bounds.maxX - bounds.minX),
          y: bounds.minY + rng() * Math.max(1, bounds.maxY - bounds.minY),
        };
        if (!pointInsideConstellationShape(point, contours)) continue;
        const relaxedGap = guard < target * 90 ? idealGap : idealGap * 0.62;
        if (!points.every((existing) => distance(point, existing) >= relaxedGap)) continue;
        points.push({ ...point, onContour: false, contourIndex: -1, contourPointIndex: -1, contourPointCount: 0 });
      }
      return points.slice(0, target);
    }

    function contourLength(contour) {
      return contour.reduce((sum, point, index) => sum + distance(point, contour[(index + 1) % contour.length]), 0);
    }

    function contourBounds(contours) {
      const all = contours.flat();
      return all.reduce((bounds, point) => ({
        minX: Math.min(bounds.minX, point.x),
        minY: Math.min(bounds.minY, point.y),
        maxX: Math.max(bounds.maxX, point.x),
        maxY: Math.max(bounds.maxY, point.y),
      }), { minX: 8, minY: 8, maxX: 92, maxY: 92 });
    }

    function pointInsideConstellationShape(point, contours) {
      let inside = false;
      contours.forEach((contour) => {
        if (pointInPolygon(point, contour)) inside = !inside;
      });
      return inside;
    }

    function constellationPointDistributionGap(target, bounds) {
      const diagonal = Math.hypot(Math.max(1, bounds.maxX - bounds.minX), Math.max(1, bounds.maxY - bounds.minY));
      return clamp((diagonal / Math.sqrt(Math.max(1, target))) * 0.34, 5.2, 13.5);
    }

    function chooseConstellationFramePoints(chars, frameId, frameIndex) {
      if (!chars.length || !state.constellationPoints.length) return [];
      const order = chooseSpreadConstellationBaseIndices(chars.length, `constellation-order|${frameId}|${frameIndex}|${chars.join("")}|${config.lineCurveSeed}`);
      return chars.slice(0, state.constellationPoints.length).map((char, index) => {
        const baseIndex = order[index % order.length];
        const base = state.constellationPoints[baseIndex];
        return {
          char,
          baseIndex,
          point: { x: base.x, y: base.y },
          onContour: base.onContour,
          contourIndex: base.contourIndex,
          contourPointIndex: base.contourPointIndex,
          contourPointCount: base.contourPointCount,
          contourProgress: base.contourProgress,
        };
      });
    }

    function chooseSpreadConstellationBaseIndices(count, seed) {
      const total = state.constellationPoints.length;
      const desired = Math.min(count, total);
      if (!desired) return [];
      const shuffled = shuffledLinePointOrder(total, seed);
      const chosen = [shuffled[0]];
      const used = new Set(chosen);
      const rng = seededRandom(`${seed}|spread`);
      while (chosen.length < desired) {
        let best = null;
        shuffled.forEach((candidate) => {
          if (used.has(candidate)) return;
          const point = state.constellationPoints[candidate];
          const nearest = chosen.reduce((min, index) => Math.min(min, distance(point, state.constellationPoints[index])), Infinity);
          const score = nearest + rng() * 1.8;
          if (!best || score > best.score) best = { candidate, score };
        });
        if (!best) break;
        chosen.push(best.candidate);
        used.add(best.candidate);
      }
      return chosen;
    }

    function ensureConstellationFrameConnections(frame, points, frameIndex) {
      const count = points.length;
      if (count < 2) return [];
      const saved = Array.isArray(frame.constellationConnections) ? frame.constellationConnections : [];
      const seen = new Set();
      const valid = (saved.length > 0 || frame.constellationConnectionsEdited) && saved.every((connection) => {
        const a = Number(connection.a);
        const b = Number(connection.b);
        if (!Number.isInteger(a) || !Number.isInteger(b) || a < 0 || b < 0 || a >= count || b >= count || a === b) return false;
        const key = a < b ? `${a}-${b}` : `${b}-${a}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      if (valid) return saved.map((connection) => makeConstellationConnection(connection.a, connection.b, points));
      const order = chooseLinePointOrder(points, points.length, points.length - 1, false, `constellation-lines|${frame.id}|${frameIndex}|${config.lineCurveSeed}`);
      const generated = Array.from({ length: points.length - 1 }, (_, index) => makeConstellationConnection(order[index], order[index + 1], points));
      frame.constellationConnections = generated.map((connection) => ({ a: connection.a, b: connection.b }));
      return generated;
    }

    function makeConstellationConnection(a, b, points) {
      const connection = {
        a,
        b,
        curved: false,
        constellation: true,
        contourPath: areAdjacentConstellationContourPoints(points[a], points[b]),
      };
      connection.d = constellationConnectionPath(points[a], points[b], connection, points);
      return connection;
    }

    function areAdjacentConstellationContourPoints(a, b) {
      if (!a?.onContour || !b?.onContour || a.contourIndex !== b.contourIndex) return false;
      const count = Math.max(1, a.contourPointCount);
      const delta = Math.abs(a.contourPointIndex - b.contourPointIndex);
      return delta === 1 || delta === count - 1;
    }

    function constellationConnectionPath(a, b, connection, activePoints = []) {
      if (!a || !b) return "";
      if (connection.contourPath) {
        const contourPath = constellationContourConnectionPath(a, b, activePoints);
        if (contourPath) return contourPath;
      }
      const points = sampleConstellationLine(a.point, b.point);
      return buildClippedConstellationPath(points, constellationConnectionGapBlockers(activePoints));
    }

    function constellationContourConnectionPath(a, b, activePoints = []) {
      const source = (state.normalizedContours.length ? state.normalizedContours : [state.normalized])[a.contourIndex];
      if (!source?.length) return "";
      const count = Math.max(1, a.contourPointCount);
      const forward = (a.contourPointIndex + 1) % count === b.contourPointIndex;
      const backward = (b.contourPointIndex + 1) % count === a.contourPointIndex;
      if (!forward && !backward) return "";
      const samples = constellationSmoothContourSamples(source);
      const startIndex = Math.round(normalizeProgress(a.contourProgress) * samples.length) % samples.length;
      const endIndex = Math.round(normalizeProgress(b.contourProgress) * samples.length) % samples.length;
      const arc = [];
      let index = startIndex;
      arc.push(samples[index]);
      for (let guard = 0; guard <= samples.length; guard += 1) {
        if (index === endIndex) break;
        index = forward ? (index + 1) % samples.length : (index - 1 + samples.length) % samples.length;
        arc.push(samples[index]);
      }
      return buildClippedConstellationPath(arc, constellationConnectionGapBlockers(activePoints));
    }

    function constellationContourBasePath(activePoints = []) {
      const contours = state.normalizedContours.length ? state.normalizedContours : [state.normalized].filter((contour) => contour.length);
      const blockers = constellationContourGapBlockers(activePoints);
      return contours.map((contour) => {
        const samples = constellationSmoothContourSamples(contour);
        return buildClippedConstellationPath(samples.concat([samples[0]]), blockers);
      }).filter(Boolean).join(" ");
    }

    function constellationSmoothContourSamples(contour) {
      return resampleClosed(smoothClosedPolyline(contour, 18), Math.max(240, contour.length * 30));
    }

    function sampleConstellationLine(a, b) {
      const steps = Math.max(8, Math.ceil(distance(a, b) / 0.55));
      return Array.from({ length: steps + 1 }, (_, index) => lerpPoint(a, b, index / steps));
    }

    function constellationConnectionGapBlockers(activePoints = []) {
      return activePoints.filter((item) => item?.point).map((item) => ({ point: item.point, radius: constellationEndpointRadius() }));
    }

    function constellationContourGapBlockers(activePoints = []) {
      const blockers = state.constellationPoints.map((point) => ({ point, radius: constellationDotGapRadius() }));
      activePoints.forEach((item) => {
        if (item?.point) blockers.push({ point: item.point, radius: constellationEndpointRadius() });
      });
      return blockers;
    }

    function constellationDotGapRadius() {
      return Math.max(1.75, config.lineCharSize * 0.18 + Math.max(0.45, config.lineStrokeWidth) * 0.55);
    }

    function constellationEndpointRadius() {
      return Math.max(2.4, config.lineCharSize);
    }

    function buildClippedConstellationPath(points, blockers) {
      const segments = [];
      let current = [];
      for (let index = 0; index < points.length - 1; index += 1) {
        const a = points[index];
        const b = points[index + 1];
        const steps = Math.max(1, Math.ceil(distance(a, b) / 0.45));
        for (let step = 0; step <= steps; step += 1) {
          if (index > 0 && step === 0) continue;
          const point = lerpPoint(a, b, step / steps);
          if (blockers.some((blocker) => distance(point, blocker.point) <= blocker.radius)) {
            if (current.length > 1) segments.push(current);
            current = [];
          } else {
            current.push(point);
          }
        }
      }
      if (current.length > 1) segments.push(current);
      return segments.map(buildConstellationPolylinePath).filter(Boolean).join(" ");
    }

    function buildConstellationPolylinePath(points) {
      if (!points.length) return "";
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
    }

    function renderLineEffect(now) {
      hideParticleCanvas();
      hideParticles();
      hideSineGroup();
      hideOscilloscopeGroup();
      if (state.lineEdit) {
        renderLineEditFrame();
        return;
      }
      hideLineEditHandles();
      if (config.lineStyle === "constellation") {
        renderConstellationLineEffect(now);
        return;
      }
      const frames = state.lineFrames.filter((frame) => frame.points.length);
      const interval = Math.max(300, config.lineFrameIntervalMs);
      const transition = Math.min(Math.max(600, config.lineTransitionMs), interval);
      const hold = Math.max(0, interval - transition);
      const cycle = Math.max(1, frames.length) * interval;
      const elapsed = Number.isFinite(state.startedAt) ? now - state.startedAt : 0;
      const local = ((elapsed % cycle) + cycle) % cycle;
      motionPath.setAttribute("stroke-width", String(config.lineStrokeWidth));
      motionPath.setAttribute("stroke", config.lineColor);
      motionPath.setAttribute("d", state.normalizedContours.length ? buildSmoothSvgMultiPath(state.normalizedContours) : buildPath(1));
      motionPath.setAttribute("opacity", "0");

      if (!frames.length) {
        ensureLineElements(0, 0);
        return;
      }

      const segment = Math.min(frames.length - 1, Math.floor(local / interval));
      const frameLocal = local % interval;
      const nextIndex = (segment + 1) % frames.length;
      const progress = frameLocal < hold ? 0 : standardBezierEase((frameLocal - hold) / transition);
      const current = frames[segment] ?? frames[0];
      const next = frames[nextIndex] ?? current;
      if (progress > 0 && progress < 1) drawTransitionLineFrame(current, next, progress);
      else drawLineFrame(progress <= 0 ? current.points : next.points, progress <= 0 ? current.connections : next.connections);
    }

    function renderConstellationLineEffect(now) {
      const frames = state.lineFrames.filter((frame) => frame.points.length);
      const interval = Math.max(300, config.lineFrameIntervalMs);
      const transition = Math.min(Math.max(600, config.lineTransitionMs), interval);
      const hold = Math.max(0, interval - transition);
      const cycle = Math.max(1, frames.length) * interval;
      const elapsed = Number.isFinite(state.startedAt) ? now - state.startedAt : 0;
      const local = ((elapsed % cycle) + cycle) % cycle;
      motionPath.setAttribute("stroke-width", String(config.constellationContourWidth));
      motionPath.setAttribute("stroke", config.constellationContourColor);
      motionPath.setAttribute("opacity", String(config.constellationContourOpacity));
      motionPath.style.filter = constellationGlowFilter(0.65);
      if (!frames.length) {
        drawConstellationBase(0, 0);
        return;
      }
      const segment = Math.min(frames.length - 1, Math.floor(local / interval));
      const frameLocal = local % interval;
      const nextIndex = (segment + 1) % frames.length;
      const progress = frameLocal < hold ? 0 : standardBezierEase((frameLocal - hold) / transition);
      const current = frames[segment] ?? frames[0];
      const next = frames[nextIndex] ?? current;
      if (progress > 0 && progress < 1) drawConstellationTransition(current, next, progress);
      else drawConstellationFrame(progress <= 0 ? current : next);
    }

    function drawConstellationBase(lineCount, textCount, contourPath = state.constellationContourPath) {
      ensureConstellationElements(state.constellationPoints.length, lineCount, textCount);
      motionPath.setAttribute("d", contourPath || state.constellationContourPath || constellationContourBasePath());
      const dotRadius = Math.max(0.34, config.lineCharSize * 0.105);
      state.constellationPoints.forEach((point, index) => {
        const dot = state.constellationDots[index];
        dot.setAttribute("cx", point.x.toFixed(2));
        dot.setAttribute("cy", point.y.toFixed(2));
        dot.setAttribute("r", dotRadius.toFixed(2));
        dot.setAttribute("fill", config.lineCharColor);
        dot.setAttribute("opacity", String(Math.min(0.42, config.lineCharOpacity * 0.24)));
        dot.style.filter = constellationGlowFilter(0.42);
      });
    }

    function drawConstellationFrame(frame) {
      drawConstellationBase(frame.connections.length, frame.points.length, frame.contourPath);
      frame.connections.forEach((connection, index) => {
        drawConstellationConnection(state.linePaths[index], frame.points, connection, 1, index, 1);
      });
      highlightConstellationDots(frame.points, 1);
      drawConstellationTexts(frame.points, 0, 1, 1);
    }

    function drawConstellationTransition(current, next, progress) {
      const currentLines = current.connections.length;
      const nextLines = next.connections.length;
      drawConstellationBase(currentLines + nextLines, current.points.length + next.points.length, progress < 0.5 ? current.contourPath : next.contourPath);
      current.connections.forEach((connection, index) => {
        const local = constellationLineLocalProgress(progress, index, currentLines);
        drawConstellationConnection(state.linePaths[index], current.points, connection, 1 - local, index, (1 - local) * constellationFlicker(local, index));
      });
      next.connections.forEach((connection, index) => {
        const local = constellationLineLocalProgress(progress, index, nextLines);
        drawConstellationConnection(state.linePaths[currentLines + index], next.points, connection, local, index, local * constellationFlicker(local, index + currentLines));
      });
      highlightConstellationDots(current.points, 1 - progress);
      highlightConstellationDots(next.points, progress);
      drawConstellationTexts(current.points, 0, 1 - progress, 1 - progress);
      drawConstellationTexts(next.points, current.points.length, progress, progress);
    }

    function highlightConstellationDots(points, amount) {
      const radius = Math.max(0.34, config.lineCharSize * 0.105);
      points.forEach((point) => {
        const dot = state.constellationDots[point.baseIndex];
        if (!dot) return;
        dot.setAttribute("r", radius.toFixed(2));
        dot.setAttribute("opacity", String(Math.max(0, Math.min(0.42, config.lineCharOpacity * 0.24) * (1 - amount))));
        dot.style.filter = amount > 0.01 ? "" : constellationGlowFilter(0.42);
      });
    }

    function drawConstellationTexts(points, offset, opacity, scale) {
      points.forEach((point, index) => {
        const text = state.lineTexts[index + offset];
        if (!text) return;
        text.style.display = "";
        text.textContent = point.char;
        text.setAttribute("x", point.point.x.toFixed(2));
        text.setAttribute("y", point.point.y.toFixed(2));
        text.setAttribute("fill", config.lineCharColor);
        text.setAttribute("font-size", String(config.lineCharSize * (0.48 + 0.52 * scale)));
        text.setAttribute("opacity", (config.lineCharOpacity * opacity).toFixed(3));
        text.style.filter = constellationGlowFilter(1);
      });
    }

    function drawConstellationConnection(path, points, connection, fraction, index, opacityScale) {
      const a = points[connection.a];
      const b = points[connection.b];
      if (!path || !a || !b) {
        if (path) path.style.display = "none";
        return;
      }
      const d = connection.d || constellationConnectionPath(a, b, connection, points);
      if (!d) {
        path.style.display = "none";
        return;
      }
      path.style.display = "";
      path.dataset.connectionIndex = String(index);
      path.classList.toggle("is-selected", false);
      path.setAttribute("d", d);
      path.setAttribute("stroke", config.lineColor);
      path.setAttribute("stroke-width", String(Math.max(0.45, config.lineStrokeWidth)));
      path.setAttribute("opacity", String(Math.min(1, config.lineOpacity * (0.82 + config.constellationGlow * 0.55) * opacityScale)));
      path.style.filter = constellationGlowFilter(1);
      setPathDrawFraction(path, fraction);
    }

    function constellationGlowFilter(multiplier = 1) {
      const value = Math.max(0, Number(config.constellationGlow) || 0) * multiplier;
      if (value <= 0.01) return "";
      return `drop-shadow(0 0 ${(2 + value * 8).toFixed(1)}px ${config.lineColor})`;
    }

    function constellationLineLocalProgress(progress, index, total) {
      const count = Math.max(1, total);
      const delay = count <= 1 ? 0 : (index / (count - 1)) * 0.26;
      return clamp((progress - delay) / 0.74, 0, 1);
    }

    function constellationFlicker(progress, index = 0) {
      const t = clamp(progress, 0, 1);
      if (t <= 0 || t >= 1) return 1;
      const flashCount = index % 3 === 0 ? 1 : 2;
      const centers = flashCount === 1 ? [0.34] : [0.22, 0.52];
      let value = 1;
      centers.forEach((center, centerIndex) => {
        const shifted = center + ((index * 17 + centerIndex * 11) % 7 - 3) * 0.006;
        const pulse = Math.max(0, 1 - Math.abs(t - shifted) / 0.075);
        value *= 1 - pulse * 0.58;
      });
      return clamp(value, 0.34, 1);
    }

    function interpolateLineFrame(current, next, progress) {
      if (!current?.points?.length && !next?.points?.length) return [];
      current = current?.points?.length ? current : next;
      next = next?.points?.length ? next : current;
      if (progress <= 0) return current.points;
      if (progress >= 1) return next.points;
      const count = next.points.length;
      const points = [];
      for (let index = 0; index < count; index += 1) {
        const from = sampleLineFramePoint(current, index, count);
        const to = next.points[index];
        points.push({
          char: to.char,
          point: {
            x: from.point.x + (to.point.x - from.point.x) * progress,
            y: from.point.y + (to.point.y - from.point.y) * progress,
          },
          opacity: 1,
        });
      }
      return points;
    }

    function sampleLineFramePoint(frame, index, count) {
      const points = frame.points;
      if (points.length === 1) return points[0];
