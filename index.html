<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parametric Motion Design</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --panel: #0d0f12;
      --panel-2: #15171c;
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(255, 255, 255, 0.2);
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.62);
      --accent: #67d6c3;
      --accent-2: #f0c96a;
      --danger: #f07a7a;
      --range-track: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(380px, 440px) minmax(0, 1fr) minmax(330px, 460px);
      background: var(--bg);
    }

    .rail,
    .stage,
    .inspector {
      min-height: 0;
    }

    .rail {
      min-width: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      padding: 18px;
      border-right: 1px solid var(--line);
      background: rgba(5, 5, 7, 0.72);
      backdrop-filter: blur(20px);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      font-weight: 680;
      letter-spacing: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      font-size: 12px;
      white-space: nowrap;
    }

    .theme-toggle {
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(103, 214, 195, 0.7);
    }

    .dropzone {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 184px;
      margin: 2px 12px 14px;
      padding: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.015)),
        rgba(255, 255, 255, 0.025);
      overflow: hidden;
    }

    .dropzone.is-dragging {
      border-color: rgba(103, 214, 195, 0.9);
      background: rgba(103, 214, 195, 0.09);
    }

    .dropzone.is-hidden {
      display: none;
    }

    .drop-content {
      display: grid;
      justify-items: center;
      gap: 12px;
      text-align: center;
    }

    .upload-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent);
    }

    .upload-mark svg {
      width: 24px;
      height: 24px;
    }

    .drop-title {
      margin: 0;
      font-size: 14px;
      font-weight: 620;
    }

    .drop-subtitle {
      margin: -4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .primary-btn,
    .ghost-btn {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 8px;
      color: #09100f;
      background: var(--accent);
      font-size: 13px;
      font-weight: 650;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
    }

    .ghost-btn:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.075);
    }

    .file-input {
      display: none;
    }

    .control-stack {
      min-height: 0;
      min-width: 0;
      overflow-x: hidden;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 0;
      padding-right: 2px;
      scrollbar-width: none;
    }

    .control-stack::-webkit-scrollbar {
      display: none;
    }

    .control-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(13, 15, 18, 0.76);
    }

    .control-card.is-hidden {
      display: none;
    }

    #effect-card,
    #image-card,
    #motion-card {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    #effect-card,
    #image-card {
      border-bottom: 1px solid var(--line);
    }

    #effect-card .control-card-head {
      border-bottom: 0;
    }

    .control-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 6px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .control-card-head .segmented-control {
      width: auto;
      flex: 1;
      min-width: 0;
    }

    .control-card-title {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .mode-select {
      height: 26px;
      max-width: 132px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel-2);
      font-size: 12px;
    }

    .effect-select {
      flex: 1;
      max-width: none;
      min-width: 0;
    }

    .segmented-control {
      width: 100%;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(0, 1fr);
      gap: 3px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.035);
    }

    .segmented-control[hidden] {
      display: none;
    }

    .segment-btn {
      min-width: 0;
      min-height: 26px;
      border-radius: 5px;
      color: var(--muted);
      background: transparent;
      font-size: 12px;
      cursor: pointer;
    }

    .segment-btn.is-active {
      color: #ffffff;
      background: var(--accent);
    }

    .controls {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
      gap: 0;
      padding: 0 12px 10px;
    }

    .control {
      position: relative;
      z-index: 0;
      min-width: 0;
      display: grid;
      gap: 7px;
      padding: 14px 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }

    .control {
      grid-column: 1 / -1;
    }

    .controls > .control:last-child,
    .controls > .keyframe-editor:last-child {
      border-bottom: 0;
    }

    .controls > .keyframe-editor {
      grid-column: 1 / -1;
    }

    .cell-reference-editor.is-dragging {
      border-color: rgba(103, 214, 195, 0.72);
      background: rgba(103, 214, 195, 0.06);
    }

    .cell-reference-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, 48px);
      gap: 8px;
    }

    .cell-reference-tile {
      position: relative;
      width: 48px;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.045);
    }

    .cell-reference-tile img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .cell-reference-tile .icon-btn.cell-reference-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 16px;
      height: 16px;
      min-height: 16px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(18, 25, 38, 0.14);
      color: rgba(17, 24, 39, 0.72);
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      font-size: 10px;
      line-height: 1;
      opacity: 0;
      transform: scale(0.86);
      transition: opacity 120ms ease, transform 120ms ease, color 120ms ease, background 120ms ease;
    }

    .cell-reference-tile:hover .icon-btn.cell-reference-delete,
    .cell-reference-tile:focus-within .icon-btn.cell-reference-delete {
      opacity: 1;
      transform: scale(1);
    }

    .cell-reference-tile .icon-btn.cell-reference-delete:hover {
      color: rgba(17, 24, 39, 0.92);
      border-color: rgba(18, 25, 38, 0.22);
      background: #ffffff;
    }

    .cell-reference-add {
      width: 48px;
      height: 48px;
      min-height: 48px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line-strong);
      border-radius: 7px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      font-size: 24px;
      line-height: 1;
    }

    .cell-reference-add:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.07);
    }

    .control::after {
      content: attr(data-tip);
      position: absolute;
      left: 10px;
      right: 10px;
      top: calc(100% + 6px);
      z-index: 10;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(8, 9, 12, 0.96);
      color: rgba(245, 247, 251, 0.88);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.38);
      font-size: 12px;
      line-height: 1.45;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .control:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .control:hover {
      z-index: 20;
    }

    .control-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .control--toggle .control-head {
      justify-content: flex-start;
      gap: 8px;
    }

    .control--toggle .control-input-row {
      display: none;
    }

    .control-checkbox {
      width: 14px;
      height: 14px;
      margin: 0;
      flex: 0 0 auto;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .control-label {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control-value {
      color: var(--text);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
    }

    .control--color .control-value,
    .control--color-alpha .control-value,
    .control--choice .control-value,
    .control--button .control-value {
      display: none;
    }

    .control--choice {
      grid-column: 1 / -1;
    }

    .control--choice .control-input-row {
      width: 100%;
    }

    input[type="range"]:not(.rgba-opacity-slider) {
      width: 100%;
      height: 14px;
      appearance: none;
      border: 0;
      border-radius: 999px;
      background:
        linear-gradient(90deg, var(--accent) var(--range-progress, 0%), var(--range-track) 0);
      cursor: pointer;
    }

    input[type="range"]:not(.rgba-opacity-slider)::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 999px;
      background: transparent;
    }

    input[type="range"]:not(.rgba-opacity-slider)::-webkit-slider-thumb {
      appearance: none;
      width: 12px;
      height: 12px;
      margin-top: -4px;
      border: 2px solid var(--panel);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.18);
    }

    input[type="range"]:not(.rgba-opacity-slider)::-moz-range-track {
      height: 4px;
      border-radius: 999px;
      background: transparent;
    }

    input[type="range"]:not(.rgba-opacity-slider)::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border: 2px solid var(--panel);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.18);
    }

    .keyframe-editor {
      min-width: 0;
      grid-column: 1 / -1;
      display: grid;
      gap: 9px;
      padding: 14px 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }

    .keyframe-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .keyframe-head--actions-only {
      justify-content: flex-end;
    }

    .keyframe-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .keyframe-list {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .keyframe-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
    }

    .oscilloscope-row {
      display: grid;
      grid-template-columns: 18px repeat(4, minmax(46px, 1fr)) 42px 30px;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .oscilloscope-row-head {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      text-transform: uppercase;
    }

    .oscilloscope-note {
      margin: -2px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .particle-row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .particle-row--morph {
      grid-template-columns: 34px minmax(0, 1fr) auto auto auto;
    }

    .particle-thumb {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      object-fit: cover;
      background: #050507;
    }

    .particle-name {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-size: 12px;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .particle-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font: 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .particle-color-row {
      display: grid;
      grid-template-columns: minmax(126px, 1fr) 72px 56px 30px;
      align-items: center;
      gap: 8px;
    }

    .keyframe-index {
      width: 18px;
      color: var(--muted);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      text-align: right;
    }

    .keyframe-input {
      min-width: 0;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 7px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font-size: 13px;
    }

    .svg-fidelity-note {
      grid-column: 1 / -1;
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      font-size: 12px;
      line-height: 1.55;
    }

    .flow-gradient-editor {
      min-width: 0;
      grid-column: 1 / -1;
      display: grid;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .flow-gradient-preview-shell {
      position: relative;
      min-width: 0;
      padding-top: 28px;
    }

    .flow-gradient-preview {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .flow-gradient-marker {
      position: absolute;
      top: 0;
      left: var(--stop-position, 0%);
      z-index: 1;
      width: 24px;
      height: 24px;
      border: 3px solid var(--panel);
      border-radius: 6px;
      background: var(--stop-color, #ffffff);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      transform: translateX(-50%);
      cursor: ew-resize;
      touch-action: none;
    }

    .flow-gradient-marker::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 8px;
      height: 8px;
      border-right: 3px solid var(--panel);
      border-bottom: 3px solid var(--panel);
      background: var(--stop-color, #ffffff);
      transform: translateX(-50%) rotate(45deg);
    }

    .flow-gradient-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .flow-gradient-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .flow-gradient-list {
      display: grid;
      gap: 8px;
    }

    .flow-gradient-row {
      min-width: 0;
      display: grid;
      grid-template-columns: 60px minmax(112px, 1fr) 60px 30px;
      align-items: center;
      gap: 8px;
    }

    .flow-gradient-number-wrap {
      position: relative;
      min-width: 0;
    }

    .flow-gradient-number {
      width: 100%;
      height: 30px;
      appearance: textfield;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 20px 0 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .flow-gradient-number::-webkit-inner-spin-button,
    .flow-gradient-number::-webkit-outer-spin-button {
      margin: 0;
      appearance: none;
    }

    .flow-gradient-number-wrap::after {
      content: "%";
      position: absolute;
      right: 7px;
      top: 50%;
      color: var(--muted);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .flow-gradient-color-field {
      min-width: 0;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      gap: 0;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.045);
      overflow: hidden;
    }

    .flow-gradient-color-field .flow-gradient-color-picker {
      width: 30px;
      height: 30px;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
    }

    .flow-gradient-hex {
      min-width: 0;
      width: 100%;
      height: 28px;
      border: 0;
      padding: 0 8px;
      color: var(--text);
      background: transparent;
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      text-transform: uppercase;
    }

    .flow-gradient-hex.is-invalid {
      color: #d14642;
      background: rgba(209, 70, 66, 0.08);
    }

    .flow-gradient-action {
      position: relative;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
    }

    .flow-gradient-action:hover {
      color: var(--text);
      background: var(--line);
    }

    .flow-gradient-action:disabled {
      opacity: 0.32;
      cursor: not-allowed;
    }

    .flow-gradient-action::before,
    .flow-gradient-action--add::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 14px;
      height: 1.5px;
      border-radius: 999px;
      background: currentColor;
    }

    .flow-gradient-action--add::after {
      left: 14px;
      right: auto;
      top: 8px;
      width: 1.5px;
      height: 14px;
    }

    .icon-btn {
      width: 30px;
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 16px;
      line-height: 1;
    }

    .icon-btn:hover {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.07);
    }

    .icon-btn.is-active {
      color: #0b1412;
      border-color: rgba(126, 225, 207, 0.75);
      background: var(--accent);
    }

    body[data-theme="light"] .icon-btn.is-active {
      color: #ffffff;
      border-color: rgba(17, 24, 39, 0.82);
      background: #111827;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--accent);
      background: transparent;
    }

    .control-input-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    input[type="color"] {
      width: 44px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
    }

    .rgba-control {
      position: relative;
      min-width: 0;

    function parseColorValue(value) {
      const text = String(value || "").trim();
      const hex = text.match(/^#?([0-9a-f]{3,4}|[0-9a-f]{6}|[0-9a-f]{8})$/i);
      if (hex) {
        let raw = hex[1];
        if (raw.length === 3 || raw.length === 4) raw = raw.split("").map((char) => char + char).join("");
        const hasAlpha = raw.length === 8;
        const r = parseInt(raw.slice(0, 2), 16);
        const g = parseInt(raw.slice(2, 4), 16);
        const b = parseInt(raw.slice(4, 6), 16);
        const a = hasAlpha ? parseInt(raw.slice(6, 8), 16) / 255 : 1;
        return { r, g, b, a };
      }
      const rgba = text.match(/^rgba?\(\s*([+-]?\d*\.?\d+)\s*,\s*([+-]?\d*\.?\d+)\s*,\s*([+-]?\d*\.?\d+)(?:\s*,\s*([+-]?\d*\.?\d+%?))?\s*\)$/i);
      if (!rgba) return null;
      const alphaRaw = rgba[4] ?? "1";
      const alpha = alphaRaw.endsWith("%") ? Number(alphaRaw.slice(0, -1)) / 100 : Number(alphaRaw);
      return {
        r: clamp(Math.round(Number(rgba[1])), 0, 255),
        g: clamp(Math.round(Number(rgba[2])), 0, 255),
        b: clamp(Math.round(Number(rgba[3])), 0, 255),
        a: clamp(Number.isFinite(alpha) ? alpha : 1, 0, 1),
      };
    }

    function colorPartsToHex({ r, g, b }) {
      return `#${[r, g, b].map((part) => clamp(Math.round(part), 0, 255).toString(16).padStart(2, "0")).join("")}`;
    }

    function colorPartsToCss(parts) {
      const alpha = clamp(Number(parts.a ?? 1), 0, 1);
      if (alpha >= 1) return colorPartsToHex(parts);
      return `rgba(${parts.r}, ${parts.g}, ${parts.b}, ${Number(alpha.toFixed(3))})`;
    }

    function isValidColorString(value) {
      return Boolean(parseColorValue(value));
    }

    function colorToRgbaText(color, opacity) {
      const parts = parseColorValue(color) ?? { r: 255, g: 255, b: 255, a: 1 };
      const alpha = clamp(Number(opacity == null ? (parts.a ?? 1) : opacity), 0, 1);
      return `rgba(${parts.r}, ${parts.g}, ${parts.b}, ${Number(alpha.toFixed(3))})`;
    }

    function applyColorValue(colorKey, text, alphaKey = "") {
      const parts = parseColorValue(text);
      if (!parts) return false;
      if (alphaKey) {
        config[colorKey] = colorPartsToHex(parts);
        config[alphaKey] = parts.a;
      } else {
        config[colorKey] = colorPartsToCss(parts);
      }
      return true;
    }

    function currentColorPartsForControl(control) {
      const colorKey = control.dataset.colorKey;
      const alphaKey = control.dataset.alphaKey;
      const color = config[colorKey] ?? control.dataset.colorValue ?? "#ffffff";
      const parts = parseColorValue(color) ?? { r: 255, g: 255, b: 255, a: 1 };
      const alpha = alphaKey ? (config[alphaKey] ?? parts.a ?? 1) : (parts.a ?? Number(control.dataset.opacityValue ?? 1));
      return { ...parts, a: clamp(Number(alpha), 0, 1) };
    }

    let rgbaControlCounter = 0;

    function ensureRgbaControlId(control) {
      if (!control.dataset.rgbaControlId) control.dataset.rgbaControlId = `rgba-control-${++rgbaControlCounter}`;
      const popover = control.querySelector(".rgba-popover") || document.querySelector(`.rgba-popover[data-rgba-owner="${control.dataset.rgbaControlId}"]`);
      if (popover) popover.dataset.rgbaOwner = control.dataset.rgbaControlId;
      return control.dataset.rgbaControlId;
    }

    function rgbaPopoverForControl(control) {
      const id = ensureRgbaControlId(control);
      return document.querySelector(`.rgba-popover[data-rgba-owner="${id}"]`) || control.querySelector(".rgba-popover");
    }

    function rgbaControlForTarget(target) {
      const control = target.closest?.(".rgba-control");
      if (control) return control;
      const popover = target.closest?.(".rgba-popover[data-rgba-owner]");
      if (!popover) return null;
      return document.querySelector(`.rgba-control[data-rgba-control-id="${popover.dataset.rgbaOwner}"]`);
    }

    function updateRgbaControl(control) {
      const colorKey = control.dataset.colorKey;
      if (!colorKey) return;
      const parts = currentColorPartsForControl(control);
      const text = colorToRgbaText(colorPartsToCss(parts));
      control.style.setProperty("--rgba-preview", text);
      const popover = rgbaPopoverForControl(control);
      const hexInput = control.querySelector(".rgba-hex");
      const opacityInput = control.querySelector(".rgba-opacity");
      const picker = popover?.querySelector(".rgba-picker");
      const freeInput = popover?.querySelector(".rgba-input");
      const popupOpacity = popover?.querySelector(".rgba-opacity-popup");
      const slider = popover?.querySelector(".rgba-opacity-slider");
      const hex = colorPartsToHex(parts).slice(1).toUpperCase();
      const opacity = String(Math.round(parts.a * 100));
      if (hexInput && document.activeElement !== hexInput) hexInput.value = hex;
      if (opacityInput && document.activeElement !== opacityInput) opacityInput.value = opacity;
      if (picker) picker.value = `#${hex}`;
      if (freeInput && document.activeElement !== freeInput) freeInput.value = text;
      if (popupOpacity && document.activeElement !== popupOpacity) popupOpacity.value = opacity;
      if (slider) slider.value = opacity;
    }

    function syncRgbaControls(colorKey) {
      document.querySelectorAll(`.rgba-control[data-color-key="${colorKey}"]`).forEach(updateRgbaControl);
    }

    function positionRgbaPopover(control) {
      const swatch = control.querySelector(".rgba-swatch");
      const popover = rgbaPopoverForControl(control);
      if (!swatch || !popover) return;
      const rect = swatch.getBoundingClientRect();
      const width = Math.min(320, Math.max(180, window.innerWidth - 36));
      const left = clamp(rect.left, 18, Math.max(18, window.innerWidth - width - 18));
      const preferredTop = rect.bottom + 8;
      const top = preferredTop + 132 > window.innerHeight ? Math.max(18, rect.top - 140) : preferredTop;
      popover.style.setProperty("--rgba-popover-left", `${left}px`);
      popover.style.setProperty("--rgba-popover-top", `${top}px`);
    }

    function closeRgbaControl(control) {
      const popover = rgbaPopoverForControl(control);
      control.classList.remove("is-open");
      popover?.classList.remove("is-open");
      if (popover && popover.parentElement === document.body) control.appendChild(popover);
    }

    function openRgbaControl(control) {
      document.querySelectorAll(".rgba-control.is-open").forEach((item) => {
        if (item !== control) closeRgbaControl(item);

      const popover = rgbaPopoverForControl(control);
      if (popover && popover.parentElement !== document.body) document.body.appendChild(popover);
      positionRgbaPopover(control);
      control.classList.add("is-open");
      popover?.classList.add("is-open");

    function renderRgbaControl({ colorKey, alphaKey = "", label, tip, value, opacity = 1, onInput, extraDataset = {}, compact = false }) {
      const control = document.createElement("div");
      control.className = `rgba-control${compact ? " rgba-control--swatch-only" : ""}`;
      control.dataset.colorKey = colorKey;
      control.dataset.colorValue = value;
      if (opacity != null) control.dataset.opacityValue = opacity;
      if (alphaKey) control.dataset.alphaKey = alphaKey;
      Object.entries(extraDataset).forEach(([key, entryValue]) => {
        control.dataset[key] = entryValue;
      });
      control.innerHTML = `
        <button class="rgba-swatch" type="button" data-rgba-open="1" aria-label="打开 ${label} 颜色设置"></button>
        <input class="rgba-field rgba-hex" data-rgba-hex="1" aria-label="${label} HEX" title="${tip}">
        <span class="rgba-opacity-wrap">
          <input class="rgba-field rgba-opacity" data-rgba-opacity="1" inputmode="numeric" aria-label="${label} 透明度百分比">
          <span class="rgba-percent">%</span>
        </span>
        <div class="rgba-popover">
          <div class="rgba-popover-row">
            <input class="rgba-picker" type="color" data-rgba-picker="1" aria-label="${label} 色相">
            <input class="rgba-field rgba-input" data-rgba-input="1" aria-label="${label} RGBA 或 HEX" title="支持 HEX、HEXA、RGB 和 RGBA">
          </div>
          <div class="rgba-opacity-row">
            <input class="rgba-opacity-slider" type="range" min="0" max="100" step="1" data-rgba-opacity-slider="1" aria-label="${label} 透明度滑杆">
            <span class="rgba-opacity-wrap">
              <input class="rgba-field rgba-opacity-popup" data-rgba-opacity-popup="1" inputmode="numeric" aria-label="${label} 透明度百分比">
              <span class="rgba-percent">%</span>
            </span>
          </div>
        </div>
      `;
      ensureRgbaControlId(control);
      control.querySelectorAll("input").forEach((input) => {
        input.addEventListener("input", onInput);
        input.addEventListener("change", onInput);
      });
      control.addEventListener("click", (event) => {
        if (event.target.closest("[data-rgba-open], .rgba-hex, .rgba-opacity")) {
          openRgbaControl(control);
        }
      });
      control.addEventListener("focusin", () => openRgbaControl(control));
      updateRgbaControl(control);
      return control;
    }

    window.addEventListener("resize", () => {
      document.querySelectorAll(".rgba-control.is-open").forEach(positionRgbaPopover);
    });
    document.addEventListener("scroll", () => {
      document.querySelectorAll(".rgba-control.is-open").forEach(positionRgbaPopover);
    }, true);

    document.addEventListener("pointerdown", (event) => {
      if (event.target.closest(".rgba-control, .rgba-popover")) return;
      document.querySelectorAll(".rgba-control.is-open").forEach(closeRgbaControl);
    });

    function colorPartsFromRgbaControlTarget(target, control) {
      const current = currentColorPartsForControl(control);
      if (target.dataset.rgbaPicker) return parseColorValue(colorToRgbaText(target.value, current.a));
      if (target.dataset.rgbaHex) return parseColorValue(colorToRgbaText(target.value, current.a));
      if (target.dataset.rgbaInput) return parseColorValue(target.value);
      if (target.dataset.rgbaOpacity || target.dataset.rgbaOpacityPopup || target.dataset.rgbaOpacitySlider) {
        const alpha = clamp(Number(target.value) / 100, 0, 1);
        return parseColorValue(colorToRgbaText(colorPartsToHex(current), alpha));
      }
      return null;
    }

    function markRgbaControlValidity(control, valid) {
      control.querySelectorAll(".rgba-field").forEach((field) => field.classList.toggle("is-invalid", !valid));
      rgbaPopoverForControl(control)?.querySelectorAll(".rgba-field").forEach((field) => field.classList.toggle("is-invalid", !valid));
    }

    function handleRgbaInput(target, onApply) {
      const control = rgbaControlForTarget(target);
      if (!control) return false;
      const colorKey = control.dataset.colorKey;
      const alphaKey = control.dataset.alphaKey || "";
      const parts = colorPartsFromRgbaControlTarget(target, control);
      const valid = Boolean(parts);
      markRgbaControlValidity(control, valid);
      if (!valid) return true;
      applyColorValue(colorKey, colorToRgbaText(colorPartsToHex(parts), parts.a), alphaKey);
      updateRgbaControl(control);
      onApply?.(colorKey, alphaKey, control);
      return true;
    }

    function renderOptionTabs(control, onInput) {
      const segmented = document.createElement("div");
      segmented.className = "segmented-control";
      segmented.setAttribute("role", "tablist");
      segmented.setAttribute("aria-label", control.label);
      control.options.forEach((option) => {
        const button = document.createElement("button");
        button.className = `segment-btn${config[control.key] === option.value ? " is-active" : ""}`;
        button.type = "button";
        button.textContent = option.label;
        button.dataset.key = control.key;
        button.dataset.optionValue = option.value;
        button.title = control.tip;
        button.addEventListener("click", (event) => {
          event.preventDefault();
          onInput(event);
        });
        segmented.appendChild(button);
      });
      return segmented;
    }

    let flowGradientStopCounter = 0;

    function nextFlowGradientStopId() {
      flowGradientStopCounter += 1;
      return `brush-stop-custom-${Date.now()}-${flowGradientStopCounter}`;
    }

    function flowGradientCss(stops) {
      return `linear-gradient(90deg, ${stops
        .slice()
        .sort((a, b) => a.position - b.position)
        .map((stop) => `${colorToRgbaText(stop.color, stop.opacity)} ${Number((stop.position * 100).toFixed(2))}%`)
        .join(", ")})`;
    }

    function refreshFlowGradientConfig({ rerender = false } = {}) {
      refreshFlowBrushGradient();
      updateMeta();
      updateFormulaAndCode();
      refreshPreviewNow();
      if (rerender) renderMotionControls();
    }

    function renderFlowGradientEditor(control) {
      config.brushGradientStops = normalizedFlowBrushStops();
      const stops = config.brushGradientStops;
      const editor = document.createElement("section");
      editor.className = "flow-gradient-editor";
      editor.title = control.tip;

      const previewShell = document.createElement("div");
      previewShell.className = "flow-gradient-preview-shell";
      const preview = document.createElement("div");
      preview.className = "flow-gradient-preview";
      preview.setAttribute("aria-label", "渐变颜色预览");
      previewShell.appendChild(preview);

      const head = document.createElement("div");
      head.className = "flow-gradient-head";
      head.innerHTML = `<p class="flow-gradient-title">渐变颜色 Stops</p>`;
      const addButton = document.createElement("button");
      addButton.className = "flow-gradient-action flow-gradient-action--add";
      addButton.type = "button";
      addButton.setAttribute("aria-label", "添加渐变颜色 Stop");
      addButton.title = "在当前最大间隔中添加一个颜色 Stop";
      head.appendChild(addButton);

      const list = document.createElement("div");
      list.className = "flow-gradient-list";

      const syncPreview = () => {
        preview.style.background = flowGradientCss(stops);
        stops.forEach((stop) => {
          const marker = previewShell.querySelector(`[data-gradient-marker-id="${stop.id}"]`);
          if (marker) {
            marker.style.setProperty("--stop-position", `${stop.position * 100}%`);
            marker.style.setProperty("--stop-color", colorToRgbaText(stop.color, stop.opacity));
          }
        });
      };

      stops.forEach((stop, index) => {
        const marker = document.createElement("button");
        marker.className = "flow-gradient-marker";
        marker.type = "button";
        marker.dataset.gradientMarkerId = stop.id;
        marker.setAttribute("aria-label", `拖动渐变 Stop ${index + 1}`);
        marker.title = `${Math.round(stop.position * 100)}%`;
        let markerDragging = false;
        marker.addEventListener("pointerdown", (event) => {
          markerDragging = true;
          marker.setPointerCapture?.(event.pointerId);
          event.preventDefault();
        });
        marker.addEventListener("pointermove", (event) => {
          if (!markerDragging) return;
          const rect = preview.getBoundingClientRect();
          if (!rect.width) return;
          stop.position = clamp((event.clientX - rect.left) / rect.width, 0, 1);
          const positionInput = list.querySelector(`[data-gradient-position-id="${stop.id}"]`);
          if (positionInput) positionInput.value = String(Math.round(stop.position * 100));
          marker.title = `${Math.round(stop.position * 100)}%`;
          syncPreview();
          refreshFlowGradientConfig();
        });
        const finishMarkerDrag = (event) => {
          if (!markerDragging) return;
          markerDragging = false;
          if (marker.hasPointerCapture?.(event.pointerId)) marker.releasePointerCapture?.(event.pointerId);
          config.brushGradientStops = normalizedFlowBrushStops();
          renderMotionControls();
        };
        marker.addEventListener("pointerup", finishMarkerDrag);
        marker.addEventListener("pointercancel", finishMarkerDrag);
        previewShell.appendChild(marker);

        const row = document.createElement("div");
        row.className = "flow-gradient-row";
        row.dataset.gradientStopId = stop.id;

        const positionWrap = document.createElement("label");
        positionWrap.className = "flow-gradient-number-wrap";
        const positionInput = document.createElement("input");
        positionInput.className = "flow-gradient-number";
        positionInput.type = "number";
        positionInput.min = "0";
        positionInput.max = "100";
        positionInput.step = "1";
        positionInput.value = String(Math.round(stop.position * 100));
        positionInput.dataset.gradientPositionId = stop.id;
        positionInput.setAttribute("aria-label", `渐变 Stop ${index + 1} 位置百分比`);
        positionWrap.appendChild(positionInput);

        const colorField = document.createElement("label");
        colorField.className = "flow-gradient-color-field";
        const colorPicker = document.createElement("input");
        colorPicker.className = "flow-gradient-color-picker";
        colorPicker.type = "color";
        colorPicker.value = stop.color;
        colorPicker.setAttribute("aria-label", `渐变 Stop ${index + 1} 颜色`);
        const hexInput = document.createElement("input");
        hexInput.className = "flow-gradient-hex";
        hexInput.value = stop.color.slice(1).toUpperCase();
        hexInput.setAttribute("aria-label", `渐变 Stop ${index + 1} HEX`);
        colorField.append(colorPicker, hexInput);

        const opacityWrap = document.createElement("label");
        opacityWrap.className = "flow-gradient-number-wrap";
        const opacityInput = document.createElement("input");
        opacityInput.className = "flow-gradient-number";
        opacityInput.type = "number";
        opacityInput.min = "0";
        opacityInput.max = "100";
        opacityInput.step = "1";
        opacityInput.value = String(Math.round(stop.opacity * 100));
        opacityInput.setAttribute("aria-label", `渐变 Stop ${index + 1} 透明度百分比`);
        opacityWrap.appendChild(opacityInput);

        const removeButton = document.createElement("button");
        removeButton.className = "flow-gradient-action flow-gradient-action--remove";
        removeButton.type = "button";
        removeButton.disabled = stops.length <= 2;
        removeButton.setAttribute("aria-label", `删除渐变 Stop ${index + 1}`);

        positionInput.addEventListener("input", () => {
          stop.position = clamp(Number(positionInput.value) / 100, 0, 1);
          syncPreview();
          refreshFlowGradientConfig();
        });
        positionInput.addEventListener("change", () => {
          config.brushGradientStops = normalizedFlowBrushStops();
          renderMotionControls();
        });
        colorPicker.addEventListener("input", () => {
          stop.color = colorPicker.value;
          hexInput.value = stop.color.slice(1).toUpperCase();
          hexInput.classList.remove("is-invalid");
          syncPreview();
          refreshFlowGradientConfig();
        });
        hexInput.addEventListener("input", () => {
          const parts = parseColorValue(hexInput.value);
          const valid = Boolean(parts);
          hexInput.classList.toggle("is-invalid", !valid);
          if (!valid) return;
          stop.color = colorPartsToHex(parts);
          colorPicker.value = stop.color;
          syncPreview();
          refreshFlowGradientConfig();
        });
        opacityInput.addEventListener("input", () => {
          stop.opacity = clamp(Number(opacityInput.value) / 100, 0, 1);
          syncPreview();
          refreshFlowGradientConfig();
        });
        removeButton.addEventListener("click", () => {
          if (stops.length <= 2) return;
          config.brushGradientStops = stops.filter((item) => item.id !== stop.id);
          refreshFlowBrushGradient();
          renderMotionControls();
          updateMeta();
          updateFormulaAndCode();
          refreshPreviewNow();
        });

        row.append(positionWrap, colorField, opacityWrap, removeButton);
        list.appendChild(row);
      });

      addButton.addEventListener("click", () => {
        const ordered = stops.slice().sort((a, b) => a.position - b.position);
        let largest = { start: ordered[0], end: ordered[ordered.length - 1], gap: -1 };
        for (let index = 0; index < ordered.length - 1; index += 1) {
          const gap = ordered[index + 1].position - ordered[index].position;
          if (gap > largest.gap) largest = { start: ordered[index], end: ordered[index + 1], gap };
        }
        const position = (largest.start.position + largest.end.position) / 2;
        const color = parseColorValue(flowBrushColor(position)) || { r: 143, g: 149, b: 158, a: 1 };
        config.brushGradientStops = [
          ...stops,
          {
            id: nextFlowGradientStopId(),
            position,
            color: colorPartsToHex(color),
            opacity: color.a ?? 1,
          },
        ].sort((a, b) => a.position - b.position);
        refreshFlowBrushGradient();
        renderMotionControls();
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
      });

      syncPreview();
      editor.append(previewShell, head, list);
      return editor;
    }

    function updateRangeProgress(input) {
      if (!input || input.type !== "range") return;
      const min = Number(input.min || 0);
      const max = Number(input.max || 100);
      const value = Number(input.value || 0);
      const progress = max === min ? 0 : ((value - min) / (max - min)) * 100;
      input.style.setProperty("--range-progress", `${clamp(progress, 0, 100)}%`);
    }

    function controlLabel(control) {
      return typeof control.label === "function" ? control.label() : control.label;
    }

    function renderControls(container, defs, onInput, clear = true) {
      if (clear) container.innerHTML = "";
      defs.forEach((control) => {
        if (control.showWhen && !control.showWhen()) return;
        const label = document.createElement("label");
        label.className = "control";
        label.title = control.tip;
        label.dataset.tip = control.tip;
        const labelText = controlLabel(control);
        label.innerHTML = `
          <div class="control-head">
            <span class="control-label" title="${control.tip}">${labelText}</span>
            <span class="control-value" data-value-key="${control.key}">${formatControlValue(control.key, config[control.key])}</span>
          </div>
          <div class="control-input-row"></div>
        `;
        const row = label.querySelector(".control-input-row");
        const input = document.createElement("input");
        input.dataset.key = control.key;
        input.title = control.tip;
        if (control.type === "gradientStops") {
          container.appendChild(renderFlowGradientEditor(control));
          return;
        } else if (control.type === "button") {
          label.classList.add("control--button");
          const button = document.createElement("button");
          button.className = "small-btn";
          button.type = "button";
          button.textContent = control.buttonLabel ?? control.label;
          button.dataset.key = control.key;
          button.title = control.tip;
          button.addEventListener("click", onInput);
          const value = label.querySelector(".control-value");
          if (value) value.textContent = "";
          row.appendChild(button);
          container.appendChild(label);
          return;
        } else if (control.type === "colorAlpha") {
          label.classList.add("control--color-alpha");
          row.appendChild(renderRgbaControl({
            colorKey: control.key,
            alphaKey: control.alphaKey,
            label: control.label,
            tip: control.tip,
            value: config[control.key],
            opacity: config[control.alphaKey],
            onInput,
          }));
          container.appendChild(label);
          return;
        } else if (control.type === "color") {
          label.classList.add("control--color");
          row.appendChild(renderRgbaControl({
            colorKey: control.key,
            label: control.label,
            tip: control.tip,
            value: config[control.key],
            onInput,
          }));
          container.appendChild(label);
          return;
        } else if (control.type === "select") {
          label.classList.add("control--choice");
          if (control.key === "cellMotionType") {
            const select = document.createElement("select");
            select.className = "mode-select effect-select";
            select.dataset.key = control.key;
            select.title = control.tip;
            control.options.forEach((option) => {
              const item = document.createElement("option");
              item.value = option.value;
              item.textContent = option.label;
              select.appendChild(item);
            });
            select.value = config[control.key];
            select.addEventListener("input", onInput);
            row.appendChild(select);
          } else {
            row.appendChild(renderOptionTabs(control, onInput));
          }
          container.appendChild(label);
          return;
        } else if (control.type === "segmented") {
          label.classList.add("control--choice");
          row.appendChild(renderOptionTabs(control, onInput));
          container.appendChild(label);
          return;
        } else if (control.type === "toggle") {
          label.classList.add("control--toggle");
          input.type = "checkbox";
          input.className = "control-checkbox";
          input.checked = Boolean(config[control.key]);
          label.querySelector(".control-value")?.remove();
        } else {
          input.type = "range";
          input.min = typeof control.min === "function" ? control.min() : control.min;
          input.max = typeof control.max === "function" ? control.max() : control.max;
          input.step = typeof control.step === "function" ? control.step() : control.step;
          input.value = config[control.key];
          updateRangeProgress(input);
        }
        let lastHandledValue = String(input.value);
        let rangeTrackingFrame = 0;
        let rangePointerActive = false;
        const quantizeRangeValue = (value) => {
          const min = Number(input.min || 0);
          const max = Number(input.max || 100);
          const step = Number(input.step || 1);
          const clamped = clamp(value, min, max);
          if (!Number.isFinite(step) || step <= 0) return clamped;
          const steps = Math.round((clamped - min) / step);
          const precision = Math.max(0, (String(input.step).split(".")[1] || "").length);
          return Number((min + steps * step).toFixed(precision));
        };
        const setRangeValueFromPointer = (event) => {
          if (input.type !== "range" || !Number.isFinite(event.clientX)) return false;
          const rect = input.getBoundingClientRect();
          if (!rect.width) return false;
          const min = Number(input.min || 0);
          const max = Number(input.max || 100);
          const ratio = clamp((event.clientX - rect.left) / rect.width, 0, 1);
          input.value = String(quantizeRangeValue(min + ratio * (max - min)));
          return true;
        };
        const handleControlEvent = (event, force = false) => {
          updateRangeProgress(input);
          const nextValue = String(input.value);
          if (!force && nextValue === lastHandledValue) return;
          lastHandledValue = nextValue;
          onInput(event);
        };
        const stopRangeTracking = () => {
          rangePointerActive = false;
          if (rangeTrackingFrame) cancelAnimationFrame(rangeTrackingFrame);
          rangeTrackingFrame = 0;
          handleControlEvent({ target: input, currentTarget: input }, false);
        };
        const startRangeTracking = () => {
          if (rangeTrackingFrame) return;
          const tick = () => {
            if (!input.isConnected) {
              rangeTrackingFrame = 0;
              return;
            }
            handleControlEvent({ target: input, currentTarget: input }, false);
            rangeTrackingFrame = requestAnimationFrame(tick);
          };
          rangeTrackingFrame = requestAnimationFrame(tick);
        };
        input.addEventListener("input", (event) => handleControlEvent(event, true));
        input.addEventListener("change", handleControlEvent);
        if (input.type === "range") {
          input.addEventListener("pointerdown", (event) => {
            rangePointerActive = true;
            input.setPointerCapture?.(event.pointerId);
            if (setRangeValueFromPointer(event)) handleControlEvent(event, true);
            startRangeTracking();
          });
          input.addEventListener("pointermove", (event) => {
            if (!rangePointerActive) return;
            if (setRangeValueFromPointer(event)) handleControlEvent(event, true);
          });
          input.addEventListener("click", (event) => {
            if (setRangeValueFromPointer(event)) handleControlEvent(event, true);
          });
          ["mousemove", "pointerup", "mouseup", "touchmove", "touchend", "keyup"].forEach((eventName) => {
            input.addEventListener(eventName, (event) => handleControlEvent(event));
          });
          ["pointerup", "pointercancel", "lostpointercapture", "mouseup", "touchend", "blur"].forEach((eventName) => {
            input.addEventListener(eventName, stopRangeTracking);
          });
        }
        if (input.type === "checkbox") {
          label.querySelector(".control-label")?.before(input);
        } else {
          row.appendChild(input);
        }
        container.appendChild(label);
      });
    }

    function renderOscilloscopeFigureEditor(container) {
      const editor = document.createElement("div");
      editor.className = "keyframe-editor";
      editor.innerHTML = `
        <div class="keyframe-head">
          <p class="keyframe-title">李萨如图形</p>

            <button class="small-btn" type="button" data-osc-action="add">添加</button>
          </div>

        </div>

      `;
      const list = editor.querySelector(".keyframe-list");
      config.oscFigures.forEach((figure, index) => {
        const row = document.createElement("div");
        row.className = "oscilloscope-row";
        row.innerHTML = `
          <span class="keyframe-index">${index + 1}</span>
          <input class="keyframe-input" type="number" min="1" max="12" step="1" value="${figure.xFreq}" data-osc-id="${figure.id}" data-osc-field="xFreq" aria-label="图形 ${index + 1} X 频率">
          <input class="keyframe-input" type="number" min="1" max="12" step="1" value="${figure.yFreq}" data-osc-id="${figure.id}" data-osc-field="yFreq" aria-label="图形 ${index + 1} Y 频率">
          <input class="keyframe-input" type="number" min="0" max="360" step="1" value="${figure.phaseDeg}" data-osc-id="${figure.id}" data-osc-field="phaseDeg" aria-label="图形 ${index + 1} 相位">
          <input class="keyframe-input" type="number" min="-180" max="180" step="1" value="${figure.rotationDeg}" data-osc-id="${figure.id}" data-osc-field="rotationDeg" aria-label="图形 ${index + 1} 旋转">
          <button class="icon-btn" type="button" data-osc-action="delete" data-osc-id="${figure.id}" aria-label="删除图形 ${index + 1}">×</button>
        `;
        row.insertBefore(renderRgbaControl({
          colorKey: `osc-${figure.id}`,
          label: `图形 ${index + 1} 颜色`,
          tip: "支持 rgba(r, g, b, a) 与 HEX 输入。",
          value: figure.color,
          compact: true,
          onInput: (event) => {
            const control = rgbaControlForTarget(event.target);
            if (!control) return;
            const parts = colorPartsFromRgbaControlTarget(event.target, control);
            markRgbaControlValidity(control, Boolean(parts));
            if (!parts) return;
            const currentFigure = config.oscFigures.find((item) => String(item.id) === String(figure.id)) || figure;
            currentFigure.color = colorPartsToCss(parts);
            control.dataset.colorValue = currentFigure.color;
            control.dataset.opacityValue = parts.a;
            updateRgbaControl(control);
            activeEffect().prepare();
            updateMeta();
            updateFormulaAndCode();
            refreshPreviewNow();
          },
        }), row.lastElementChild);
        list.appendChild(row);
      });
      editor.addEventListener("input", (event) => {
        const input = event.target.closest("[data-osc-field]");
        if (!input) return;
        const figure = config.oscFigures.find((item) => String(item.id) === String(input.dataset.oscId));
        if (!figure) return;
        const field = input.dataset.oscField;
        if (field === "xFreq" || field === "yFreq") figure[field] = clamp(Math.round(Number(input.value)), 1, 12);
        else if (field === "phaseDeg") figure[field] = ((Number(input.value) % 360) + 360) % 360;
        else figure[field] = clamp(Number(input.value), -180, 180);
        activeEffect().prepare();
        state.startedAt = performance.now();
        updateMeta();
        updateFormulaAndCode();
        refreshPreviewNow();
      });
      editor.addEventListener("click", (event) => {
        const button = event.target.closest("[data-osc-action]");
        if (!button) return;

    function distance(a, b) {

    function triangleArea(a, b, c) {

    function simplifyToPointCount(points, pointCount, closed = true) {
      const target = Math.max(8, Math.round(pointCount));
      const maxInput = Math.max(target * 24, 256);
      const source = points.length > maxInput ? (closed ? resampleClosed(points, maxInput) : resampleOpen(points, maxInput)) : points;
      let simplified = source.filter((point, index) => index === 0 || distance(point, source[index - 1]) > 0.01);
      if (simplified.length <= target) return simplified;
      while (simplified.length > target) {
        let removeIndex = closed ? 0 : 1;
        let smallestArea = Infinity;
        const start = closed ? 0 : 1;
        const end = closed ? simplified.length : simplified.length - 1;
        for (let i = start; i < end; i += 1) {
          const prev = closed ? simplified[(i - 1 + simplified.length) % simplified.length] : simplified[i - 1];
          const curr = simplified[i];
          const next = closed ? simplified[(i + 1) % simplified.length] : simplified[i + 1];
          const area = triangleArea(prev, curr, next);
          if (area < smallestArea) {
            smallestArea = area;
            removeIndex = i;
          }
        }
        simplified.splice(removeIndex, 1);
      }
      return simplified;

    function makeScalarField(imageData, mode) {
      const { width, height, data } = imageData;
      const total = width * height;
      const scalar = new Float32Array(total);
      const corners = [
        [0, 0],
        [width - 1, 0],
        [0, height - 1],
        [width - 1, height - 1],
      ];
      const bg = corners.reduce((acc, [x, y]) => {
        const i = (y * width + x) * 4;
        acc.r += data[i];
        acc.g += data[i + 1];
        acc.b += data[i + 2];
        acc.a += data[i + 3];
        return acc;
      }, { r: 0, g: 0, b: 0, a: 0 });
      bg.r /= corners.length;
      bg.g /= corners.length;
      bg.b /= corners.length;
      bg.a /= corners.length;

      let transparentPixels = 0;
      const gray = new Float32Array(total);
      for (let i = 0; i < total; i += 1) {
        const j = i * 4;
        const alpha = data[j + 3];
        if (alpha < 245) transparentPixels += 1;
        gray[i] = data[j] * 0.299 + data[j + 1] * 0.587 + data[j + 2] * 0.114;
      }
      const hasAlpha = transparentPixels / total > 0.02;

      if (mode === "edges") {
        return { ...sobelScalar(gray, width, height), kind: "edges" };
      }

      let kind = "luma";
      for (let i = 0; i < total; i += 1) {
        const j = i * 4;
        if (hasAlpha && mode !== "silhouette") {
          scalar[i] = data[j + 3];
          kind = "alpha";
        } else if (mode === "silhouette") {
          const dr = data[j] - bg.r;
          const dg = data[j + 1] - bg.g;
          const db = data[j + 2] - bg.b;
          scalar[i] = Math.hypot(dr, dg, db);
          kind = "silhouette";
        } else {
          scalar[i] = gray[i];
        }
      }
      return { scalar, width, height, kind };
    }

    function sobelScalar(gray, width, height) {
      const scalar = new Float32Array(width * height);
      for (let y = 1; y < height - 1; y += 1) {
        for (let x = 1; x < width - 1; x += 1) {
          const i = y * width + x;
          const gx =
            -gray[i - width - 1] + gray[i - width + 1] -
            2 * gray[i - 1] + 2 * gray[i + 1] -
            gray[i + width - 1] + gray[i + width + 1];
          const gy =
            -gray[i - width - 1] - 2 * gray[i - width] - gray[i - width + 1] +
            gray[i + width - 1] + 2 * gray[i + width] + gray[i + width + 1];
          scalar[i] = Math.min(255, Math.hypot(gx, gy) / 4);
        }
      }
      return { scalar, width, height };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));

    function percentileSorted(sorted, ratio) {
      if (!sorted.length) return 0;
      const index = clamp(Math.round((sorted.length - 1) * ratio), 0, sorted.length - 1);
      return sorted[index];
    }

    function otsuLevel(scalar) {
      const hist = new Float64Array(256);
      let total = 0;
      let sum = 0;
      for (let i = 0; i < scalar.length; i += 1) {
        const value = clamp(Math.round(scalar[i]), 0, 255);
        hist[value] += 1;
        total += 1;
        sum += value;
      }

      let backgroundWeight = 0;
      let backgroundSum = 0;
      let bestVariance = -1;
      let bestLevel = 0;
      for (let level = 0; level < hist.length; level += 1) {
        backgroundWeight += hist[level];
        if (backgroundWeight === 0) continue;
        const foregroundWeight = total - backgroundWeight;
        if (foregroundWeight === 0) break;
        backgroundSum += level * hist[level];
        const backgroundMean = backgroundSum / backgroundWeight;
        const foregroundMean = (sum - backgroundSum) / foregroundWeight;
        const variance = backgroundWeight * foregroundWeight * (backgroundMean - foregroundMean) ** 2;
        if (variance > bestVariance) {
          bestVariance = variance;
          bestLevel = level;
        }
      }
      return bestLevel;
    }

    function automaticContourLevel(field) {
      if (field.kind === "alpha") return 24;

      const values = [];
      for (let i = 0; i < field.scalar.length; i += 1) {
        if (field.scalar[i] > 2) values.push(field.scalar[i]);
      }
      values.sort((a, b) => a - b);
      if (!values.length) return 12;

      if (field.kind === "edges") {
        return clamp(percentileSorted(values, 0.74), 10, 150);
      }

      const low = percentileSorted(values, 0.12);
      const high = percentileSorted(values, 0.88);
      const otsu = otsuLevel(field.scalar);
      if (otsu <= low + 2 || otsu >= high - 2) {
        return clamp((low + high) / 2, 8, 220);
      }
      return clamp(otsu, 8, 220);
    }

    function contourSegmentsFromScalar(scalar, width, height, level) {
      const lookup = {
        1: [["left", "bottom"]],
        2: [["bottom", "right"]],
        3: [["left", "right"]],
        4: [["top", "right"]],
        5: [["top", "left"], ["bottom", "right"]],
        6: [["top", "bottom"]],
        7: [["top", "left"]],
        8: [["left", "top"]],
        9: [["top", "bottom"]],
        10: [["left", "bottom"], ["top", "right"]],
        11: [["top", "right"]],
        12: [["left", "right"]],
        13: [["bottom", "right"]],
        14: [["left", "bottom"]],
      };
      const mix = (a, b) => {
        const denom = b.value - a.value;
        const t = Math.abs(denom) < 0.000001 ? 0.5 : Math.max(0, Math.min(1, (level - a.value) / denom));
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
      };
      const pointFor = (x, y, edge, values) => {
        const tl = { x, y, value: values.tl };
        const tr = { x: x + 1, y, value: values.tr };
        const br = { x: x + 1, y: y + 1, value: values.br };
        const bl = { x, y: y + 1, value: values.bl };
        if (edge === "top") return mix(tl, tr);
        if (edge === "right") return mix(tr, br);
        if (edge === "bottom") return mix(bl, br);
        return mix(tl, bl);
      };
      const segments = [];
      for (let y = 0; y < height - 1; y += 1) {
        for (let x = 0; x < width - 1; x += 1) {
          const values = {
            tl: scalar[y * width + x],
            tr: scalar[y * width + x + 1],
            br: scalar[(y + 1) * width + x + 1],
            bl: scalar[(y + 1) * width + x],
          };
          const cell = (values.tl >= level ? 8 : 0) |
            (values.tr >= level ? 4 : 0) |
            (values.br >= level ? 2 : 0) |
            (values.bl >= level ? 1 : 0);
          (lookup[cell] ?? []).forEach(([a, b]) => {
            segments.push([pointFor(x, y, a, values), pointFor(x, y, b, values)]);
          });
        }
      }
      return segments;
    }

    function contourPointCloud(segments, width, height) {
      const scale = 100 / Math.max(width, height);
      const seen = new Set();
      const points = [];
      segments.forEach(([a, b]) => {
        [a, b].forEach((point) => {
          const normalized = {
            x: Math.round(point.x * scale * 10) / 10,
            y: Math.round(point.y * scale * 10) / 10,
          };
          const key = `${normalized.x},${normalized.y}`;
          if (!seen.has(key)) {

    function foregroundMaskFromField(field, level) {
      const { scalar, width, height, kind } = field;
      const mask = new Uint8Array(width * height);
      let foregroundIsHigh = true;
      if (kind === "luma") {
        const corners = [0, width - 1, (height - 1) * width, height * width - 1];
        const cornerMean = corners.reduce((sum, index) => sum + scalar[index], 0) / corners.length;
        foregroundIsHigh = cornerMean < level;
      }
      for (let i = 0; i < scalar.length; i += 1) {
        mask[i] = foregroundIsHigh ? Number(scalar[i] >= level) : Number(scalar[i] <= level);
      }
      return { mask, width, height };
    }

    function largestConnectedMask(binary, width, height) {
      const components = connectedComponents(binary, width, height);
      const componentMask = new Uint8Array(binary.length);
      (components[0] ?? []).forEach((index) => { componentMask[index] = 1; });
      return componentMask;
    }

    function connectedComponents(binary, width, height) {
      const visited = new Uint8Array(binary.length);
      const components = [];
      const queue = [];
      const neighbors = [[1, 0], [-1, 0], [0, 1], [0, -1]];
      for (let start = 0; start < binary.length; start += 1) {
        if (!binary[start] || visited[start]) continue;
        const component = [];
        visited[start] = 1;
        queue.length = 0;
        queue.push(start);
        for (let head = 0; head < queue.length; head += 1) {
          const index = queue[head];
          component.push(index);
          const x = index % width;
          const y = Math.floor(index / width);
          neighbors.forEach(([dx, dy]) => {
            const nx = x + dx;
            const ny = y + dy;
            if (nx < 0 || nx >= width || ny < 0 || ny >= height) return;
            const next = ny * width + nx;
            if (!binary[next] || visited[next]) return;
            visited[next] = 1;
            queue.push(next);
          });
        }
        components.push(component);
      }
      return components.sort((a, b) => b.length - a.length);
    }

    function maskFromComponent(component, total) {
      const componentMask = new Uint8Array(total);
      component.forEach((index) => { componentMask[index] = 1; });
      return componentMask;
    }

    function contourPathFromMask(field, level) {
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const component = largestConnectedMask(mask, width, height);
      return contourPathFromComponentMask(component, width, height);
    }

    function contourPathsFromMask(field, level) {
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const components = connectedComponents(mask, width, height);
      const largest = components[0]?.length ?? 0;
      const minArea = Math.max(12, largest * 0.012);
      return components
        .filter((component) => component.length >= minArea)
        .slice(0, 6)
        .map((component) => contourPathFromComponentMask(maskFromComponent(component, mask.length), width, height))
        .filter((path) => path.length >= 4)
        .sort((a, b) => pathLength(b) - pathLength(a));
    }

    function contourPathFromComponentMask(component, width, height) {
      const scale = 100 / Math.max(width, height);
      const inside = (x, y) => x >= 0 && x < width && y >= 0 && y < height && component[y * width + x];
      const vertexKey = (point) => `${point.x},${point.y}`;
      const edgeKey = (a, b) => `${vertexKey(a)}>${vertexKey(b)}`;
      const edges = [];
      const addEdge = (a, b) => {
        edges.push({ a, b, key: edgeKey(a, b) });
      };
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (!inside(x, y)) continue;
          const tl = { x, y };
          const tr = { x: x + 1, y };
          const br = { x: x + 1, y: y + 1 };
          const bl = { x, y: y + 1 };
          if (!inside(x, y - 1)) addEdge(tl, tr);
          if (!inside(x + 1, y)) addEdge(tr, br);
          if (!inside(x, y + 1)) addEdge(br, bl);
          if (!inside(x - 1, y)) addEdge(bl, tl);
        }
      }
      const starts = new Map();
      edges.forEach((edge, index) => {
        const key = vertexKey(edge.a);
        if (!starts.has(key)) starts.set(key, []);
        starts.get(key).push(index);
      });
      const used = new Uint8Array(edges.length);
      const loops = [];
      edges.forEach((edge, index) => {
        if (used[index]) return;
        const loop = [edge.a, edge.b];
        used[index] = 1;
        let current = edge.b;
        const startKey = vertexKey(edge.a);
        for (let guard = 0; guard < edges.length; guard += 1) {
          if (vertexKey(current) === startKey) break;
          const candidates = starts.get(vertexKey(current)) ?? [];
          const nextIndex = candidates.find((candidate) => !used[candidate]);
          if (nextIndex === undefined) break;
          used[nextIndex] = 1;
          current = edges[nextIndex].b;
          loop.push(current);
        }
        if (loop.length > 3 && vertexKey(loop[0]) === vertexKey(loop[loop.length - 1])) loop.pop();
        if (loop.length >= 4) {
          loops.push(loop.map((point) => ({
            x: Math.round(point.x * scale * 10) / 10,
            y: Math.round(point.y * scale * 10) / 10,
          })));
        }
      });
      if (!loops.length) return [];
      return loops.sort((a, b) => pathLength(b) - pathLength(a))[0];
    }

    function contourPathFromSegments(segments, width, height) {
      if (!segments.length) return [];
      const scale = 100 / Math.max(width, height);
      const normalize = (point) => ({
        x: Math.round(point.x * scale * 10) / 10,
        y: Math.round(point.y * scale * 10) / 10,
      });
      const keyFor = (point) => `${point.x},${point.y}`;
      const normalizedSegments = segments.map(([a, b]) => {
        const p0 = normalize(a);
        const p1 = normalize(b);
        return { points: [p0, p1], keys: [keyFor(p0), keyFor(p1)] };
      }).filter((segment) => segment.keys[0] !== segment.keys[1]);
      const byEndpoint = new Map();
      normalizedSegments.forEach((segment, index) => {
        segment.keys.forEach((key) => {
          if (!byEndpoint.has(key)) byEndpoint.set(key, []);
          byEndpoint.get(key).push(index);
        });
      });
      const used = new Uint8Array(normalizedSegments.length);
      const nextUnusedAt = (key) => (byEndpoint.get(key) ?? []).find((index) => !used[index]);
      const grow = (chain, atStart) => {
        while (chain.length) {
          const key = keyFor(atStart ? chain[0] : chain[chain.length - 1]);
          const index = nextUnusedAt(key);
          if (index === undefined) break;
          used[index] = 1;
          const segment = normalizedSegments[index];
          const other = segment.keys[0] === key ? segment.points[1] : segment.points[0];
          if (atStart) chain.unshift(other);
          else chain.push(other);
        }
      };
      const chains = [];
      normalizedSegments.forEach((segment, index) => {
        if (used[index]) return;
        used[index] = 1;
        const chain = [segment.points[0], segment.points[1]];
        grow(chain, false);
        grow(chain, true);
        const deduped = chain.filter((point, pointIndex) => pointIndex === 0 || keyFor(point) !== keyFor(chain[pointIndex - 1]));
        if (deduped.length > 1 && keyFor(deduped[0]) === keyFor(deduped[deduped.length - 1])) deduped.pop();
        if (deduped.length >= 3) chains.push(deduped);

      if (!chains.length) return [];
      return chains.sort((a, b) => pathLength(b) - pathLength(a))[0];

    function deterministicSample(points, ratio, maxPoints = 900) {
      if (!points.length) return [];
      const desired = Math.max(8, Math.min(points.length, maxPoints, Math.round(points.length * ratio)));

        .map((point, index) => {

        .sort((a, b) => a.key - b.key)

    function buildCompleteMST(points) {
      const n = points.length;
      const graph = Array.from({ length: n }, () => []);
      if (n <= 1) return graph;
      const used = new Uint8Array(n);
      const minDistance = new Float64Array(n);
      const parent = new Int32Array(n);
      minDistance.fill(Infinity);
      parent.fill(-1);
      minDistance[0] = 0;
      for (let step = 0; step < n; step += 1) {
        let current = -1;
        let best = Infinity;
        for (let i = 0; i < n; i += 1) {
          if (!used[i] && minDistance[i] < best) {
            best = minDistance[i];
            current = i;
          }
        }
        if (current < 0) break;
        used[current] = 1;
        if (parent[current] >= 0) {
          const p = parent[current];
          const d = Math.sqrt(best);
          graph[current].push({ node: p, distance: d });
          graph[p].push({ node: current, distance: d });

        const a = points[current];
        for (let j = 0; j < n; j += 1) {
          if (used[j]) continue;
          const b = points[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < minDistance[j]) {
            minDistance[j] = d2;
            parent[j] = current;
          }

    function farthestNode(graph, start) {
      const stack = [{ node: start, parent: -1, distance: 0 }];
      let farthest = { node: start, distance: 0 };
      while (stack.length) {
        const item = stack.pop();
        const isLeaf = graph[item.node].length <= 1 && item.node !== start;
        if ((isLeaf || graph[item.node].length === 0) && item.distance > farthest.distance) {
          farthest = { node: item.node, distance: item.distance };
        }
        graph[item.node].forEach((edge) => {
          if (edge.node !== item.parent) {
            stack.push({ node: edge.node, parent: item.node, distance: item.distance + edge.distance });
          }
        });
      }
      return farthest.node;

    function treePathFromSamples(points) {
      if (points.length <= 2) return points.slice();
      const graph = buildCompleteMST(points);
      const firstLeaf = graph.findIndex((edges) => edges.length === 1);
      const st = farthestNode(graph, Math.max(0, firstLeaf));
      const ed = farthestNode(graph, st);
      const parent = new Int32Array(points.length);
      const order = [st];
      parent.fill(-1);
      for (let i = 0; i < order.length; i += 1) {
        const node = order[i];
        graph[node].forEach((edge) => {

            order.push(edge.node);

      const endPath = new Set();
      for (let node = ed; node >= 0; node = parent[node]) {
        endPath.add(node);
        if (node === st) break;
      }
      const children = Array.from({ length: points.length }, () => []);
      for (let i = 0; i < points.length; i += 1) {
        if (parent[i] >= 0) children[parent[i]].push(i);
      }
      children.forEach((list) => {
        list.sort((a, b) => Number(endPath.has(a)) - Number(endPath.has(b)));
      });
      const path = [];
      function dfs(node) {
        path.push(points[node]);
        if (node === ed) return true;
        let hasChild = false;
        for (const child of children[node]) {
          hasChild = true;
          if (dfs(child)) return true;
        }
        if (hasChild) path.push(points[node]);
        return false;
      }
      dfs(st);
      const maxStep = Math.max(0, ...path.slice(1).map((point, index) => distance(point, path[index])));
      if (distance(points[st], points[ed]) < 2 * maxStep) {

    function pathLength(points, closed = true) {

    function normalizePoints(points) {

        minY: Math.min(acc.minY, p.y),
        maxX: Math.max(acc.maxX, p.x),
        maxY: Math.max(acc.maxY, p.y),
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const scale = 82 / Math.max(width, height);
      const offsetX = 50 - ((bounds.minX + bounds.maxX) / 2) * scale;
      const offsetY = 50 - ((bounds.minY + bounds.maxY) / 2) * scale;

    }

    function normalizeContours(contours) {
      const points = contours.flat();
      if (!points.length) return [];
      const bounds = points.reduce((acc, p) => ({
        minX: Math.min(acc.minX, p.x),
        minY: Math.min(acc.minY, p.y),
        maxX: Math.max(acc.maxX, p.x),
        maxY: Math.max(acc.maxY, p.y),
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const scale = 82 / Math.max(width, height);
      const offsetX = 50 - ((bounds.minX + bounds.maxX) / 2) * scale;
      const offsetY = 50 - ((bounds.minY + bounds.maxY) / 2) * scale;

    function simplifyContoursToPointCount(contours, pointCount, closedFlags = []) {

        .map((contour, index) => ({ contour, closed: closedFlags[index] ?? true }))
        .filter((item) => item.contour.length >= 3);
      if (!valid.length) return [];
      const total = Math.max(8, Math.round(pointCount));
      if (valid.length === 1) return [simplifyToPointCount(valid[0].contour, total, valid[0].closed)];
      const lengths = valid.map((item) => pathLength(item.contour, item.closed));
      const totalLength = lengths.reduce((sum, length) => sum + length, 0) || 1;
      const minPoints = 6;
      let remaining = Math.max(0, total - minPoints * valid.length);
      return valid.map((item, index) => {
        const allocated = minPoints + Math.round(remaining * (lengths[index] / totalLength));
        return simplifyToPointCount(item.contour, Math.max(minPoints, allocated), item.closed);
      });
    }

    function applyPointCloudDensity(contours, ratio, simplifyPointCount, closedFlags = []) {

      const totalTarget = Math.round(24 + density * 920);

        let y = 0;

      let segment = 0;
      let walked = 0;

    function drawSourcePreview() {
      const canvas = sourceCanvas;

      const ctx = canvas.getContext("2d");

      const h = canvas.clientHeight * devicePixelRatio;
      canvas.width = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);

      const temp = document.createElement("canvas");
      temp.width = state.imageData.width;
      temp.height = state.imageData.height;
      temp.getContext("2d").putImageData(state.imageData, 0, 0);
      const scale = Math.min(w / temp.width, h / temp.height);
      const dw = temp.width * scale;
      const dh = temp.height * scale;
      ctx.drawImage(temp, (w - dw) / 2, (h - dh) / 2, dw, dh);

    function drawContourPreview() {
      const canvas = contourCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.clientWidth * devicePixelRatio;
      const h = canvas.clientHeight * devicePixelRatio;
      canvas.width = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#090a0d";
      ctx.fillRect(0, 0, w, h);
      const contours = state.normalizedContours?.length ? state.normalizedContours : [state.normalized];
      if (!contours.some((contour) => contour.length)) return;
      const sx = w / 100;
      const sy = h / 100;
      ctx.lineWidth = Math.max(1, devicePixelRatio);
      ctx.strokeStyle = "rgba(103, 214, 195, 0.95)";
      contours.forEach((contour) => {
        drawSmoothClosedPath(ctx, contour, sx, sy);
        ctx.stroke();
      });
      ctx.fillStyle = "rgba(240, 201, 106, 0.95)";
      contours.flat().forEach((p) => {
        ctx.beginPath();
        ctx.arc(p.x * sx, p.y * sy, Math.max(1.2, devicePixelRatio * 1.2), 0, Math.PI * 2);
        ctx.fill();
      });
    }








    function hasSvgVectorContours() {
      return state.sourceKind === "svg" && state.svgContours.some((contour) => contour.length >= 3);

    function activeEffectUsesReferenceImage() {
      if (config.effectType === "neural") return config.neuralSource === "reference";
      const effect = activeEffect();
