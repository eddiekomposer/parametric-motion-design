      let y = 0;
      coefficients.forEach((c) => {
        const detail = Math.abs(c.k) > 7 ? 0.76 + 0.24 * detailScale : 1;
        const angle = angleBase * c.k;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        x += detail * (c.re * cos - c.im * sin);
        y += detail * (c.re * sin + c.im * cos);
      });
      return { x, y };
    }

    function getDetailScale(time) {
      const pulseProgress = (time % config.pulseDurationMs) / config.pulseDurationMs;
      const pulseAngle = pulseProgress * Math.PI * 2;
      return 0.52 + ((Math.sin(pulseAngle + 0.55) + 1) / 2) * 0.48;
    }

    function getLoopState(time) {
      const progress = (time % config.durationMs) / config.durationMs;
      return { progress: config.pulseCycleMs > 0 ? softenedBezierProgress(progress) : progress, opacity: getPulseOpacity(time) };
    }

    function getPulseOpacity(time) {
      if (config.pulseCycleMs <= 0) return 1;
      const cycleDuration = Math.max(1, config.pulseCycleMs);
      const gapRatio = clamp(config.pulseGapRatio, 0, 0.8);
      const visibleDuration = Math.max(1, cycleDuration * (1 - gapRatio));
      const local = time % cycleDuration;
      if (local >= visibleDuration) return 0;
      const phase = local / visibleDuration;
      const fadePortion = 0.34;
      const fadeIn = easedSegment(0, fadePortion, phase);
      const fadeOut = 1 - easedSegment(1 - fadePortion, 1, phase);
      return fadeIn * fadeOut;
    }

    function standardBezierEase(value) {
      const target = clamp(value, 0, 1);
      let low = 0;
      let high = 1;
      let t = target;
      for (let i = 0; i < 14; i += 1) {
        t = (low + high) / 2;
        const x = cubicBezierAxis(t, 0.5, 0);
        if (x < target) low = t;
        else high = t;
      }
      return cubicBezierAxis(t, 0, 1);
    }
    function cubicBezierAxis(t, p1, p2) {
      const inv = 1 - t;
      return 3 * inv * inv * t * p1 + 3 * inv * t * t * p2 + t * t * t;
    }

    function easedSegment(edge0, edge1, value) {
      const t = clamp((value - edge0) / Math.max(0.000001, edge1 - edge0), 0, 1);
      return standardBezierEase(t);
    }

    function softenedBezierProgress(value) {
      const linear = clamp(value, 0, 1);
      const eased = standardBezierEase(linear);
      return linear * 0.65 + eased * 0.35;
    }

    function buildPath(detailScale, steps = 180) {
      const points = [];
      for (let index = 0; index < steps; index += 1) {
        points.push(curvePoint(index / steps, detailScale));
      }
      return buildSmoothSvgPath(points);
    }

    function ensureParticles() {
      const desired = Math.round(config.particleCount);
      while (state.particles.length < desired) {
        const circle = document.createElementNS(SVG_NS, "circle");
        circle.setAttribute("fill", config.motionColor);
        motionGroup.appendChild(circle);
        state.particles.push(circle);
      }
      state.particles.forEach((circle, index) => {
        circle.style.display = index < desired ? "" : "none";
      });
    }

    function render(now) {
      try {
        window.__motionDebug = {
          effectType: config.effectType,
          renderCount: (window.__motionDebug?.renderCount ?? 0) + 1,
          lastFrameAt: now,
        };
        activeEffect().render(now);
      } catch (error) {
        console.error(error);
      }
      state.animationFrame = requestAnimationFrame(render);
    }

    function renderFlowEffect(now) {
      const time = now - state.startedAt;
      const loop = getLoopState(time);
      const detailScale = getDetailScale(time);
      hideParticleCanvas();
      hideLineGroup();
      hideSineGroup();
      hideOscilloscopeGroup();
      ensureParticles();
      motionGroup.removeAttribute("transform");
      motionPath.setAttribute("stroke-width", String(config.strokeWidth));
      motionPath.setAttribute("stroke", config.contourColor);
      motionPath.setAttribute("d", state.normalizedContours.length ? buildSmoothSvgMultiPath(state.normalizedContours) : buildPath(detailScale));
      motionPath.setAttribute("opacity", config.contourOpacity.toFixed(3));
      const count = Math.max(2, Math.round(config.particleCount));
      state.particles.forEach((node, index) => {
        if (index >= count) return;
        const tailOffset = index / (count - 1);
        const point = curvePoint(normalizeProgress(loop.progress - tailOffset * config.trailSpan), detailScale);
        const fade = Math.pow(1 - tailOffset, 0.56);
        node.setAttribute("fill", config.motionColor);
        node.setAttribute("cx", point.x.toFixed(2));
        node.setAttribute("cy", point.y.toFixed(2));
        node.setAttribute("r", (0.72 + fade * (config.strokeWidth * 0.58)).toFixed(2));
        node.setAttribute("opacity", ((0.04 + fade * 0.96) * config.motionOpacity * loop.opacity).toFixed(3));
      });
    }

    function drawMiniCanvases() {
      drawSourcePreview();
      drawContourPreview();
    }

    function drawSourcePreview() {
      const canvas = sourceCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.clientWidth * devicePixelRatio;
      const h = canvas.clientHeight * devicePixelRatio;
      canvas.width = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      if (!state.imageData) return;
      const temp = document.createElement("canvas");
      temp.width = state.imageData.width;
      temp.height = state.imageData.height;
      temp.getContext("2d").putImageData(state.imageData, 0, 0);
      const scale = Math.min(w / temp.width, h / temp.height);
      const dw = temp.width * scale;
      const dh = temp.height * scale;
      ctx.drawImage(temp, (w - dw) / 2, (h - dh) / 2, dw, dh);
    }

    function drawContourPreview() {
      const canvas = contourCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.clientWidth * devicePixelRatio;
      const h = canvas.clientHeight * devicePixelRatio;
      canvas.width = w;
      canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#090a0d";
      ctx.fillRect(0, 0, w, h);
      const contours = state.normalizedContours?.length ? state.normalizedContours : [state.normalized];
      if (!contours.some((contour) => contour.length)) return;
      const sx = w / 100;
      const sy = h / 100;
      ctx.lineWidth = Math.max(1, devicePixelRatio);
      ctx.strokeStyle = "rgba(103, 214, 195, 0.95)";
      contours.forEach((contour) => {
        drawSmoothClosedPath(ctx, contour, sx, sy);
        ctx.stroke();
      });
      ctx.fillStyle = "rgba(240, 201, 106, 0.95)";
      contours.flat().forEach((p) => {
        ctx.beginPath();
        ctx.arc(p.x * sx, p.y * sy, Math.max(1.2, devicePixelRatio * 1.2), 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function prepareFlowEffect() {
      state.samples = resampleSmoothContoursAsOneStroke(state.normalizedContours.length ? state.normalizedContours : [state.normalized], derivedSampleCount(config.harmonicCount));
      const harmonicLimit = Math.min(Math.round(config.harmonicCount), Math.floor(state.samples.length / 2) - 1);
      state.coefficients = computeCoefficients(state.samples, harmonicLimit);
    }

    function prepareLineEffect() {
      prepareFlowEffect();
      if (config.lineStyle === "constellation") {
        prepareConstellationLineEffect();
        return;
      }
      state.constellationPoints = [];
      state.lineFrames = [];
      const previousFrames = [];
      config.lineKeyframes.forEach((frame, index) => {
        const chars = Array.from(frame.text ?? "").filter((char) => !/\s/.test(char));
        const points = ensureLineFramePoints(frame, chars, index, previousFrames);
        const connections = ensureLineFrameConnections(frame, points);
        const prepared = { id: frame.id, text: frame.text, chars, points, connections };
        state.lineFrames.push(prepared);
        previousFrames.push(prepared);
      });
      state.lineConnections = state.lineFrames[0]?.connections ?? [];
    }

    function prepareConstellationLineEffect() {
      state.constellationPoints = buildConstellationPoints();
      state.constellationContourPath = constellationContourBasePath();
      state.lineFrames = [];
      config.lineKeyframes.forEach((frame, index) => {
        const chars = Array.from(frame.text ?? "").filter((char) => !/\s/.test(char));
        const points = chooseConstellationFramePoints(chars, frame.id, index);
        const connections = ensureConstellationFrameConnections(frame, points, index);
        connections.forEach((connection) => {
          connection.d = constellationConnectionPath(points[connection.a], points[connection.b], connection, points);
        });
        state.lineFrames.push({ id: frame.id, text: frame.text, chars, points, connections, contourPath: constellationContourBasePath(points) });
      });
      state.lineConnections = state.lineFrames[0]?.connections ?? [];
    }

    function prepareSineEffect() {
      const contours = state.normalizedContours.length ? state.normalizedContours : [state.normalized].filter((contour) => contour.length);
      state.samples = resampleSmoothContoursAsOneStroke(contours, 360);
      state.coefficients = [];
    }

    function ensureSineGroup() {
      if (!state.sineGroup) {
        state.sineGroup = document.createElementNS(SVG_NS, "g");
        state.sineGroup.setAttribute("id", "sine-group");
        motionGroup.appendChild(state.sineGroup);
      }
      state.sineGroup.style.display = "";
      return state.sineGroup;
    }

    function hideSineGroup() {
      if (state.sineGroup) state.sineGroup.style.display = "none";
    }

    function ensureSineElements(count) {
      const group = ensureSineGroup();
      while (state.sinePaths.length < count) {
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("fill", "none");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        group.appendChild(path);
        state.sinePaths.push(path);
      }
      state.sinePaths.forEach((path, index) => {
        path.style.display = index < count ? "" : "none";
      });
    }

    function sineBounds() {
      return { minX: 8, minY: 8, maxX: 92, maxY: 92, width: 84, height: 84, centerX: 50, centerY: 50 };
    }

    function sineTaperFactor(t) {
      const strength = Math.max(0, Number(config.sineTaper) || 0);
      if (strength <= 0) return 1;
      const edge = Math.max(0, Math.sin(Math.PI * clamp(t, 0, 1)));
      return edge ** (strength * 0.45);
    }

    function sineLineVariation(index) {
      const amount = clamp(Number(config.sineRandomness) || 0, 0, 1);
      if (amount <= 0) {
        return { phase: 0, speed: 1, amplitude: 1, waviness: 1, drift: 0 };
      }
      const rng = seededRandom(`sine-randomness|${index}`);
      return {
        phase: (rng() - 0.5) * Math.PI * 2 * amount,
        speed: 1 + (rng() - 0.5) * 0.32 * amount,
        amplitude: 1 + (rng() - 0.5) * 0.36 * amount,
        waviness: 1 + (rng() - 0.5) * 0.22 * amount,
        drift: (rng() - 0.5) * Math.PI * 2 * amount,
      };
    }

    function sinePointAt(index, count, bounds, time, t) {
      const variation = sineLineVariation(index);
      const progress = (time * config.sineSpeed * variation.speed) / 1000;
      const amplitude = config.sineAmplitude * variation.amplitude * Math.max(1.8, bounds.height * 0.045);
      const xSpan = Math.max(bounds.width, bounds.height) * config.sineScale;
      const startX = bounds.centerX - xSpan * 0.58;
      const endX = bounds.centerX + xSpan * 0.58;
      const baseY = bounds.centerY;
      const phase = progress * Math.PI * 2 + index * 0.74 + variation.phase;
      const taper = sineTaperFactor(t);
      const x = startX + (endX - startX) * t;
      const waviness = config.sineWaviness * variation.waviness;
      const wave = Math.sin(t * Math.PI * 2 * waviness + phase);
      const drift = Math.sin(t * Math.PI * 2 * (waviness * 0.42 + 0.35) - phase * 0.62 + index + variation.drift);
      const y = baseY + (wave + drift * 0.28) * amplitude * taper;
      return { x, y, taper };
    }

    function sineWaveSegments(index, count, bounds, time) {
      const steps = 96;
      const segments = [];
      let previous = sinePointAt(index, count, bounds, time, 0);
      for (let step = 1; step <= steps; step += 1) {
        const t = step / steps;
        const next = sinePointAt(index, count, bounds, time, t);
        const taper = sineTaperFactor((step - 0.5) / steps);
        segments.push({
          d: `M ${previous.x.toFixed(2)} ${previous.y.toFixed(2)} L ${next.x.toFixed(2)} ${next.y.toFixed(2)}`,
          width: config.sineStrokeWidth * (0.08 + Math.pow(taper, 0.42) * 0.92),
        });
        previous = next;
      }
      return segments;
    }

    function renderSineEffect(now) {
      hideParticleCanvas();
      hideParticles();
      hideLineGroup();
      hideOscilloscopeGroup();
      hideLineEditHandles();
      motionPath.setAttribute("opacity", "0");
      const bounds = sineBounds();
      const count = Math.max(2, Math.round(config.sineLineCount));
      const segmentCount = count * 96;
      ensureSineElements(segmentCount);
      let pathIndex = 0;
      for (let lineIndex = 0; lineIndex < count; lineIndex += 1) {
        sineWaveSegments(lineIndex, count, bounds, now - state.startedAt).forEach((segment) => {
          const path = state.sinePaths[pathIndex];
          path.setAttribute("d", segment.d);
          path.setAttribute("stroke", config.sineColor);
          path.setAttribute("stroke-width", segment.width.toFixed(3));
          path.setAttribute("opacity", "1");
          pathIndex += 1;
        });
      }
    }

    function prepareOscilloscopeEffect() {
      state.samples = [];
      state.coefficients = [];
      config.oscFigures = sanitizeOscilloscopeFigures(config.oscFigures);
      state.oscilloscopeHoverForces = config.oscFigures.map(() => ({ offset: 0, velocity: 0 }));
      state.oscilloscopeLastFrameAt = null;
    }

    function sanitizeOscilloscopeFigures(figures) {
      const source = Array.isArray(figures) && figures.length ? figures : cloneDefaults(oscilloscopeDefaults.oscFigures);
      return source.map((figure, index) => ({
        id: Number.isFinite(Number(figure.id)) ? Number(figure.id) : index + 1,
        xFreq: clamp(Math.round(Number(figure.xFreq) || 3), 1, 12),
        yFreq: clamp(Math.round(Number(figure.yFreq) || 2), 1, 12),
        phaseDeg: ((Number(figure.phaseDeg) || 0) % 360 + 360) % 360,
        rotationDeg: clamp(Number(figure.rotationDeg) || 0, -180, 180),
        color: isValidColorString(figure.color) ? String(figure.color) : "#67d6c3",
      }));
    }

    function ensureOscilloscopeGroup() {
      if (!state.oscilloscopeGroup) {
        state.oscilloscopeGroup = document.createElementNS(SVG_NS, "g");
        state.oscilloscopeGroup.setAttribute("id", "oscilloscope-group");
        motionGroup.appendChild(state.oscilloscopeGroup);
      }
      state.oscilloscopeGroup.style.display = "";
      return state.oscilloscopeGroup;
    }

    function hideOscilloscopeGroup() {
      if (state.oscilloscopeGroup) state.oscilloscopeGroup.style.display = "none";
    }

    function ensureOscilloscopeElements(count) {
      const group = ensureOscilloscopeGroup();
      while (state.oscilloscopePaths.length < count) {
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("class", "oscilloscope-path");
        path.setAttribute("fill", "none");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        path.setAttribute("pointer-events", "stroke");
        group.appendChild(path);
        state.oscilloscopePaths.push(path);
      }
      state.oscilloscopePaths.forEach((path, index) => {
        path.style.display = index < count ? "" : "none";
      });
    }

    function degToRad(value) {
      return (Number(value) * Math.PI) / 180;
    }

    function lissajousPoints(figure, phaseOffset = 0, center = { x: 50, y: 50 }, scale = config.oscScale, samples = 260) {
      const points = [];
      const phase = degToRad(figure.phaseDeg) + phaseOffset;
      const rotation = degToRad(figure.rotationDeg);
      const cosR = Math.cos(rotation);
      const sinR = Math.sin(rotation);
      const amp = Math.max(1, scale);
      for (let index = 0; index <= samples; index += 1) {
        const t = (index / samples) * Math.PI * 2;
        const rawX = Math.sin(figure.xFreq * t + phase);
        const rawY = Math.sin(figure.yFreq * t);
        points.push({
          x: center.x + (rawX * cosR - rawY * sinR) * amp,
          y: center.y + (rawX * sinR + rawY * cosR) * amp,
        });
      }
      return points;
    }

    function buildPolylineSvgPath(points) {
      if (!points.length) return "";
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
    }

    function buildProgressivePolylineSvgPath(points, fraction) {
      const value = clamp(fraction, 0, 1);
      if (!points.length || value <= 0.001) return "";
      if (value >= 0.999 || points.length < 2) return buildPolylineSvgPath(points);
      const scaled = value * (points.length - 1);
      const fullIndex = Math.floor(scaled);
      const partial = scaled - fullIndex;
      const visible = points.slice(0, Math.min(points.length, fullIndex + 1));
      if (fullIndex < points.length - 1) {
        visible.push(lerpPoint(points[fullIndex], points[fullIndex + 1], partial));
      }
      return buildPolylineSvgPath(visible);
    }

    function lerpLissajousFigures(a, b, progress) {
      const hueColor = progress < 0.5 ? a.color : b.color;
      return {
        id: a.id,
        xFreq: a.xFreq + (b.xFreq - a.xFreq) * progress,
        yFreq: a.yFreq + (b.yFreq - a.yFreq) * progress,
        phaseDeg: a.phaseDeg + shortestAngleDelta(a.phaseDeg, b.phaseDeg) * progress,
        rotationDeg: a.rotationDeg + shortestAngleDelta(a.rotationDeg, b.rotationDeg) * progress,
        color: hueColor,
      };
    }

    function shortestAngleDelta(from, to) {
      return ((((to - from) % 360) + 540) % 360) - 180;
    }

    function drawOscilloscopePath(path, points, color, opacity = 1, drawFraction = 1) {
      path.setAttribute("d", buildProgressivePolylineSvgPath(points, drawFraction));
      path.setAttribute("stroke", color);
      path.setAttribute("stroke-width", String(config.oscStrokeWidth));
      path.setAttribute("opacity", opacity.toFixed(3));
      path.style.filter = config.oscGlow > 0 ? `drop-shadow(0 0 ${(1 + config.oscGlow * 6).toFixed(1)}px ${hexToRgba(color, 0.68 * config.oscGlow)})` : "";
      path.style.strokeDasharray = "";
      path.style.strokeDashoffset = "";
    }

    function hexToRgba(hex, alpha) {
      const value = String(hex).replace("#", "");
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1).toFixed(3)})`;
    }

    function renderOscilloscopeEffect(now) {
      hideParticleCanvas();
      hideParticles();
      hideLineGroup();
      hideSineGroup();
      hideLineEditHandles();
      motionPath.setAttribute("opacity", "0");
      motionGroup.removeAttribute("transform");
      const figures = config.oscFigures;
      if (config.oscMode === "parallel") renderOscilloscopeParallel(now, figures);
      else renderOscilloscopeMorph(now, figures);
      state.oscilloscopeLastFrameAt = now;
    }

    function renderOscilloscopeMorph(now, figures) {
      ensureOscilloscopeElements(1);
      const path = state.oscilloscopePaths[0];
      if (!figures.length) return;
      if (figures.length === 1) {
        drawOscilloscopePath(path, lissajousPoints(figures[0]), figures[0].color);
        return;
      }
      const elapsed = now - state.startedAt;
      const transition = Math.max(300, config.oscMorphTransitionMs);
      const hold = Math.max(0, config.oscMorphHoldMs);
      const segmentDuration = hold + transition;
      const segment = ((Math.floor(elapsed / segmentDuration) % figures.length) + figures.length) % figures.length;
      const local = ((elapsed % segmentDuration) + segmentDuration) % segmentDuration;
      const current = figures[segment];
      const next = figures[(segment + 1) % figures.length];
      if (local < hold) {
        drawOscilloscopePath(path, lissajousPoints(current), current.color);
        return;
      }
      const raw = (local - hold) / transition;
      const phaseEase = standardBezierEase(raw);
      const shapeWindow = 0.5;
      const shapeStart = 0.5 - shapeWindow / 2;
      const shapeProgress = standardBezierEase(clamp((raw - shapeStart) / shapeWindow, 0, 1));
      const spin = config.oscMorphSpin * Math.PI * 2;
      const fromPoints = lissajousPoints(current, phaseEase * spin);
      const toPoints = lissajousPoints(next, (phaseEase - 1) * spin);
      const points = fromPoints.map((point, index) => lerpPoint(point, toPoints[index], shapeProgress));
      const mixed = lerpLissajousFigures(current, next, shapeProgress);
      drawOscilloscopePath(path, points, mixed.color);
    }

    function renderOscilloscopeParallel(now, figures) {
      ensureOscilloscopeElements(figures.length);
      decayOscilloscopeHoverForces(now);
      const centers = oscilloscopeParallelCenters(figures.length);
      figures.forEach((figure, index) => {
        const path = state.oscilloscopePaths[index];
        const isSpinMode = config.oscRefreshMode === "spin";
        const hover = oscilloscopeHoverState(index);
        const motion = isSpinMode ? parallelSpinMotion(now - state.startedAt, index) : { phase: 0 };
        const phase = motion.phase + (isSpinMode ? hover.offset : 0);
        const scale = oscilloscopeParallelScale(figures.length);
        const points = lissajousPoints(figure, phase, centers[index], scale);
        const drawFraction = config.oscRefreshMode === "draw" ? oscilloscopeDrawFraction(now - state.startedAt, index) : 1;
        path.dataset.oscIndex = String(index);
        drawOscilloscopePath(path, points, figure.color, 1, drawFraction);
      });
    }

    function oscilloscopeParallelCenters(count) {
      const spacing = config.oscParallelSpacing;
      const start = 50 - ((count - 1) * spacing) / 2;
      return Array.from({ length: count }, (_, index) => ({ x: start + index * spacing, y: 50 }));
    }

    function oscilloscopeParallelScale(count) {
      return Math.max(5, config.oscScale);
    }

    function parallelSpinMotion(elapsed, index) {
      const interval = Math.max(800, config.oscParallelIntervalMs);
      const spinDuration = Math.min(Math.max(250, config.oscParallelSpinMs), interval);
      const shifted = elapsed - index * config.oscStaggerMs;
      const local = ((shifted % interval) + interval) % interval;
      if (local > spinDuration) return { phase: 0 };
      const progress = local / spinDuration;
      const direction = index % 2 === 0 ? 1 : -1;
      const configuredTurns = Math.max(0.1, Number(config.oscParallelTurns) || 1);
      if (configuredTurns < 1) {
        return {
          phase: direction * Math.sin(progress * Math.PI) * Math.PI * 2 * configuredTurns,
        };
      }
      const phaseProgress = standardBezierEase(progress);
      const turns = Math.max(1, Math.round(configuredTurns));
      return {
        phase: direction * phaseProgress * Math.PI * 2 * turns,
      };
    }

    function oscilloscopeDrawFraction(elapsed, index) {
      const drawMs = Math.max(250, config.oscParallelSpinMs);
      const cycle = Math.max(drawMs, config.oscParallelIntervalMs);
      const local = (((elapsed - index * config.oscStaggerMs) % cycle) + cycle) % cycle;
      return local < drawMs ? standardBezierEase(local / drawMs) : 1;
    }

    function decayOscilloscopeHoverForces(now) {
      const previous = state.oscilloscopeLastFrameAt ?? now;
      const dt = Math.min(0.08, Math.max(0, (now - previous) / 1000));
      state.oscilloscopeHoverForces = config.oscFigures.map((_, index) => {
        const item = oscilloscopeHoverState(index);
        if (item.spin) {
          const progress = clamp((now - item.spin.startedAt) / Math.max(1, item.spin.duration), 0, 1);
          item.offset = item.spin.baseOffset + item.spin.direction * standardBezierEase(progress) * Math.PI * 2 * item.spin.turns;
          item.velocity = 0;
          if (progress >= 1) {
            item.offset = item.spin.baseOffset;
            item.spin = null;
          }
          return item;
        }
        item.velocity += -item.offset * 20 * dt;
        item.velocity *= Math.exp(-10.5 * dt);
        item.offset = clamp(item.offset + item.velocity * dt, -Math.PI * 0.72, Math.PI * 0.72);
        if (Math.abs(item.offset) < 0.0005 && Math.abs(item.velocity) < 0.0005) {
          item.offset = 0;
          item.velocity = 0;
        }
        return item;
      });
    }

    function oscilloscopeHoverState(index) {
      const item = state.oscilloscopeHoverForces[index];
      if (item && typeof item === "object") return item;
      const fallback = { offset: Number(item) || 0, velocity: 0 };
      state.oscilloscopeHoverForces[index] = fallback;
      return fallback;
    }

    function handleOscilloscopePointerMove(event) {
      if (config.effectType !== "oscilloscope" || config.oscMode !== "parallel" || config.oscRefreshMode !== "spin") {
        state.oscilloscopeLastPointerX = event.clientX;
        return;
      }
      const dx = state.oscilloscopeLastPointerX == null ? 0 : event.clientX - state.oscilloscopeLastPointerX;
      state.oscilloscopeLastPointerX = event.clientX;
      if (Math.abs(dx) < 0.5) return;
      const svgPoint = svgPointFromEvent(event);
      const centers = oscilloscopeParallelCenters(config.oscFigures.length);
      const influenceRadius = Math.max(12, config.oscParallelSpacing > 0 ? Math.abs(config.oscParallelSpacing) * 0.75 : config.oscScale * 0.9);
      const direction = Math.sign(dx);
      centers.forEach((center, index) => {
        const distanceFromPointer = Math.hypot(svgPoint.x - center.x, svgPoint.y - center.y);
        const influence = clamp(1 - distanceFromPointer / influenceRadius, 0, 1);
        if (influence <= 0) return;
        const hover = oscilloscopeHoverState(index);
        const normalizedDx = Math.min(18, Math.abs(dx)) / 18;
        const rawTurns = Math.pow(normalizedDx, 1.15) * config.oscSwipeForce * 0.45 * influence;
        if (rawTurns >= 1) {
          hover.spin = {
            startedAt: performance.now(),
            duration: clamp(config.oscParallelSpinMs * Math.min(1.18, 0.82 + rawTurns * 0.12), 420, 2200),
            direction,
            turns: Math.min(2, Math.max(1, Math.round(rawTurns))),
            baseOffset: hover.offset,
          };
          hover.velocity = 0;
        } else {
          hover.velocity = clamp(hover.velocity + direction * rawTurns * 4.4, -4.8, 4.8);
        }
      });
    }

    function particleTargetCount() {
      if (isParticleMatrixMode()) return 1800;
      return clamp(Math.round(340 + config.particleDensity * 1280), 220, 2400);
    }

    function sanitizeParticleColors() {
      const source = Array.isArray(config.particleColors) && config.particleColors.length ? config.particleColors : particleDefaults.particleColors;
      config.particleColors = source.map((item, index) => ({
        id: Number.isFinite(Number(item.id)) ? Number(item.id) : index + 1,
        color: isValidColorString(item.color) ? String(item.color) : "#8F959E",
        ratio: clamp(Number(item.ratio) || 1, 0.05, 5),
      }));
    }

    function ensureParticleDefaultKeyframes() {
      if (Array.isArray(config.particleKeyframes) && config.particleKeyframes.length) return;
      config.particleKeyframes = ["a", "h", "i", "o"].map((label, index) => {
        const imageData = makeParticleTextImage(label);
        return makeParticleFrameFromImageData(imageData, `${label}.png`, index + 1);
      });
    }

    function makeParticleTextImage(text) {
      const size = 360;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `700 ${text === "i" ? 270 : 250}px SF Pro Display, Helvetica Neue, Arial, sans-serif`;
      ctx.fillText(text, size / 2, size / 2 + (text === "i" ? 2 : 8));
      return ctx.getImageData(0, 0, size, size);
    }

    function makeParticleFrameFromImageData(imageData, name, id = Date.now()) {
      return {
        id,
        name,
        width: imageData.width,
        height: imageData.height,
        imageData,
        preview: imageDataToPreviewURL(imageData),
      };
    }

    function imageDataToPreviewURL(imageData) {
      const canvas = document.createElement("canvas");
      canvas.width = imageData.width;
      canvas.height = imageData.height;
      canvas.getContext("2d").putImageData(imageData, 0, 0);
      return canvas.toDataURL("image/png");
    }

    function particleTargetsFromImageData(imageData, seedKey, desiredCount, strengthenEdges = config.particleStrengthenEdges) {
      const field = makeScalarField(imageData, "auto");
      const level = automaticContourLevel(field);
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const candidates = [];
      const foregroundCandidates = [];
      const step = Math.max(1, Math.floor(Math.sqrt(Math.max(1, width * height) / 24000)));
      const inside = (x, y) => x >= 0 && x < width && y >= 0 && y < height && mask[y * width + x];
      const edgeRadius = Math.max(2, step * 4);
      const featherRadius = Math.max(edgeRadius * 2.8, step * 9);
      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          if (!inside(x, y)) continue;
          const edge = isMaskEdgePoint(inside, x, y, edgeRadius);
          const point = { x, y, weight: edge ? 1 : 0.6, edge, halo: false };
          candidates.push(point);
          foregroundCandidates.push(point);
        }
      }
      if (!candidates.length) return fallbackParticleTargets(seedKey, desiredCount);
      const bounds = particleCandidateBounds(foregroundCandidates);
      const haloStep = Math.max(step * 2, 2);
      for (let y = Math.max(0, bounds.minY - featherRadius); y <= Math.min(height - 1, bounds.maxY + featherRadius); y += haloStep) {
        for (let x = Math.max(0, bounds.minX - featherRadius); x <= Math.min(width - 1, bounds.maxX + featherRadius); x += haloStep) {
          if (inside(x, y)) continue;
          const distance = nearestMaskDistance(inside, x, y, featherRadius, step);
          if (!Number.isFinite(distance)) continue;
          const fade = 1 - distance / featherRadius;
          candidates.push({
            x,
            y,
            weight: 0.08 + fade * fade * 0.24,
            edge: false,
            halo: true,
          });
        }
      }
      const normalized = normalizeParticleCandidates(candidates, width, height, foregroundCandidates);
      const rng = seededRandom(`particle-targets|${seedKey}|${desiredCount}|${strengthenEdges}`);
      const haloPoints = normalized.filter((point) => point.halo);
      if (!strengthenEdges) {
        const haloCount = haloPoints.length ? Math.round(desiredCount * 0.08) : 0;
        return [
          ...sampleParticleBucket(normalized.filter((point) => !point.halo), desiredCount - haloCount, rng, 0.52),
          ...sampleParticleBucket(haloPoints, haloCount, rng, 1.35),
        ].sort(() => rng() - 0.5);
      }
      const edgePoints = normalized.filter((point) => point.edge);
      const interiorPoints = normalized.filter((point) => !point.edge && !point.halo);
      if (!edgePoints.length || !interiorPoints.length) return sampleParticleBucket(normalized, desiredCount, rng, 0.48);
      const haloCount = haloPoints.length ? Math.round(desiredCount * 0.12) : 0;
      const edgeCount = clamp(Math.round(desiredCount * 0.44), 0, desiredCount - haloCount);
      const interiorCount = Math.max(0, desiredCount - edgeCount - haloCount);
      return [
        ...sampleParticleBucket(edgePoints, edgeCount, rng, 0.18),
        ...sampleParticleBucket(interiorPoints, interiorCount, rng, 0.68),
        ...sampleParticleBucket(haloPoints, haloCount, rng, 1.45),
      ].sort(() => rng() - 0.5);
    }

    function particleCandidateBounds(candidates) {
      return candidates.reduce((acc, point) => ({
        minX: Math.min(acc.minX, point.x),
        minY: Math.min(acc.minY, point.y),
        maxX: Math.max(acc.maxX, point.x),
        maxY: Math.max(acc.maxY, point.y),
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
    }

    function nearestMaskDistance(inside, x, y, maxRadius, step) {
      const ringStep = Math.max(1, step);
      for (let radius = ringStep; radius <= maxRadius; radius += ringStep) {
        for (let dy = -radius; dy <= radius; dy += ringStep) {
          if (inside(x - radius, y + dy) || inside(x + radius, y + dy)) return radius;
        }
        for (let dx = -radius + ringStep; dx <= radius - ringStep; dx += ringStep) {
          if (inside(x + dx, y - radius) || inside(x + dx, y + radius)) return radius;
        }
      }
      return Infinity;
    }

    function isMaskEdgePoint(inside, x, y, radius) {
      const offsets = [
        [-radius, 0], [radius, 0], [0, -radius], [0, radius],
        [-radius, -radius], [radius, -radius], [-radius, radius], [radius, radius],
      ];
      return offsets.some(([dx, dy]) => !inside(x + dx, y + dy));
    }

    function sampleParticleBucket(points, count, rng, jitter) {
      if (!points.length || count <= 0) return [];
      const ordered = points
        .map((point) => ({ point, key: rng() / Math.max(0.001, point.weight ?? 1) }))
        .sort((a, b) => a.key - b.key)
        .map((item) => item.point);
      const sampled = [];
      for (let index = 0; index < count; index += 1) {
        const base = ordered[index % ordered.length];
        const wrap = Math.floor(index / ordered.length);
        const spread = jitter * (wrap > 0 ? 1 + Math.min(3, wrap) * 0.18 : 1);
        sampled.push({
          x: clamp(base.x + (rng() - 0.5) * spread, 5, 95),
          y: clamp(base.y + (rng() - 0.5) * spread, 5, 95),
          edge: Boolean(base.edge),
          halo: Boolean(base.halo),
          weight: base.weight,
        });
      }
      return sampled;
    }

    function normalizeParticleCandidates(candidates, width, height, boundsSource = candidates) {
      const bounds = particleCandidateBounds(boundsSource);
      const sourceW = Math.max(1, bounds.maxX - bounds.minX || width);
      const sourceH = Math.max(1, bounds.maxY - bounds.minY || height);
      const scale = 82 / Math.max(sourceW, sourceH);
      const offsetX = 50 - ((bounds.minX + bounds.maxX) / 2) * scale;
      const offsetY = 50 - ((bounds.minY + bounds.maxY) / 2) * scale;
      return candidates.map((point) => ({
        x: point.x * scale + offsetX,
        y: point.y * scale + offsetY,
        edge: point.edge,
        halo: point.halo,
        weight: point.weight,
      }));
    }

    function particleSquareFrameFromImageData(imageData) {
      const field = makeScalarField(imageData, "auto");
      const level = automaticContourLevel(field);
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const candidates = [];
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (mask[y * width + x]) candidates.push({ x, y });
        }
      }
      if (!candidates.length) return null;
      const bounds = particleCandidateBounds(candidates);
      const sourceW = Math.max(1, bounds.maxX - bounds.minX || width);
      const sourceH = Math.max(1, bounds.maxY - bounds.minY || height);
      const scale = 82 / Math.max(sourceW, sourceH);
      return {
        mask,
        width,
        height,
        scale,
        offsetX: 50 - ((bounds.minX + bounds.maxX) / 2) * scale,
        offsetY: 50 - ((bounds.minY + bounds.maxY) / 2) * scale,
      };
    }

    function particleSquareFrameLit(point, frame, cellPercent) {
      if (!frame) return 0;
      const sourceX = (point.x - frame.offsetX) / frame.scale;
      const sourceY = (point.y - frame.offsetY) / frame.scale;
      if (sourceX < 0 || sourceY < 0 || sourceX >= frame.width || sourceY >= frame.height) return 0;
      const radius = Math.max(0.75, (cellPercent / Math.max(0.001, frame.scale)) * 0.58);
      const minX = Math.max(0, Math.floor(sourceX - radius));
      const maxX = Math.min(frame.width - 1, Math.ceil(sourceX + radius));
      const minY = Math.max(0, Math.floor(sourceY - radius));
      const maxY = Math.min(frame.height - 1, Math.ceil(sourceY + radius));
      const step = Math.max(1, Math.floor(radius / 2));
      for (let y = minY; y <= maxY; y += step) {
        for (let x = minX; x <= maxX; x += step) {
          if (frame.mask[y * frame.width + x]) return 1;
        }
      }
      return frame.mask[Math.round(sourceY) * frame.width + Math.round(sourceX)] ? 1 : 0;
    }

    function encodeParticleSquareFrame(frame) {
      if (!frame) return null;
      const runs = [];
      let index = 0;
      while (index < frame.mask.length) {
        while (index < frame.mask.length && !frame.mask[index]) index += 1;
        if (index >= frame.mask.length) break;
        const start = index;
        while (index < frame.mask.length && frame.mask[index]) index += 1;
        runs.push([start, index - start]);
      }
      return {
        width: frame.width,
        height: frame.height,
        scale: Number(frame.scale.toFixed(6)),
        offsetX: Number(frame.offsetX.toFixed(6)),
        offsetY: Number(frame.offsetY.toFixed(6)),
        runs,
      };
    }

    function fallbackParticleTargets(seedKey, desiredCount) {
      const rng = seededRandom(`particle-fallback|${seedKey}`);
      return Array.from({ length: desiredCount }, (_, index) => {
        const t = (index / desiredCount) * Math.PI * 2;
        const r = 23 + Math.sin(t * 3) * 5 + (rng() - 0.5) * 3;
        return { x: 50 + Math.cos(t) * r, y: 50 + Math.sin(t) * r, edge: true, weight: 1 };
      });
    }

    function prepareParticleEffect() {
      hideLineEditHandles();
      if (state.particleSystem.prepareTimer) {
        clearTimeout(state.particleSystem.prepareTimer);
        state.particleSystem.prepareTimer = null;
      }
      ensureParticleDefaultKeyframes();
      sanitizeParticleColors();
      const desired = particleTargetCount();
      state.particleTargets = config.particleKeyframes.map((frame, index) => (
        particleTargetsFromImageData(frame.imageData, `${frame.id}|${frame.name}|${index}`, desired)
      ));
      state.particleSquareFrames = config.particleKeyframes.map((frame) => particleSquareFrameFromImageData(frame.imageData));
      ensureParticleSystem(desired);
      state.particleSystem.squareCache = { key: "", states: [] };
      state.particleSystem.lastFrameAt = null;
    }

    function refreshParticleColors() {
      sanitizeParticleColors();
      ensureParticleSystem(state.particleSystem.particles.length || particleTargetCount());
    }

    function scheduleParticlePrepare(delay = 160) {
      if (state.particleSystem.prepareTimer) clearTimeout(state.particleSystem.prepareTimer);
      state.particleSystem.prepareTimer = setTimeout(() => {
        state.particleSystem.prepareTimer = null;
        prepareParticleEffect();
        updateMeta();
        updateFormulaAndCode();
      }, delay);
    }

    function ensureParticleSystem(count) {
      const system = state.particleSystem;
      const rng = seededRandom(`particle-system|${count}|${config.particleColors.map((item) => `${item.color}:${item.ratio}`).join("|")}`);
      while (system.particles.length < count) {
        system.particles.push(makeParticle(system.particles.length, rng));
      }
      if (system.particles.length > count) system.particles.length = count;
      system.particles.forEach((particle, index) => {
        particle.color = particleColorForIndex(index);
        particle.char = particleCharForIndex(index);
        particle.sizeJitter = 0.72 + seededRandom(`particle-size|${index}`)() * 0.7;
        particle.weightJitter = Math.round(420 + seededRandom(`particle-weight|${index}`)() * 380);
        if (!Number.isFinite(particle.ox)) particle.ox = 0;
        if (!Number.isFinite(particle.oy)) particle.oy = 0;
        if (!Number.isFinite(particle.hoverX)) particle.hoverX = 0;
        if (!Number.isFinite(particle.hoverY)) particle.hoverY = 0;
        if (!Number.isFinite(particle.ringJitter)) particle.ringJitter = seededRandom(`particle-ring|${index}`)() * 2 - 1;
        if (!Number.isFinite(particle.hoverScale)) particle.hoverScale = 1;
      });
    }

    function makeParticle(index, rng) {
      const angle = rng() * Math.PI * 2;
      const radius = 18 + rng() * 18;
      return {
        x: 50 + Math.cos(angle) * radius,
        y: 50 + Math.sin(angle) * radius,
        vx: 0,
        vy: 0,
        ox: 0,
        oy: 0,
        hoverX: 0,
        hoverY: 0,
        color: particleColorForIndex(index),
        char: particleCharForIndex(index),
        seed: rng() * 1000,
        sizeJitter: 0.75 + rng() * 0.6,
        weightJitter: Math.round(420 + rng() * 380),
        ringJitter: rng() * 2 - 1,
        hoverScale: 1,
      };
    }

    function particleColorForIndex(index) {
      sanitizeParticleColors();
      const total = config.particleColors.reduce((sum, item) => sum + item.ratio, 0) || 1;
      const roll = seededRandom(`particle-color|${index}`)() * total;
      let cursor = 0;
      for (const item of config.particleColors) {
        cursor += item.ratio;
        if (roll <= cursor) return item.color;
      }
      return config.particleColors[config.particleColors.length - 1]?.color ?? "#8F959E";
    }

    function particleCharForIndex(index) {
      const chars = [".", "*", "+", "#", "@"]; 
      return chars[Math.floor(seededRandom(`particle-char|${index}`)() * chars.length) % chars.length];
    }

    function showParticleCanvas() {
      particleCanvas.style.display = "block";
      motionSvg.style.display = "none";
    }

    function hideParticleCanvas() {
      if (particleCanvas) particleCanvas.style.display = "none";
      motionSvg.style.display = "";
      state.particleSystem.pointer.active = false;
    }

    function resizeParticleCanvas() {
      const rect = particleCanvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(rect.width * ratio));
      const height = Math.max(1, Math.round(rect.height * ratio));
      if (particleCanvas.width !== width || particleCanvas.height !== height) {
        particleCanvas.width = width;
        particleCanvas.height = height;
      }
      const size = Math.min(width, height) * 0.72;
      state.particleSystem.viewport = {
        x: (width - size) / 2,
        y: (height - size) / 2,
        size,
        width,
        height,
      };
    }

    function particleToCanvas(point) {
      const viewport = state.particleSystem.viewport;
      return {
        x: viewport.x + (point.x / 100) * viewport.size,
        y: viewport.y + (point.y / 100) * viewport.size,
      };
    }

    function canvasToParticlePoint(event) {
      const rect = particleCanvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      const px = (event.clientX - rect.left) * ratio;
      const py = (event.clientY - rect.top) * ratio;
      const viewport = state.particleSystem.viewport;
      return {
        x: ((px - viewport.x) / Math.max(1, viewport.size)) * 100,
        y: ((py - viewport.y) / Math.max(1, viewport.size)) * 100,
      };
    }

    function particleFrameMix(now) {
      const frames = state.particleTargets.filter((targets) => targets.length);
      if (!frames.length) return { current: [], next: [], progress: 0, index: 0 };
      const requestedInterval = Math.max(0, config.particleFrameIntervalMs);
      const transitionBase = Math.max(100, config.particleTransitionMs);
      const interval = requestedInterval <= 0 ? transitionBase : requestedInterval;
      const transition = requestedInterval <= 0 ? transitionBase : Math.min(transitionBase, interval);
      const hold = requestedInterval <= 0 ? 0 : Math.max(0, interval - transition);
      const elapsed = Number.isFinite(state.startedAt) ? now - state.startedAt : 0;
      const cycle = frames.length * interval;
      const local = ((elapsed % cycle) + cycle) % cycle;
      const index = Math.min(frames.length - 1, Math.floor(local / interval));
      const frameLocal = local % interval;
      const progress = frameLocal < hold ? 0 : standardBezierEase((frameLocal - hold) / transition);
      return {
        current: frames[index],
        next: frames[(index + 1) % frames.length],
        progress,
        index,
      };
    }

    function particleSquarePixelSize(ratio = window.devicePixelRatio || 1) {
      return Math.max(1.25, config.particleSize * 4.4 * ratio);
    }

    function particleSquareGridSpec() {
      const viewport = state.particleSystem.viewport;
      const ratio = window.devicePixelRatio || 1;
      const sidePx = particleSquarePixelSize(ratio);
      const stepPercent = (sidePx * 1.1 / Math.max(1, viewport.size)) * 100;
      const columns = Math.max(2, Math.floor(100 / Math.max(0.1, stepPercent)) + 1);
      const rows = Math.max(2, Math.floor(100 / Math.max(0.1, stepPercent)) + 1);
      const startX = 50 - ((columns - 1) * stepPercent) / 2;
      const startY = 50 - ((rows - 1) * stepPercent) / 2;
      return { columns, rows, count: columns * rows, stepPercent, sidePx, startX, startY };
    }

    function particleGridPoint(index, spec) {
      const column = index % spec.columns;
      const row = Math.floor(index / spec.columns);
      return {
        x: spec.startX + column * spec.stepPercent,
        y: spec.startY + row * spec.stepPercent,
      };
    }

    function nearestParticleTargetDistance(point, targets) {
      let best = Infinity;
      const step = Math.max(1, Math.floor(targets.length / 420));
      for (let index = 0; index < targets.length; index += step) {
        const target = targets[index];
        const dx = point.x - target.x;
        const dy = point.y - target.y;
        const dist = dx * dx + dy * dy;
        if (dist < best) best = dist;
      }
      return Math.sqrt(best);
    }

    function particleSquareCoverage(distance, stepPercent) {
      const threshold = Math.max(1.25, stepPercent * 1.55);
      return distance <= threshold ? 1 : 0;
    }

    function getParticleSquareGridStates(mix) {
      const system = state.particleSystem;
      const spec = particleSquareGridSpec();
      const key = `${mix.index}|${state.particleSquareFrames.length}|${spec.columns}|${spec.rows}|${spec.stepPercent.toFixed(4)}|${config.particleSize}`;
      if (system.squareCache?.key === key) return system.squareCache.states;
      const currentFrame = state.particleSquareFrames[mix.index] ?? null;
      const nextFrame = state.particleSquareFrames[(mix.index + 1) % Math.max(1, state.particleSquareFrames.length)] ?? currentFrame;
      const states = Array.from({ length: spec.count }, (_, index) => {
        const point = particleGridPoint(index, spec);
        const currentAlpha = particleSquareFrameLit(point, currentFrame, spec.stepPercent);
        const nextAlpha = particleSquareFrameLit(point, nextFrame, spec.stepPercent);
        return {
          x: point.x,
          y: point.y,
          sidePx: spec.sidePx,
          currentAlpha,
          nextAlpha,
          currentEdge: currentAlpha > 0.72,
          nextEdge: nextAlpha > 0.72,
        };
      });
      system.squareCache = { key, states };
      return states;
    }

    function particleSquareGridState(index, mix, now, states) {
      const cached = states[index] ?? { x: 50, y: 50, currentAlpha: 0, nextAlpha: 0, currentEdge: false, nextEdge: false };
      const progress = clamp(mix.progress, 0, 1);
      const currentLit = cached.currentAlpha > 0.5 ? 1 : 0;
      const nextLit = cached.nextAlpha > 0.5 ? 1 : 0;
      const changed = currentLit !== nextLit;
      if (config.particleSquareMotion === "scan") {
        const diagonalOrder = clamp((cached.x + cached.y) / 200, 0, 1);
        const localJitter = ((Math.sin(index * 19.191 + mix.index * 31.733) * 43758.5453) % 1 + 1) % 1;
        const fadeDuration = 0.3;
        const offLead = 0.035;
        const sweepAt = clamp(diagonalOrder * 0.68 + localJitter * 0.02, 0, 1 - fadeDuration);
        let alpha = currentLit;
        if (progress >= 1) alpha = nextLit;
        else if (progress > 0 && progress >= sweepAt && progress < sweepAt + offLead) alpha = 0;
        else if (progress >= sweepAt + offLead) {
          const fadeProgress = clamp((progress - sweepAt - offLead) / fadeDuration, 0, 1);
          alpha = nextLit ? 1 : 1 - fadeProgress;
        }
        return {
          x: cached.x,
          y: cached.y,
          sidePx: cached.sidePx,
          alpha: clamp(alpha, 0, 1),
          scanFlash: 0,
          edge: alpha ? cached.nextEdge : cached.currentEdge,
          halo: false,
        };
      }
      const delay = ((Math.sin(index * 12.9898 + mix.index * 78.233) * 43758.5453) % 1 + 1) % 1;
      const contact = clamp((progress - delay * 0.56) / 0.3, 0, 1);
      let alpha = progress <= 0 ? currentLit : nextLit;
      if (changed && progress > 0 && progress < 1 && contact > 0 && contact < 1) {
        const spark = Math.sin(contact * Math.PI * 5 + delay * 12 + index * 0.21);
        alpha = spark > 0.08 + contact * 0.18 ? nextLit : currentLit;
      } else if (changed && progress < delay * 0.56) {
        alpha = currentLit;
      }
      return {
        x: cached.x,
        y: cached.y,
        sidePx: cached.sidePx,
        alpha: clamp(alpha, 0, 1),
        scanFlash: 0,
        edge: cached.nextAlpha > cached.currentAlpha ? cached.nextEdge : cached.currentEdge,
        halo: false,
      };
    }

    function particleTransitionPoint(a, b, index, mix, now) {
      const progress = particleLocalProgress(mix.progress, index, mix.index);
      if (progress <= 0) return particleIdlePoint(a, index, now);
      const cluster = particleScatterPoint(a, b, index, mix.index, now);
      const clusterInEnd = 0.46;
      const clusterOutStart = 0.58;
      if (progress < clusterInEnd) {
        const t = easeInBack(progress / clusterInEnd);
        return lerpPoint(particleIdlePoint(a, index, now), cluster, t);
      }
      if (progress < clusterOutStart) {
        const drift = (1 - clamp(config.particleStability, 0, 1)) * 1.2 + 0.55;
        return {
          x: clamp(cluster.x + Math.sin(now * 0.0032 + index * 0.31) * drift, 3, 97),
          y: clamp(cluster.y + Math.cos(now * 0.0027 + index * 0.23) * drift, 3, 97),
        };
      }
      const t = easeOutBack((progress - clusterOutStart) / (1 - clusterOutStart));
      return lerpPoint(cluster, particleIdlePoint(b, index, now), t);
    }

    function particleLocalProgress(progress, index, segmentIndex) {
      const p = clamp(progress, 0, 1);
      if (p <= 0 || p >= 1) return p;
      const rng = seededRandom(`particle-progress|${segmentIndex}|${index}`);
      const window = Math.sin(Math.PI * p);
      const delay = (rng() - 0.5) * 0.18 * window;
      const wave = Math.sin(p * Math.PI * 2 + index * 0.39 + segmentIndex * 1.17) * 0.07 * window;
      return clamp(p + delay + wave, 0, 1);
    }

    function particleFlowOffset(point, index, mix, now) {
      const stability = clamp(config.particleStability, 0, 1);
      const transitionEnergy = mix.progress > 0 ? Math.sin(Math.PI * clamp(mix.progress, 0, 1)) : 0.18;
      const clusterDamping = 1 - transitionEnergy * 0.34;
      const amplitude = (0.55 + (1 - stability) * 1.85) * (0.65 + transitionEnergy * 0.85) * clusterDamping;
      const phase = now * 0.0022 + index * 0.41 + point.y * 0.08;
      const crossPhase = now * 0.0016 + index * 0.29 + point.x * 0.065;
      return {
        x: Math.sin(phase) * amplitude + Math.sin(crossPhase * 0.73) * amplitude * 0.32,
        y: Math.cos(crossPhase) * amplitude * 0.86 + Math.sin(phase * 0.61) * amplitude * 0.28,
      };
    }

    function particleIdlePoint(point, index, now) {
      const drift = (1 - clamp(config.particleStability, 0, 1)) * 1.35;
      if (drift <= 0.001) return point;
      const seed = index * 0.017;
      return {
        x: point.x + Math.sin(now * 0.0015 + seed * 91.7) * drift,
        y: point.y + Math.cos(now * 0.0012 + seed * 63.1) * drift,
      };
    }

    function updateParticleVirtualPointer(system, dt) {
      if (!system.virtualPointer) system.virtualPointer = { x: system.pointer.x, y: system.pointer.y };
      if (!system.pointer.active) return;
      const smooth = 1 - Math.pow(0.94, dt * 60);
      system.virtualPointer.x += (system.pointer.x - system.virtualPointer.x) * smooth;
      system.virtualPointer.y += (system.pointer.y - system.virtualPointer.y) * smooth;
    }

    function particleAntigravityPoint(base, particle, index, system, now, dt) {
      let targetX = 0;
      let targetY = 0;
      let influence = 0;
      particle.hoverScale = 1;
      const pointer = system.virtualPointer ?? system.pointer;
      if (system.pointer.active) {
        const dx = base.x - pointer.x;
        const dy = base.y - pointer.y;
        const dist = Math.hypot(dx, dy);
        const magnetRadius = 38;
        if (dist < magnetRadius) {
          const rawInfluence = 1 - dist / magnetRadius;
          influence = rawInfluence * rawInfluence * (3 - 2 * rawInfluence) * 0.34;
          const baseAngle = dist > 0.001 ? Math.atan2(dy, dx) : particle.seed;
          const angle = baseAngle + Math.sin(now * 0.00042 + index * 0.017) * 0.05;
          const force = clamp(config.particleMouseForce, 0, 3);
          const displacement = (2.05 + Math.sin(now * 0.003 + particle.seed * 0.21) * 0.22 + particle.ringJitter * 0.18) * influence * force;
          targetX = Math.cos(angle) * displacement;
          targetY = Math.sin(angle) * displacement;
          particle.hoverScale = 1 + influence * (0.04 + Math.sin(now * 0.005 + particle.seed) * 0.012);
        }
      }
      const rate = system.pointer.active ? 18 : 4.2;
      const ease = 1 - Math.exp(-rate * dt);
      particle.hoverX += (targetX - particle.hoverX) * ease;
      particle.hoverY += (targetY - particle.hoverY) * ease;
      return {
        x: clamp(base.x + particle.hoverX, 2, 98),
        y: clamp(base.y + particle.hoverY, 2, 98),
      };
    }

    function particleScatterPoint(a, b, index, segmentIndex, now) {
      const rng = seededRandom(`particle-scatter|${segmentIndex}|${index}`);
      const center = {
        x: 50 + Math.sin(segmentIndex * 1.91) * 2.2,
        y: 50 + Math.cos(segmentIndex * 1.37) * 2.2,
      };
      const direction = rng() < 0.5 ? -1 : 1;
      const angle = rng() * Math.PI * 2 + now * 0.0008 * direction;
      const stability = clamp(config.particleStability, 0, 1);
      const radius = 1.4 + Math.pow(rng(), 0.62) * (7.8 + (1 - stability) * 4.2);
      const ring = (a.edge || b.edge) ? 0.86 : 1;
      return {
        x: clamp(center.x + Math.cos(angle) * radius * ring, 34, 66),
        y: clamp(center.y + Math.sin(angle) * radius * ring, 34, 66),
      };
    }

    function easeOutCubic(value) {
      const t = clamp(value, 0, 1);
      return 1 - (1 - t) ** 3;
    }

    function easeInBack(value) {
      const t = clamp(value, 0, 1);
      const c1 = 1.16;
      const c3 = c1 + 1;
      return c3 * t * t * t - c1 * t * t;
    }

    function easeOutBack(value) {
      const t = clamp(value, 0, 1) - 1;
      const c1 = 1.16;
      const c3 = c1 + 1;
      return 1 + c3 * t * t * t + c1 * t * t;
    }

    function renderParticleEffect(now) {
      hideParticles();
      hideLineGroup();
      hideSineGroup();
      hideOscilloscopeGroup();
      hideLineEditHandles();
      motionPath.setAttribute("opacity", "0");
      showParticleCanvas();
      resizeParticleCanvas();
      const ctx = particleCanvas.getContext("2d");
      const system = state.particleSystem;
      const previous = system.lastFrameAt ?? now;
      const dt = Math.min(0.05, Math.max(0.001, (now - previous) / 1000));
      system.lastFrameAt = now;
      const mix = particleFrameMix(now);
      ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      updateParticleVirtualPointer(system, dt);
      const squareStates = isParticleMatrixMode() ? getParticleSquareGridStates(mix) : null;
      if (squareStates && system.particles.length < squareStates.length) ensureParticleSystem(squareStates.length);
      const count = squareStates ? squareStates.length : system.particles.length;
      for (let index = 0; index < count; index += 1) {
        const particle = system.particles[index];
        if (squareStates) {
          const square = particleSquareGridState(index, mix, now, squareStates);
          particle.x = square.x;
          particle.y = square.y;
          particle.edge = square.edge;
          particle.halo = false;
          particle.alpha = square.alpha;
          particle.scanFlash = square.scanFlash || 0;
          particle.squareSize = square.sidePx;
          particle.hoverScale = 1;
          drawParticle(ctx, particle);
          continue;
        }
        const a = mix.current[index % Math.max(1, mix.current.length)] ?? { x: 50, y: 50 };
        const b = mix.next[index % Math.max(1, mix.next.length)] ?? a;
        particle.edge = Boolean(config.particleStrengthenEdges && (a.edge || b.edge));
        particle.halo = Boolean(a.halo || b.halo);
        particle.alpha = null;
        particle.scanFlash = 0;
        const pathPoint = particleTransitionPoint(a, b, index, mix, now);
        const flow = particleFlowOffset(pathPoint, index, mix, now);
        const base = {
          x: clamp(pathPoint.x + flow.x, 3, 97),
          y: clamp(pathPoint.y + flow.y, 3, 97),
        };
        const antigravity = particleAntigravityPoint(base, particle, index, system, now, dt);
        particle.x = antigravity.x;
        particle.y = antigravity.y;
        drawParticle(ctx, particle);
      }
      if (now - (system.lastDebugAt || 0) > 250) {
        system.lastDebugAt = now;
        window.__motionDebug.particleCount = count;
        window.__motionDebug.particleFrameCount = config.particleKeyframes.length;
        window.__motionDebug.particleEdgeCount = mix.current.filter((point) => point.edge).length;
        window.__motionDebug.particleInteriorCount = mix.current.filter((point) => !point.edge && !point.halo).length;
        window.__motionDebug.particleHaloCount = mix.current.filter((point) => point.halo).length;
        window.__motionDebug.particleInteriorDensityRatio = particleInteriorDensityRatio(mix.current);
      }
    }

    function particleInteriorDensityRatio(points) {
      const edgeUnique = new Set();
      const interiorUnique = new Set();
      points.forEach((point) => {
        const key = `${Math.round(point.x * 2)},${Math.round(point.y * 2)}`;
        if (point.edge) edgeUnique.add(key);
        else if (!point.halo) interiorUnique.add(key);
      });
      const edgeCount = points.filter((point) => point.edge).length;
      const interiorCount = points.filter((point) => !point.edge && !point.halo).length;
      const edgeDensity = edgeCount / Math.max(1, edgeUnique.size);
      const interiorDensity = interiorCount / Math.max(1, interiorUnique.size);
      return interiorDensity / Math.max(0.001, edgeDensity);
    }

    function drawParticle(ctx, particle) {
      const point = particleToCanvas(particle);
      const ratio = window.devicePixelRatio || 1;
      const sizeBoost = particle.edge ? 1.1 : 0.96;
      const size = Math.max(0.55, config.particleSize * particle.sizeJitter * sizeBoost * (particle.hoverScale || 1)) * ratio;
      ctx.globalAlpha = particle.alpha ?? (particle.halo ? 0.34 : (particle.edge ? 0.96 : 0.78));
      ctx.fillStyle = particle.color;
      if (isParticleMatrixMode()) {
        const litAlpha = clamp(particle.alpha ?? 0, 0, 1);
        const scanFlash = clamp(particle.scanFlash ?? 0, 0, 1);
        const squareSize = particle.squareSize ?? particleSquarePixelSize(ratio);
        const drawMatrixCell = (alpha, color) => {
          ctx.globalAlpha = alpha;
          ctx.fillStyle = color;
          if (isParticleAsciiMode()) {
            ctx.font = `${particle.weightJitter || 650} ${Math.max(7, squareSize * 0.92)}px ui-monospace, SFMono-Regular, Menlo, monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const chars = [".", "*", "+", "#", "@"];
            const charTick = Math.floor(performance.now() / (420 + (particle.seed % 260)));
            const char = chars[(charTick + Math.floor(particle.seed + particle.x * 0.31 + particle.y * 0.17)) % chars.length];
            ctx.fillText(char, point.x, point.y);
          } else {
            ctx.fillRect(point.x - squareSize / 2, point.y - squareSize / 2, squareSize, squareSize);
          }
        };
        drawMatrixCell(clamp(config.particleSquareOffOpacity, 0, 1), config.particleSquareOffColor);
        const onAlpha = Math.max(litAlpha * clamp(config.particleSquareOnOpacity, 0, 1), scanFlash * clamp(config.particleSquareOnOpacity, 0, 1) * 0.72);
        if (onAlpha > 0.015) {
          drawMatrixCell(onAlpha, config.particleSquareOnColor);
        }
      } else if (isParticleAsciiMode()) {
        ctx.globalAlpha = 0.94;
        ctx.font = `${particle.weightJitter || 650} ${Math.max(8, size * 5.2)}px ui-monospace, SFMono-Regular, Menlo, monospace`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const chars = [".", "*", "+", "#", "@"];
        const charTick = Math.floor(performance.now() / (420 + (particle.seed % 260)));
        const char = chars[(charTick + Math.floor(particle.seed + particle.x * 0.31 + particle.y * 0.17)) % chars.length];
        ctx.fillText(char, point.x, point.y);
      } else {
        ctx.beginPath();
        ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function prepareMorphEffect() {
      hideLineEditHandles();
      ensureParticleDefaultKeyframes();
      state.morphSystem.targets = config.particleKeyframes.map((frame, index) => (
        morphShapesFromImageData(frame.imageData, `morph|${frame.id}|${frame.name}|${index}`)
      ));
      state.morphSystem.lastFrameAt = null;
      state.morphSystem.fusionCanvases = null;
    }

    function morphShapePointCount() {
      return clamp(Math.round(config.morphShapeDetail || 48), 16, 96);
    }

    function morphShapesFromImageData(imageData, seedKey) {
      const field = makeScalarField(imageData, "auto");
      const level = automaticContourLevel(field);
      const { mask, width, height } = foregroundMaskFromField(field, level);
      const components = connectedComponents(mask, width, height);
      const largest = components[0]?.length ?? 0;
      const minArea = Math.max(18, Math.min(largest * 0.035, width * height * 0.006));
      const selected = components
        .filter((component) => component.length >= minArea)
        .slice(0, 10);
      if (!selected.length) return fallbackMorphShapes(seedKey);
      const rawContours = selected
        .map((component) => contourPathFromComponentMask(maskFromComponent(component, mask.length), width, height))
        .filter((path) => path.length >= 4);
      if (!rawContours.length) return fallbackMorphShapes(seedKey);
      const normalized = normalizeContours(rawContours);
      const shapes = normalized
        .map((contour, index) => makeMorphShape(contour, `${seedKey}|${index}`))
        .filter((shape) => shape.points.length >= 8)
        .sort((a, b) => a.center.x - b.center.x || a.center.y - b.center.y || b.area - a.area);
      return filterNestedMorphShapes(shapes);
    }

    function makeMorphShape(contour, seedKey) {
      const simplified = simplifyToPointCount(contour, morphShapePointCount());
      const points = orientMorphPoints(smoothMorphContour(resampleSmoothClosed(simplified, morphShapePointCount())));
      const center = morphCentroid(points);
      return {
        points,
        center,
        area: Math.abs(polygonArea(points)),
        seed: seededRandom(seedKey)(),
      };
    }

    function smoothMorphContour(points) {
      let smoothed = points.slice();
      for (let pass = 0; pass < 2; pass += 1) {
        const next = [];
        for (let index = 0; index < smoothed.length; index += 1) {
          const current = smoothed[index];
          const following = smoothed[(index + 1) % smoothed.length];
          next.push({
            x: current.x * 0.76 + following.x * 0.24,
            y: current.y * 0.76 + following.y * 0.24,
          });
          next.push({
            x: current.x * 0.24 + following.x * 0.76,
            y: current.y * 0.24 + following.y * 0.76,
          });
        }
        smoothed = resampleClosed(next, morphShapePointCount());
      }
      return smoothed;
    }

    function filterNestedMorphShapes(shapes) {
      return shapes.filter((shape, index) => {
        const container = shapes.find((other, otherIndex) => (
          otherIndex !== index &&
          other.area > shape.area * 2.8 &&
          pointInPolygon(shape.center, other.points)
        ));
        return !container;
      });
    }

    function pointInPolygon(point, polygon) {
      let inside = false;
      for (let index = 0, prev = polygon.length - 1; index < polygon.length; prev = index, index += 1) {
        const a = polygon[index];
        const b = polygon[prev];
        const denom = Math.abs(b.y - a.y) < 0.000001 ? 0.000001 : b.y - a.y;
        const intersects = ((a.y > point.y) !== (b.y > point.y)) &&
          (point.x < ((b.x - a.x) * (point.y - a.y)) / denom + a.x);
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function fallbackMorphShapes(seedKey) {
      const rng = seededRandom(`morph-fallback|${seedKey}`);
      return [0, 1, 2].map((_, index) => {
        const center = {
          x: 50 + (index - 1) * 18,
          y: 50 + Math.sin(index * 1.7) * 8,
        };
        const radius = 8 + rng() * 6;
        const points = Array.from({ length: morphShapePointCount() }, (__, pointIndex) => {
          const t = (pointIndex / morphShapePointCount()) * Math.PI * 2;
          const wobble = 1 + Math.sin(t * 3 + index) * 0.16;
          return {
            x: center.x + Math.cos(t) * radius * wobble,
            y: center.y + Math.sin(t) * radius * wobble,
          };
        });
        return { points, center, area: Math.abs(polygonArea(points)), seed: rng() };
      });
    }

    function morphCentroid(points) {
      if (!points.length) return { x: 50, y: 50 };
      const sum = points.reduce((acc, point) => ({ x: acc.x + point.x, y: acc.y + point.y }), { x: 0, y: 0 });
      return { x: sum.x / points.length, y: sum.y / points.length };
    }

    function polygonArea(points) {
      let area = 0;
      for (let index = 0; index < points.length; index += 1) {
        const a = points[index];
        const b = points[(index + 1) % points.length];
        area += a.x * b.y - b.x * a.y;
      }
      return area / 2;
    }

    function orientMorphPoints(points) {
      const oriented = polygonArea(points) < 0 ? points.slice().reverse() : points.slice();
      const center = morphCentroid(oriented);
      let startIndex = 0;
      let best = Infinity;
      oriented.forEach((point, index) => {
        const angle = Math.atan2(point.y - center.y, point.x - center.x);
        const score = Math.abs(angle + Math.PI / 2) + Math.abs(point.x - center.x) * 0.001;
        if (score < best) {
          best = score;
          startIndex = index;
        }
      });
      return oriented.slice(startIndex).concat(oriented.slice(0, startIndex));
    }

    function alignMorphPoints(from, to) {
      if (from.length !== to.length || from.length < 2) return to;
      let bestShift = 0;
      let bestScore = Infinity;
      for (let shift = 0; shift < to.length; shift += 1) {
        let score = 0;
        for (let index = 0; index < from.length; index += 1) {
          score += distance(from[index], to[(index + shift) % to.length]);
        }
        if (score < bestScore) {
          bestScore = score;
          bestShift = shift;
        }
      }
      return to.slice(bestShift).concat(to.slice(0, bestShift));
    }

    function morphFrameShapeCount(frames) {
      return Math.max(1, ...frames.map((frame) => frame.length));
    }

    function morphTransitionPairs(current, next, segmentIndex) {
      const count = morphFrameShapeCount([current, next]);
      if (!next.length) return Array.from({ length: count }, (_, index) => ({ currentIndex: index, nextIndex: null }));
      const permutation = morphPermutation(next.length, segmentIndex);
      return Array.from({ length: count }, (_, index) => ({
        currentIndex: index < current.length ? index : null,
        nextIndex: permutation[index % permutation.length],
      }));
    }

    function morphPermutation(count, segmentIndex) {
      const indices = Array.from({ length: count }, (_, index) => index);
      if (count <= 1) return indices;
      if (!config.morphPairSeed) return indices.slice().reverse();
      const rng = seededRandom(`morph-pair|${config.morphPairSeed}|${segmentIndex}|${count}`);
      for (let index = indices.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(rng() * (index + 1));
        [indices[index], indices[swapIndex]] = [indices[swapIndex], indices[index]];
      }
      return indices;
    }

    function morphShapeAt(frame, index, counterpart = null) {
      if (!frame.length) return fallbackMorphShapes("empty")[0];
      if (frame[index]) return frame[index];
      const source = nearestMorphSource(frame, counterpart?.center) ?? frame[index % frame.length];
      const basis = counterpart ?? source;
      const attach = nearestMorphPoint(source.points, basis.center);
      const splitScale = 0.018;
      return {
        ...basis,
        points: basis.points.map((point) => ({ x: attach.x + (point.x - basis.center.x) * splitScale, y: attach.y + (point.y - basis.center.y) * splitScale })),
        center: attach,
        area: 0,
        phantom: true,
      };
    }

    function nearestMorphSource(frame, center) {
      if (!frame.length || !center) return null;
      return frame
        .map((shape) => ({ shape, score: distance(shape.center, center) }))
        .sort((a, b) => a.score - b.score)[0]?.shape ?? null;
    }

    function nearestMorphPoint(points, target) {
      if (!points.length || !target) return { x: 50, y: 50 };
      return points
        .map((point) => ({ point, score: distance(point, target) }))
        .sort((a, b) => a.score - b.score)[0].point;
    }

    function morphFrameMix(now) {
      const frames = state.morphSystem.targets.filter((targets) => targets.length);
      if (!frames.length) return { current: [], next: [], progress: 0, raw: 0, index: 0, active: false };
      const interval = Math.max(400, config.morphFrameIntervalMs);
      const transition = Math.min(Math.max(120, config.morphTransitionMs), interval);
      const hold = Math.max(0, interval - transition);
      const elapsed = Number.isFinite(state.startedAt) ? now - state.startedAt : 0;
      const cycle = Math.max(1, frames.length) * interval;
      const local = ((elapsed % cycle) + cycle) % cycle;
      const index = Math.min(frames.length - 1, Math.floor(local / interval));
      const frameLocal = local % interval;
      const raw = frameLocal < hold ? 0 : clamp((frameLocal - hold) / transition, 0, 1);
      return {
        current: frames[index],
        next: frames[(index + 1) % frames.length],
        progress: morphNaturalEase(raw),
        raw,
        index,
        active: raw > 0 && raw < 1,
      };
    }

    function morphNaturalEase(value) {
      const t = organicEase(value);
      const breath = clamp(config.morphBreath, 0, 1);
      const inhale = Math.sin(t * Math.PI);
      return clamp(t + inhale * (0.035 + breath * 0.035) * (0.5 - t), 0, 1);
    }

    function morphGravityPull(progress, breath) {
      const p = clamp(progress, 0, 1);
      const window = Math.sin(Math.PI * p) ** 2;
      const lateBias = p - 0.38;
      return lateBias * window * (16 + breath * 10);
    }

    function morphOrbitTransform(a, b, progress, breath, side) {
      const center = { x: 50, y: 50 };
      const base = {
        x: mixCellValue(a.center.x, b.center.x, progress),
        y: mixCellValue(a.center.y, b.center.y, progress),
      };
      const sx = a.center.x - center.x;
      const sy = a.center.y - center.y;
      const ex = b.center.x - center.x;
      const ey = b.center.y - center.y;
      const startRadius = Math.max(0.001, Math.hypot(sx, sy));
      const endRadius = Math.max(0.001, Math.hypot(ex, ey));
      const startAngle = Math.atan2(sy, sx);
      const endAngle = Math.atan2(ey, ex);
      let deltaAngle = endAngle - startAngle;
      while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
      while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
      const crossDirection = Math.sign(sx * ey - sy * ex);
      const direction = crossDirection || side || 1;
      const arcWindow = 4 * progress * (1 - progress);
      const angle = startAngle + deltaAngle * progress;
      const radius = mixCellValue(startRadius, endRadius, progress) + Math.min(14, Math.max(3.5, Math.abs(deltaAngle) * 6.5 + Math.abs(endRadius - startRadius) * 0.32)) * arcWindow * (0.62 + breath * 0.42);
      const tangent = { x: -Math.sin(angle) * direction, y: Math.cos(angle) * direction };
      const inertia = morphGravityPull(progress, breath);
      const orbit = {
        x: center.x + Math.cos(angle) * radius + tangent.x * inertia,
        y: center.y + Math.sin(angle) * radius + tangent.y * inertia,
      };
      const spinBase = Math.max(0.28, Math.min(1.35, Math.abs(deltaAngle) * 0.58 + 0.22 + breath * 0.42));
      const spin = direction * spinBase * Math.sin(Math.PI * progress);
      return {
        x: orbit.x - base.x,
        y: orbit.y - base.y,
        rotation: spin,
      };
    }

    function morphShapeProgress(raw, index, segmentIndex) {
      const p = clamp(raw, 0, 1);
      if (p <= 0 || p >= 1) return p;
      const breath = clamp(config.morphBreath, 0, 1);
      const rng = seededRandom(`morph-shape-progress|${segmentIndex}|${index}`);
      const delay = rng() * 0.14 * breath;
      const duration = Math.max(0.62, 1 - delay * 0.55);
      const shifted = clamp((p - delay) / duration, 0, 1);
      const wave = Math.sin(shifted * Math.PI * 2 + index * 0.73 + segmentIndex) * 0.025 * breath * Math.sin(shifted * Math.PI);
      return clamp(morphNaturalEase(shifted) + wave, 0, 1);
    }

    function morphInterpolatedShape(a, b, index, mix, now) {
      const progress = morphShapeProgress(mix.raw, index, mix.index);
      const settled = organicEase(progress);
      const t = settled;
      const alignedB = alignMorphPoints(a.points, b.points);
      const breath = clamp(config.morphBreath, 0, 1);
      const side = seededRandom(`morph-shape-arc|${mix.index}|${index}`)() > 0.5 ? 1 : -1;
      const orbit = morphOrbitTransform(a, b, settled, breath, side);
      const floatPhase = now * 0.0011 + a.seed * 5 + index;
      const idleX = Math.sin(floatPhase) * breath * 0.28 * (mix.active ? 0.55 : 1);
      const idleY = Math.cos(floatPhase * 0.91) * breath * 0.28 * (mix.active ? 0.55 : 1);
      const pulse = 1 + Math.sin(now * 0.0017 + index * 1.31) * 0.018 * breath + Math.sin(Math.PI * settled) * 0.045 * breath;
      const rotation = orbit.rotation;
      const mergePull = (a.phantom || b.phantom) ? Math.sin(Math.PI * settled) * (0.22 + breath * 0.18) : 0;
      const points = a.points.map((point, pointIndex) => {
        const target = alignedB[pointIndex] ?? point;
        const localWave = Math.sin((pointIndex / Math.max(1, a.points.length)) * Math.PI * 2 + now * 0.0012 + index) * 0.25 * breath * Math.sin(Math.PI * settled);
        const x = mixCellValue(point.x, target.x, t);
        const y = mixCellValue(point.y, target.y, t);
        const pullCenter = b.phantom ? b.center : a.phantom ? a.center : null;
        return {
          x: mixCellValue(x, pullCenter?.x ?? x, mergePull) + orbit.x + idleX + localWave,
          y: mixCellValue(y, pullCenter?.y ?? y, mergePull) + orbit.y + idleY + localWave * 0.35,
        };
      });
      const center = morphCentroid(points);
      const cos = Math.cos(rotation);
      const sin = Math.sin(rotation);
      return {
        points: points.map((point) => {
          const dx = (point.x - center.x) * pulse;
          const dy = (point.y - center.y) * pulse;
          return {
            x: center.x + dx * cos - dy * sin,
            y: center.y + dx * sin + dy * cos,
          };
        }),
        alpha: a.phantom && b.phantom ? 0 : 0.95,
      };
    }

    function ensureMorphFusionCanvases(width, height) {
      const system = state.morphSystem;
      const existing = system.fusionCanvases;
      const scale = Math.min(1, 720 / Math.max(width, height));
      const fieldWidth = Math.max(1, Math.round(width * scale));
      const fieldHeight = Math.max(1, Math.round(height * scale));
      if (existing && existing.width === width && existing.height === height && existing.fieldWidth === fieldWidth && existing.fieldHeight === fieldHeight) return existing;
      const makeCanvas = () => {
        const canvas = document.createElement("canvas");
        canvas.width = fieldWidth;
        canvas.height = fieldHeight;
        return canvas;
      };
      const from = makeCanvas();
      const to = makeCanvas();
      const output = makeCanvas();
      system.fusionCanvases = {
        width,
        height,
        fieldWidth,
        fieldHeight,
        scale,
        from,
        to,
        output,
        fromCtx: from.getContext("2d"),
        toCtx: to.getContext("2d"),
        outputCtx: output.getContext("2d"),
      };
      return system.fusionCanvases;
    }

    function rotatedMorphCanvasPoint(point, center, angle) {
      const canvasPoint = particleToCanvas(point);
      if (!angle) return canvasPoint;
      const canvasCenter = particleToCanvas(center);
      const dx = canvasPoint.x - canvasCenter.x;
      const dy = canvasPoint.y - canvasCenter.y;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return {
        x: canvasCenter.x + dx * cos - dy * sin,
        y: canvasCenter.y + dx * sin + dy * cos,
      };
    }

    function drawMorphFusionPath(ctx, shape, rotation) {
      if (!shape.points.length) return;
      const first = rotatedMorphCanvasPoint(shape.points[0], shape.center, rotation);
      ctx.beginPath();
      ctx.moveTo(first.x, first.y);
      for (let index = 0; index < shape.points.length; index += 1) {
        const controls = bezierControls(shape.points, index, 0.92);
        const c1 = rotatedMorphCanvasPoint(controls.c1, shape.center, rotation);
